        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-msrv-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-msrv-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Build with MSRV
        run: cargo build --features ci

      - name: Run tests with MSRV
        run: cargo test --features ci

