        run: bash scripts/check_no_conflict_markers.sh

      - name: Run clippy
        run: cargo clippy --all-targets --features ci --no-deps -- -D clippy::correctness

  # ===========================================================================
  # Format Job - Check code formatting
  # ===========================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Check formatting
        # `cargo fmt --all` also formats local path dependencies, including the nested
        # `vendor/ecma-rs` workspace. Keep the formatting gate scoped to the top-level
        # workspace to avoid churn from submodule updates.
        run: cargo fmt --check

  # ===========================================================================
  # Docs Job - Check documentation builds
  # ===========================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies (winit/wgpu)
        if: runner.os == 'Linux'
        run: bash scripts/ci_install_gui_deps_ubuntu.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Build documentation
        run: cargo doc --no-deps --features ci
        env:
          RUSTDOCFLAGS: -D warnings

  # ===========================================================================
  # Dependency Audit Job - Check for security vulnerabilities
  # ===========================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # ===========================================================================
  # Fuzz Smoke Job - Quick libFuzzer sanity runs
  # ===========================================================================
  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nightly toolchain for fuzzing
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Capture nightly toolchain info
        id: nightly_toolchain
        run: |
          set -euo pipefail
          rustc_version="$(rustc -V)"
          rustc_hash="$(rustc -Vv | awk '/^commit-hash:/ {print $2}')"
          echo "rustc_version=${rustc_version}" >> "$GITHUB_OUTPUT"
          echo "rustc_hash=${rustc_hash}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry (fuzz-smoke)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-fuzz-cargo-registry-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}

      - name: Cache cargo git (fuzz-smoke)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-fuzz-cargo-git-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}

      - name: Cache fuzz target dir
        uses: actions/cache@v4
        with:
          path: fuzz/target
          key: ${{ runner.os }}-fuzz-target-${{ steps.nightly_toolchain.outputs.rustc_hash }}-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: Cache ecma-rs fuzz target dir
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/fuzz/target
          key: ${{ runner.os }}-ecma-rs-fuzz-target-${{ steps.nightly_toolchain.outputs.rustc_hash }}-${{ hashFiles('Cargo.lock', 'vendor/ecma-rs/fuzz/Cargo.toml') }}

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz

      - name: Run fuzz smoke tests
        working-directory: fuzz
        run: |
          set -euo pipefail
          export ASAN_OPTIONS=detect_leaks=0
          cargo fuzz run css_parser ../tests/fuzz_corpus -- -max_total_time=5 -runs=256
          cargo fuzz run selectors ../tests/fuzz_corpus -- -max_total_time=5 -runs=128
          cargo fuzz run vars_and_calc ../tests/fuzz_corpus -- -max_total_time=5 -runs=128
          cargo fuzz run svg_filters ../tests/fuzz_corpus -- -max_total_time=5 -runs=128
          cargo fuzz run animation_properties ../tests/fuzz_corpus -- -max_total_time=5 -runs=128
          mkdir -p /tmp/fuzz_color_fonts_corpus
          cp ../tests/fixtures/fonts/FastRenderEmoji.ttf /tmp/fuzz_color_fonts_corpus/
          cp ../tests/fixtures/fonts/TestSbixJPEG.ttf /tmp/fuzz_color_fonts_corpus/
          cp ../tests/fixtures/fonts/PaletteTestCOLRv1.ttf /tmp/fuzz_color_fonts_corpus/
          cp ../tests/fixtures/fonts/colrv1-test.ttf /tmp/fuzz_color_fonts_corpus/
          cargo fuzz run color_fonts /tmp/fuzz_color_fonts_corpus -- -max_total_time=5 -runs=64 -timeout=5 -rss_limit_mb=4096

      - name: Run ecma-rs vm-js fuzz smoke tests
        working-directory: vendor/ecma-rs/fuzz
        run: |
          set -euo pipefail
          export ASAN_OPTIONS=detect_leaks=0
          # Deterministic, short runs that exercise the checked-in vm-js regression corpus.
          mkdir -p /tmp/ecma_rs_vm_js_exec_corpus /tmp/ecma_rs_vm_js_exec_compiled_corpus
          cargo fuzz run vm_js_exec /tmp/ecma_rs_vm_js_exec_corpus ../vm-js/fuzz/corpus/vm_js_exec -- -max_total_time=5 -runs=128 -timeout=5 -seed=1
          cargo fuzz run vm_js_exec_compiled /tmp/ecma_rs_vm_js_exec_compiled_corpus ../vm-js/fuzz/corpus/vm_js_exec_compiled -- -max_total_time=5 -runs=128 -timeout=5 -seed=1

      - name: Upload fuzz artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz_smoke_artifacts
          path: |
            fuzz/artifacts
            vendor/ecma-rs/fuzz/artifacts
          if-no-files-found: ignore

      - name: Fuzz smoke step summary
        if: always()
        run: |
          {
            echo "## Fuzz smoke"
            echo
            echo "- Rust (nightly): ${{ steps.nightly_toolchain.outputs.rustc_version }}"
            echo "- Rust commit hash: ${{ steps.nightly_toolchain.outputs.rustc_hash }}"
            echo "- cargo-fuzz: $(cargo fuzz --version 2>/dev/null || echo 'unavailable')"
            echo
            echo "Targets:"
            echo "- css_parser: -max_total_time=5 -runs=256"
            echo "- selectors: -max_total_time=5 -runs=128"
            echo "- vars_and_calc: -max_total_time=5 -runs=128"
            echo "- svg_filters: -max_total_time=5 -runs=128"
            echo "- animation_properties: -max_total_time=5 -runs=128"
            echo "- color_fonts: -max_total_time=5 -runs=64 -timeout=5 -rss_limit_mb=4096"
            echo "- vm_js_exec (vendor/ecma-rs): -max_total_time=5 -runs=128 -timeout=5 -seed=1"
            echo "- vm_js_exec_compiled (vendor/ecma-rs): -max_total_time=5 -runs=128 -timeout=5 -seed=1"
            echo
            if [ -d fuzz/artifacts ] || [ -d vendor/ecma-rs/fuzz/artifacts ]; then
              for dir in fuzz/artifacts vendor/ecma-rs/fuzz/artifacts; do
                if [ -d "${dir}" ]; then
                  echo "Artifacts directory (${dir}) exists; contents:"
                  echo
                  echo '```'
                  find "${dir}" -maxdepth 2 -type f -print | head -n 50 || true
                  echo '```'
                  echo
                fi
              done
            else
              echo "No fuzz artifacts directory was created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Coverage Job - Measure test coverage
  # ===========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies (winit/wgpu)
        if: runner.os == 'Linux'
