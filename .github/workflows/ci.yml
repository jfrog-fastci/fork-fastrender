        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-coverage-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-coverage-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --features ci --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Benchmark Job - Run performance benchmarks (on main branch only)
  # ===========================================================================
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-bench-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-bench-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Run benchmarks
        run: cargo bench --no-run

      - name: Run benchmarks and save baseline
        run: cargo bench -- --noplot --save-baseline main 2>&1 | tee benchmark-results.txt
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.txt
            target/criterion

  # ===========================================================================
  # CI Status - Final check that all jobs passed
  # ===========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lockfile, ecma-rs-sanity, ecma-rs-webidl-tests, test, win-sandbox, windows-sandbox, macos-sandbox, browser_ui_headless_smoke, chrome_baseline_viewport, msrv, msrv-cross, clippy, format, docs, audit, fuzz-smoke]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
              [ "${{ needs.macos-sandbox.result }}" != "success" ] || \
              [ "${{ needs.lockfile.result }}" != "success" ] || \
              [ "${{ needs.ecma-rs-sanity.result }}" != "success" ] || \
              [ "${{ needs.ecma-rs-webidl-tests.result }}" != "success" ] || \
              [ "${{ needs.win-sandbox.result }}" != "success" ] || \
              [ "${{ needs.windows-sandbox.result }}" != "success" ] || \
              [ "${{ needs.browser_ui_headless_smoke.result }}" != "success" ] || \
              [ "${{ needs.chrome_baseline_viewport.result }}" != "success" ] || \
              [ "${{ needs.msrv.result }}" != "success" ] || \
              [ "${{ needs.msrv-cross.result }}" != "success" ] || \
              [ "${{ needs.clippy.result }}" != "success" ] || \
              [ "${{ needs.format.result }}" != "success" ] || \
              [ "${{ needs.docs.result }}" != "success" ] || \
              [ "${{ needs.audit.result }}" != "success" ] || \
              [ "${{ needs.fuzz-smoke.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"
