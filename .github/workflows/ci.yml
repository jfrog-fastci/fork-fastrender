name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Minimum supported Rust version
  MSRV: "1.70"
  # perf_smoke is a lightweight offline perf signal; keep this conservative to avoid flakiness.
  PERF_SMOKE_REGRESSION_THRESHOLD: "0.10"
  # Deterministic complexity counters (DOM nodes, fragments, display items, etc) should not drift
  # far without an explicit change; keep this conservative while still catching blowups.
  PERF_SMOKE_COUNT_REGRESSION_THRESHOLD: "0.20"
  # Enforce pageset-guardrails budget_ms entries (offline perf smoke hard cap).
  PERF_SMOKE_FAIL_ON_BUDGET: "1"

jobs:
  # ===========================================================================
  # Lockfile Job - Ensure Cargo.lock is present and up to date
  # ===========================================================================
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure lockfile is committed
        run: |
          test -f Cargo.lock
          git ls-files --error-unmatch Cargo.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Validate lockfile with Cargo
        run: cargo metadata --locked --format-version 1 > /dev/null

  # ===========================================================================
  # ecma-rs Sanity - Fail fast if the ecma-rs submodule is unreachable or JS integration doesn't compile
  # ===========================================================================
  ecma-rs-sanity:
    name: ecma-rs sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: TypeScript version sync (ecma-rs)
        shell: bash
        run: bash vendor/ecma-rs/scripts/check_typescript_version_sync.sh

      - name: Verify LLVM stackmaps are retained in native binaries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          bash vendor/ecma-rs/scripts/check_llvm_stackmaps.sh

      - name: Compile fastrender JS integration (scoped)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/cargo_agent.sh check -p fastrender --lib --locked

      - name: Compile renderer build without direct network (scoped)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/cargo_agent.sh check -p fastrender --lib --locked --no-default-features --features renderer_minimal

  # ===========================================================================
  # ecma-rs WebIDL - Run the vendored WebIDL crate test suites (scoped)
  # ===========================================================================
  ecma-rs-webidl-tests:
    name: ecma-rs WebIDL tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Cache cargo registry (ecma-rs WebIDL)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-webidl-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-webidl-cargo-registry-

      - name: Cache cargo git (ecma-rs WebIDL)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-webidl-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-webidl-cargo-git-

      - name: Cache target dir (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-webidl-target-stable-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-webidl-target-stable-

      - name: Test webidl (vendored ecma-rs)
        shell: bash
        env:
          # Keep the cargo_agent lockfiles inside the vendored workspace target dir.
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          bash vendor/ecma-rs/scripts/cargo_agent.sh test -p webidl --lib --tests

      - name: Test webidl-vm-js (vendored ecma-rs)
        shell: bash
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          bash vendor/ecma-rs/scripts/cargo_agent.sh test -p webidl-vm-js --lib --tests

      - name: Test WebIDL runtime crate (vendored ecma-rs, if present)
        shell: bash
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          runtime_cargo_toml="vendor/ecma-rs/webidl-runtime/Cargo.toml"
          if [ -f "${runtime_cargo_toml}" ]; then
            runtime_package_name="$(
              awk -F '"' '
                $0 ~ /^\[package\]/ { in_pkg=1; next }
                $0 ~ /^\[/ { if (in_pkg) exit; in_pkg=0 }
                in_pkg && $0 ~ /^[[:space:]]*name[[:space:]]*=[[:space:]]*"/ {
                  print $2
                  exit
                }
              ' "${runtime_cargo_toml}"
            )"
            if [ -z "${runtime_package_name}" ]; then
              echo "Failed to parse package.name from ${runtime_cargo_toml}" >&2
              exit 1
            fi

            runtime_test_package="webidl-runtime"
            if [ "${runtime_package_name}" = "webidl-js-runtime" ]; then
              runtime_test_package="webidl-js-runtime"
            fi

            echo "Testing vendored WebIDL runtime: ${runtime_test_package} (Cargo.toml name = ${runtime_package_name})"
            bash vendor/ecma-rs/scripts/cargo_agent.sh test -p "${runtime_test_package}" --lib --tests
          else
            echo "${runtime_cargo_toml} not present; skipping WebIDL runtime tests."
          fi

  # ===========================================================================
  # Test Job - Run all tests across multiple platforms and Rust versions
  # ===========================================================================
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable, beta]
        include:
          # Test on macOS with stable
          - os: macos-latest
            rust: stable
          # Test on Windows with stable
          - os: windows-latest
            rust: stable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "CI guardrails: test architecture"
        shell: bash
        run: bash scripts/ci_check_test_architecture.sh

      - name: "CI guardrails: no merge conflict markers"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Install Linux GUI dependencies (winit/wgpu)
        if: runner.os == 'Linux'
        run: bash scripts/ci_install_gui_deps_ubuntu.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          # `cargo xtask webidl-bindings --check` uses `rustfmt` to ensure deterministic formatting.
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Validate generated emoji tables
        run: cargo xtask generate-emoji-tables --check

      # Note: RegExp `/v` Unicode property-of-strings tables are validated in the js_test262
      # workflow because the source-of-truth (test262 semantic corpus) lives in an optional
      # heavyweight submodule.
      - name: Validate generated WebIDL bindings
        # To reproduce locally:
        #   bash scripts/cargo_agent.sh xtask webidl-bindings --check
        run: cargo xtask webidl-bindings --check

      - name: Validate generated legacy WebIDL bindings
        # To reproduce locally:
        #   bash scripts/cargo_agent.sh xtask webidl-bindings --backend legacy --out src/js/webidl/bindings/generated_legacy.rs --check
        run: cargo xtask webidl-bindings --backend legacy --out src/js/webidl/bindings/generated_legacy.rs --check

      - name: "Lint: no panics in production code"
        run: cargo xtask lint-no-panics

      - name: "Lint: no OpenSSL dependency"
        run: cargo xtask lint-no-openssl --workspace --all-features

      - name: Build browser binary
        run: cargo build --features ci --bin browser

      - name: Run tests
        run: cargo test --features ci --verbose

      - name: Run doc tests
        run: cargo test --doc --features ci --verbose

      - name: Offline perf smoke (release, core + pageset-guardrails fixtures)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        id: perf_smoke_pageset_guardrails
        run: |
          set -o pipefail
          extra_args=()
          if [ "${PERF_SMOKE_FAIL_ON_BUDGET}" = "1" ]; then
            extra_args+=(--fail-on-budget)
          fi
          # Keep CI invocation explicit (instead of delegating to `cargo xtask perf-smoke`) so we
          # can't silently drift from the perf_smoke guardrails we intend to enforce here.
          # Note: `cargo xtask perf-smoke` now exposes these flags; consider switching if we want
          # to reduce duplication between local workflows and CI.
          cargo run --release --bin perf_smoke -- \
            --suite all \
            --fail-on-missing-fixtures \
            --fail-on-failure \
            --fail-on-fetch-errors \
            --isolate \
            "${extra_args[@]}" \
            --top 5 \
            --output target/perf_smoke_pageset_guardrails.json \
            | tee target/perf_smoke_pageset_guardrails.log
          test -s target/perf_smoke_pageset_guardrails.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("target/perf_smoke_pageset_guardrails.json")
          data = json.loads(path.read_text())
          assert isinstance(data.get("schema_version"), int), "perf_smoke output missing schema_version"
          assert isinstance(data.get("fixtures"), list), "perf_smoke output missing fixtures list"
          PY

      - name: Download perf_smoke pageset-guardrails baseline (main)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable' && steps.perf_smoke_pageset_guardrails.outcome == 'success'
        id: download_perf_smoke_pageset_guardrails_baseline
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yml
          workflow_conclusion: success
          branch: main
          name: perf_smoke_pageset_guardrails
          path: baseline

      - name: Locate perf_smoke pageset-guardrails baseline JSON
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable' && steps.perf_smoke_pageset_guardrails.outcome == 'success' && steps.download_perf_smoke_pageset_guardrails_baseline.outcome == 'success'
        run: |
          set -e
          if [ -f baseline/target/perf_smoke_pageset_guardrails.json ]; then
            echo "PERF_SMOKE_PAGESET_GUARDRAILS_BASELINE=baseline/target/perf_smoke_pageset_guardrails.json" >> "$GITHUB_ENV"
            exit 0
          fi
          match=$(find baseline -type f -name "perf_smoke_pageset_guardrails.json" | head -n 1 || true)
          if [ -z "$match" ]; then
            echo "Downloaded baseline artifact did not contain perf_smoke_pageset_guardrails.json" >&2
            exit 1
          fi
          echo "PERF_SMOKE_PAGESET_GUARDRAILS_BASELINE=$match" >> "$GITHUB_ENV"
          echo "Using perf_smoke baseline at $match"

      - name: Perf regression check (perf_smoke all suite)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable' && steps.perf_smoke_pageset_guardrails.outcome == 'success' && steps.download_perf_smoke_pageset_guardrails_baseline.outcome == 'success'
        run: |
          # To reproduce locally:
          #   cargo run --release --bin perf_smoke -- \
          #     --suite all \
          #     --fail-on-missing-fixtures \
          #     --fail-on-failure \
          #     --fail-on-fetch-errors \
          #     --isolate \
          #     --baseline <path> \
          #     --fail-on-regression \
          #     --threshold 0.10 \
          #     --count-threshold 0.20 \
          #     --fail-on-budget
          report_path=target/perf_smoke_pageset_guardrails_regression_report.txt
          status=0
          extra_args=()
          if [ "${PERF_SMOKE_FAIL_ON_BUDGET}" = "1" ]; then
            extra_args+=(--fail-on-budget)
          fi

          # Use the already-built binary to keep the report free of cargo build noise.
          target/release/perf_smoke \
            --suite all \
            --fail-on-missing-fixtures \
            --fail-on-failure \
            --fail-on-fetch-errors \
            --isolate \
            --top 5 \
            --output target/perf_smoke_pageset_guardrails.json \
            --baseline "${PERF_SMOKE_PAGESET_GUARDRAILS_BASELINE}" \
            --fail-on-regression \
            "${extra_args[@]}" \
            --threshold "${PERF_SMOKE_REGRESSION_THRESHOLD}" \
            --count-threshold "${PERF_SMOKE_COUNT_REGRESSION_THRESHOLD}" \
            > /dev/null 2> "${report_path}" || status=$?

          cat "${report_path}" >&2

          {
            echo "## perf_smoke (all suite) regression check"
            echo
            echo "Baseline: ${PERF_SMOKE_PAGESET_GUARDRAILS_BASELINE}"
            echo "Threshold: ${PERF_SMOKE_REGRESSION_THRESHOLD} (relative)"
            echo "Count threshold: ${PERF_SMOKE_COUNT_REGRESSION_THRESHOLD} (relative)"
            if [ "${PERF_SMOKE_FAIL_ON_BUDGET}" = "1" ]; then
              echo "Budget gate: enabled"
            else
              echo "Budget gate: disabled (set PERF_SMOKE_FAIL_ON_BUDGET=1 to enable)"
            fi
            echo

            result="no regressions detected"
            if grep -q "Regressions detected vs baseline" "${report_path}"; then
              result="regressions detected"
            fi
            if grep -q "Budget failures" "${report_path}"; then
              if [ "$result" = "no regressions detected" ]; then
                result="budget failures detected"
              else
                result="${result}; budget failures detected"
              fi
            fi
            if grep -q "Fixture failures" "${report_path}"; then
              if [ "$result" = "no regressions detected" ]; then
                result="fixture failures detected"
              else
                result="${result}; fixture failures detected"
              fi
            fi
            if grep -q "Missing pageset-guardrails fixtures" "${report_path}"; then
              result="missing pageset-guardrails fixtures"
            fi
            if grep -q "baseline schema_version" "${report_path}"; then
              result="baseline incompatible (schema mismatch); skipping regression gate"
            fi

            echo "**Result: ${result}**"
            echo
            echo '```'
            cat "${report_path}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # If the baseline is from an older perf_smoke schema, skip gating and let this run
          # upload a new baseline artifact.
          if grep -q "baseline schema_version" "${report_path}"; then
            exit 0
          fi

          exit $status

      - name: Baseline unavailable
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable' && steps.perf_smoke_pageset_guardrails.outcome == 'success' && steps.download_perf_smoke_pageset_guardrails_baseline.outcome != 'success'
        run: |
          echo "Previous perf_smoke pageset-guardrails artifact not found; skipping regression gate."
          {
            echo "## perf_smoke (all suite) regression check"
            echo
            echo "No prior baseline artifact was available from main."
            echo "Threshold: ${PERF_SMOKE_REGRESSION_THRESHOLD} (relative)"
            echo "Count threshold: ${PERF_SMOKE_COUNT_REGRESSION_THRESHOLD} (relative)"
            if [ "${PERF_SMOKE_FAIL_ON_BUDGET}" = "1" ]; then
              echo "Budget gate: enabled"
            else
              echo "Budget gate: disabled (set PERF_SMOKE_FAIL_ON_BUDGET=1 to enable)"
            fi
            echo
            echo "The uploaded perf_smoke output from this run will serve as the next baseline."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf_smoke pageset-guardrails output
        if: always() && matrix.os == 'ubuntu-latest' && matrix.rust == 'stable' && steps.perf_smoke_pageset_guardrails.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: perf_smoke_pageset_guardrails
          path: target/perf_smoke_pageset_guardrails.json
          if-no-files-found: error

  # ===========================================================================
  # win-sandbox crate - Compile + test Windows sandboxing primitives (scoped)
  # ===========================================================================
  win-sandbox:
    name: win-sandbox crate tests
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      # These tests manipulate global OS resources (AppContainer profiles, job objects, ...).
      # Keep them deterministic and avoid parallel interference.
      RUST_TEST_THREADS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Init ecma-rs submodule (if configured)
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run win-sandbox tests
        # Keep this job lightweight: do not build the full fastrender crate graph.
        run: cargo test -p win-sandbox --locked

  # ===========================================================================
  # Windows sandbox - Validate AppContainer / Job object enforcement
  # ===========================================================================
  windows-sandbox:
    name: Windows sandbox tests
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      # Keep sandbox tests deterministic; they often manipulate global OS resources.
      FASTR_RUST_TEST_THREADS: "1"
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Init ecma-rs submodule (if configured)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry (windows sandbox)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-windows-sandbox-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index (windows sandbox)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-windows-sandbox-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build (windows sandbox)
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-windows-sandbox-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Windows sandbox tests (AppContainer / Job object)
        run: |
          set -euo pipefail
          # Keep this job lightweight: do not enable browser_ui / GUI features.
          # AppContainer smoke + Windows sandbox security regressions live under the unified
          # integration test harness (`tests/integration.rs::sandbox`).
          bash scripts/cargo_agent.sh test --locked -p fastrender --no-default-features --test integration sandbox:: -- --nocapture

          # Job object regression tests: kill-on-close + active-process limit enforcement.
          bash scripts/cargo_agent.sh test --locked -p win-sandbox --test job_limits -- --nocapture

  # ===========================================================================
  # macOS sandbox - Ensure Seatbelt sandboxing continues to work
  # ===========================================================================
  macos-sandbox:
    name: macOS sandbox (Seatbelt)
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      # macOS runners can be resource constrained; keep libtest thread count low to avoid flakiness.
      RUST_TEST_THREADS: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure timeout command is available (macOS)
        shell: bash
        run: |
          set -euo pipefail
          if command -v timeout >/dev/null 2>&1 || command -v gtimeout >/dev/null 2>&1; then
            exit 0
          fi
          # `timeout` is provided by GNU coreutils (`gtimeout` on macOS). Install it so we can
          # enforce hard-kill timeouts like the Linux CI jobs do.
          HOMEBREW_NO_AUTO_UPDATE=1 brew install coreutils

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Run macOS Seatbelt sandbox tests (scoped)
        shell: bash
        run: |
          set -euo pipefail
          timeout_bin="timeout"
          if ! command -v "${timeout_bin}" >/dev/null 2>&1; then
            timeout_bin="gtimeout"
          fi
          if ! command -v "${timeout_bin}" >/dev/null 2>&1; then
            echo "Neither 'timeout' nor 'gtimeout' is available on this runner." >&2
            echo "Install coreutils (provides gtimeout) or add a timeout implementation." >&2
            exit 1
          fi

          # Run the macOS renderer Seatbelt integration test plus the sandbox unit tests.
          #
          # We keep this scoped to the sandbox surface to avoid running the full (heavy) test suite
          # on macOS runners while still catching regressions where sandboxing silently breaks.
          #
          # Keep this job lightweight: the sandbox checks do not require default features (AVIF,
          # preserve3d_warp, etc).
          "${timeout_bin}" -k 10 600 bash scripts/cargo_agent.sh test --locked -p fastrender --no-default-features --lib --test integration sandbox::

  # ===========================================================================
  # Browser UI - Cross-platform compile + Linux headless smoke (no display/GPU)
  # ===========================================================================
  browser_ui_headless_smoke:
    name: browser_ui (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Init ecma-rs submodule (if configured)
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install Linux GUI dependencies (winit/wgpu)
        if: runner.os == 'Linux'
        run: bash scripts/ci_install_gui_deps_ubuntu.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Init ecma-rs (vendored) checkout
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert browser_ui does not depend on GTK (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # `rfd` can use a GTK backend on Linux depending on feature selection, which would require
          # GTK system development packages on CI/minimal hosts. `browser_ui` intentionally uses the
          # xdg-portal backend instead; assert we do not pull in `gtk-sys` to prevent regressions.
          tree="$(cargo tree --locked -p fastrender --features browser_ui)"
          if echo "${tree}" | grep -q "gtk-sys"; then
            echo "error: browser_ui depends on gtk-sys on Linux; ensure rfd uses the xdg-portal backend (no GTK build deps)" >&2
            echo "${tree}" | grep -n "gtk-sys" || true
            exit 1
          fi

      - name: Build browser binary (browser_ui feature)
        run: |
          set -euo pipefail
          bash scripts/cargo_agent.sh build --locked --features browser_ui --bin browser

      - name: Headless smoke (no X11/Wayland display required)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          out="$(mktemp)"
          FASTR_TEST_BROWSER_HEADLESS_SMOKE=1 \
          FASTR_BROWSER_MEM_LIMIT_MB=4096 \
          FASTR_USE_BUNDLED_FONTS=1 \
          RAYON_NUM_THREADS=1 \
            bash scripts/run_limited.sh --as 64G -- \
              bash scripts/cargo_agent.sh run --locked --features browser_ui --bin browser \
            | tee "${out}"
          grep -q "HEADLESS_SMOKE_OK" "${out}"

  # ===========================================================================
  # Chrome Baseline Viewport Smoke - Validate headless window-size padding/crop logic
  # ===========================================================================
  chrome_baseline_viewport:
    name: Chrome baseline viewport smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Chrome
        id: setup_chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export CHROME_BIN
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="${{ steps.setup_chrome.outputs.chrome-path }}"
          if [[ -n "${chrome_path}" && -x "${chrome_path}" ]]; then
            echo "CHROME_BIN=${chrome_path}" >> "$GITHUB_ENV"
            "${chrome_path}" --version
            exit 0
          fi

          chrome="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser)"
          echo "CHROME_BIN=${chrome}" >> "$GITHUB_ENV"
          "${chrome}" --version

      - name: Verify headless viewport padding/crop
        shell: bash
        run: |
          set -euo pipefail
          unset HEADLESS_WINDOW_VIEWPORT_HEIGHT_PAD_PX
          scripts/verify_chrome_baseline_viewport.sh

  # ===========================================================================
  # MSRV Job - Verify minimum supported Rust version
  # ===========================================================================
  msrv:
    name: MSRV (${{ env.MSRV }})
    runs-on: ubuntu-latest
    env:
      MSRV: "1.70"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

