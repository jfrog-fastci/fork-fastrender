name: JS test262 semantic

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TEST262_REPORT: target/js/test262.json
  TEST262_SUMMARY: target/js/test262_summary.md

jobs:
  test262-semantic:
    name: test262 semantic suite (Linux stable)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Init ecma-rs submodule + curated corpus
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci_init_ecma_rs_submodule.sh

          if ! grep -q 'submodule "vendor/ecma-rs/test262-semantic/data"' .gitmodules; then
            echo "::error::Missing test262 semantic corpus submodule entry (vendor/ecma-rs/test262-semantic/data)." >&2
            exit 1
          fi

          # Only initialize the curated semantics corpus, not the parser corpus or other optional
          # heavyweight submodules.
          git submodule update --init vendor/ecma-rs/test262-semantic/data

          if [ ! -d vendor/ecma-rs/test262-semantic/data ]; then
            echo "::error::test262 semantic corpus directory vendor/ecma-rs/test262-semantic/data is missing after submodule init." >&2
            exit 1
          fi
          if [ ! -d vendor/ecma-rs/test262-semantic/data/test ]; then
            echo "::error::test262 semantic corpus appears incomplete (expected vendor/ecma-rs/test262-semantic/data/test). Did the submodule checkout fail?" >&2
            exit 1
          fi

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources, ecma-rs aware)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: js-test262-${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: js-test262-${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: js-test262-${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate generated RegExp Unicode property-of-strings tables
        run: cargo xtask generate-regexp-unicode-property-strings --check

      - name: Smoke deep recursion case (no abort, no timeout classification)
        shell: bash
        run: |
          set -euo pipefail
          repo_root="${GITHUB_WORKSPACE:-$(pwd)}"
          report_rel="target/js/test262_deep_recursion.json"
          report="${repo_root}/${report_rel}"
          rm -f "${report}"
          mkdir -p "$(dirname "${report}")"
          chmod +x scripts/run_limited.sh
          scripts/run_limited.sh --as 64G -- \
            bash scripts/cargo_agent.sh run --release -p test262-semantic -- \
              --test262-dir "${repo_root}/vendor/ecma-rs/test262-semantic/data" \
              --harness test262 \
              --filter language/expressions/comma/tco-final.js \
              --fail-on none \
              --report-path "${report}"
          test -s "${report}"
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("target/js/test262_deep_recursion.json").read_text())
          assert data.get("schema_version") == 1
          summary = data.get("summary", {})
          assert summary.get("total", 0) >= 1, summary
          assert summary.get("timed_out", 0) == 0, summary
          PY

      - name: Run curated test262 semantics suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TEST262_REPORT}")"
          rm -f "${TEST262_REPORT}"
          rm -f "${TEST262_SUMMARY}"
          chmod +x scripts/run_limited.sh

          status=0
          scripts/run_limited.sh --as 64G -- \
            cargo run -p xtask --release --locked -- \
              js test262 \
              --fail-on new \
              --report "${TEST262_REPORT}" \
              --summary "${TEST262_SUMMARY}" || status=$?
          test -s "${TEST262_REPORT}"
          test -s "${TEST262_SUMMARY}"
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("target/js/test262.json")
          data = json.loads(path.read_text())
          assert isinstance(data, dict), "test262 report JSON should be an object"
          assert isinstance(data.get("schema_version"), int), "missing schema_version in test262 report"
          assert isinstance(data.get("summary"), dict), "missing summary object in test262 report"
          assert isinstance(data.get("results"), list), "missing results array in test262 report"
          PY

          {
            echo "## test262 semantic summary"
            echo
            cat "${TEST262_SUMMARY}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Upload test262 semantic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262_semantic_report
          path: |
            ${{ env.TEST262_REPORT }}
            ${{ env.TEST262_SUMMARY }}
          if-no-files-found: error
