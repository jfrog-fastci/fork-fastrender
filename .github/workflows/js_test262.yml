name: JS test262 semantic

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TEST262_REPORT: target/js/test262.json

jobs:
  test262-semantic:
    name: test262 semantic suite (Linux stable)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init ecma-rs submodule + curated corpus
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci_init_ecma_rs_submodule.sh

          if ! grep -q "test262-semantic/data" engines/ecma-rs/.gitmodules; then
            echo "::error::Missing test262 semantic corpus submodule entry (engines/ecma-rs/test262-semantic/data). Update the ecma-rs submodule pointer to a revision that includes the curated corpus." >&2
            exit 1
          fi

          # Only initialize the curated semantics corpus, not the parser corpus or other optional
          # heavyweight submodules.
          git -C engines/ecma-rs submodule update --init test262-semantic/data

          if [ ! -d engines/ecma-rs/test262-semantic/data ]; then
            echo "::error::test262 semantic corpus directory engines/ecma-rs/test262-semantic/data is missing after submodule init." >&2
            exit 1
          fi
          if [ ! -d engines/ecma-rs/test262-semantic/data/test ]; then
            echo "::error::test262 semantic corpus appears incomplete (expected engines/ecma-rs/test262-semantic/data/test). Did the submodule checkout fail?" >&2
            exit 1
          fi

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f engines/ecma-rs/Cargo.toml ]; then
            echo "Missing engines/ecma-rs submodule checkout (expected engines/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init engines/ecma-rs" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: js-test262-${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: js-test262-${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: js-test262-${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run curated test262 semantics suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TEST262_REPORT}")"
          rm -f "${TEST262_REPORT}"
          chmod +x scripts/run_limited.sh

          status=0
          scripts/run_limited.sh --as 64G -- \
            cargo run -p xtask --release --locked -- \
              js test262 \
              --fail-on new \
              --report "${TEST262_REPORT}" || status=$?
          test -s "${TEST262_REPORT}"
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("target/js/test262.json")
          data = json.loads(path.read_text())
          assert isinstance(data, dict), "test262 report JSON should be an object"
          assert isinstance(data.get("schema_version"), int), "missing schema_version in test262 report"
          assert isinstance(data.get("summary"), dict), "missing summary object in test262 report"
          assert isinstance(data.get("results"), list), "missing results array in test262 report"
          PY
          exit $status

      - name: Upload test262 semantic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262_semantic_report
          path: ${{ env.TEST262_REPORT }}
          if-no-files-found: error

      - name: Download previous baseline report
        id: download_baseline
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: js_test262.yml
          workflow_conclusion: success
          branch: main
          name: test262_semantic_report
          path: baseline

      - name: Locate baseline report
        if: steps.download_baseline.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f baseline/"${TEST262_REPORT}" ]; then
            echo "BASELINE_REPORT=baseline/${TEST262_REPORT}" >> "$GITHUB_ENV"
            exit 0
          fi
          match=$(find baseline -type f -name "$(basename "${TEST262_REPORT}")" | head -n 1 || true)
          if [ -z "$match" ]; then
            echo "Downloaded artifact did not contain ${TEST262_REPORT}" >&2
            exit 1
          fi
          echo "BASELINE_REPORT=$match" >> "$GITHUB_ENV"
          echo "Using baseline report at $match"

      - name: Compare against baseline (fail on regressions)
        if: steps.download_baseline.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          report_out="test262_report_compare.txt"
          rm -f "${report_out}"

          (
            cd engines/ecma-rs
            cargo run -p test262-semantic -- \
              report compare \
              --baseline "${GITHUB_WORKSPACE}/${BASELINE_REPORT}" \
              --current "${GITHUB_WORKSPACE}/${TEST262_REPORT}" \
              --fail-on-regression
          ) | tee "${report_out}"
          status=${PIPESTATUS[0]}

          {
            echo "## test262 semantic regression check"
            echo
            echo '```'
            cat "${report_out}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit $status

      - name: Baseline unavailable
        if: steps.download_baseline.outcome != 'success'
        shell: bash
        run: |
          echo "Previous test262 semantic report artifact not found; skipping regression gate."
          {
            echo "## test262 semantic regression check"
            echo
            echo "No prior baseline artifact was available from main."
            echo "The uploaded JSON report from this run will serve as the next baseline."
          } >> "$GITHUB_STEP_SUMMARY"
