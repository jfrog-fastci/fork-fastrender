name: ecma-rs native groundwork

on:
  push:
    paths:
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/run_limited.sh"
      - ".github/workflows/ecma_rs_native.yml"
  pull_request:
    paths:
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/run_limited.sh"
      - ".github/workflows/ecma_rs_native.yml"
  # Keep the native runtime/reactor continuously validated even when only dependency
  # versions drift (the vendored ecma-rs workspace does not commit Cargo.lock).
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ecma-rs-vm-js-check:
    name: ecma-rs vm-js compile check (Rust 1.92.0)
    runs-on: ubuntu-latest
    # Keep scheduled runs focused on the macOS reactor backend; this job exists primarily to fail
    # fast on PRs that touch the vendored ecma-rs workspace.
    if: github.event_name != 'schedule'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Keep CI lightweight: do not fetch heavyweight nested corpora submodules (test262,
          # TypeScript, ...). This job is a pure `cargo check` compile gate.
          submodules: false

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        run: |
          bash scripts/check_no_conflict_markers.sh
          bash scripts/ci_check_no_merge_conflicts.sh

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Cache cargo registry (ecma-rs vm-js check)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-vm-js-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-vm-js-cargo-registry-

      - name: Cache cargo git (ecma-rs vm-js check)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-vm-js-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-vm-js-cargo-git-

      - name: Cache target dir (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-vm-js-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-vm-js-target-1.92.0-

      - name: cargo check + tests (vm-js, parse-js, test262-semantic)
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir.
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          timeout -k 10 600 bash vendor/ecma-rs/scripts/cargo_agent.sh check -p vm-js
          timeout -k 10 600 bash vendor/ecma-rs/scripts/cargo_agent.sh check -p parse-js
          # Run the `test262-semantic` unit tests (including stack overflow regression coverage).
          # Note: `test262-semantic` depends on the large `vm-js` crate; cold builds can take
          # >10 minutes on GitHub-hosted runners. Use a more generous timeout so this stays stable
          # in CI (while still preventing infinite hangs).
          timeout -k 10 1800 bash vendor/ecma-rs/scripts/cargo_agent.sh test -p test262-semantic --lib --tests
          # Also run in release mode so the stack overflow mapping remains consistent with the
          # `js_test262` workflow (which executes `test262-semantic` via `cargo run --release`).
          timeout -k 10 1800 bash vendor/ecma-rs/scripts/cargo_agent.sh test -p test262-semantic --release --lib --tests

      - name: vm-js generator/yield integration smoke tests
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir.
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          bash scripts/run_vm_js_generator_yield_tests.sh

  ecma-rs-native:
    name: ecma-rs native (Rust 1.92.0)
    runs-on: ubuntu-latest
    # This workflow's scheduled runs primarily exist to keep the macOS kqueue backend
    # continuously validated. Keep the Linux groundwork job opt-in on schedule to
    # avoid burning CI minutes running the full vendored suite daily.
    if: github.event_name != 'schedule'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Keep CI lightweight: do not fetch heavyweight nested corpora submodules (test262,
          # TypeScript, ...). This job relies only on the vendored source + fixtures.
          submodules: false

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        run: |
          bash scripts/check_no_conflict_markers.sh
          bash scripts/ci_check_no_merge_conflicts.sh

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Ensure build dependencies are available
        run: |
          set -euo pipefail
          pkgs=()
          if ! command -v mold >/dev/null 2>&1; then
            pkgs+=(mold)
          fi
          if ! command -v rg >/dev/null 2>&1; then
            pkgs+=(ripgrep)
          fi
          # LLVM 18 tools (llc/llvm-readobj/llvm-objdump) are needed for the stackmap ABI regression scripts.
          if ! command -v llc-18 >/dev/null 2>&1 || \
             ! command -v llvm-readobj-18 >/dev/null 2>&1 || \
             ! command -v llvm-objdump-18 >/dev/null 2>&1; then
            pkgs+=(llvm-18)
          fi
          # PIE stackmaps link regression scripts use clang+lnd/objcopy.
          if ! command -v clang-18 >/dev/null 2>&1; then
            pkgs+=(clang-18)
          fi
          if ! command -v ld.lld-18 >/dev/null 2>&1; then
            pkgs+=(lld-18)
          fi
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            exit 0
          fi
          sudo apt-get update
          if sudo apt-get install -y "${pkgs[@]}"; then
            exit 0
          fi

          # Fallback: some Ubuntu images don't ship `llvm-18` in the default apt repos.
          if printf '%s\n' "${pkgs[@]}" | grep -Eqx '(llvm-18|clang-18|lld-18)'; then
            echo "llvm-18 install failed; adding apt.llvm.org repo and retrying..." >&2
            sudo apt-get install -y wget lsb-release ca-certificates
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
            codename="$(lsb_release -cs)"
            echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-18 main" | \
              sudo tee /etc/apt/sources.list.d/llvm-18.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y "${pkgs[@]}"
          else
            exit 1
          fi

      - name: UTF-8 source-text API policy (ecma-rs)
        run: bash vendor/ecma-rs/scripts/check_utf8_apis.sh

      - name: Cargo hygiene (ecma-rs tooling)
        run: bash vendor/ecma-rs/scripts/check_no_raw_cargo.sh

      - name: TypeScript version sync (ecma-rs)
        run: bash vendor/ecma-rs/scripts/check_typescript_version_sync.sh

      - name: Cache cargo registry (ecma-rs native)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-native-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-cargo-registry-

      - name: Cache cargo git (ecma-rs native)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-native-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-cargo-git-

      - name: Cache target dir (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-native-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-target-1.92.0-

      - name: Diagnostic code policy
        run: bash vendor/ecma-rs/scripts/check_diagnostic_codes.sh

      - name: Lint committed TypeScript baselines (ecma-rs)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh run -p typecheck-ts-harness -- lint-baselines

      - name: LLVM statepoint stackmap ABI (scripts)
        run: |
          set -euo pipefail
          bash vendor/ecma-rs/scripts/test_stackmap_abi.sh
          bash vendor/ecma-rs/scripts/test_statepoint_flags_patchbytes.sh
          bash vendor/ecma-rs/scripts/test_stackmaps_pie_link.sh

      - name: typecheck-ts (strict-native groundwork)
        working-directory: vendor/ecma-rs
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir (avoids polluting the
          # root target/ cache used by MSRV-focused workflows).
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh test -p typecheck-ts

      - name: typecheck-ts-harness (strict-native fixtures)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh test -p typecheck-ts-harness --test strict_native

      - name: typecheck-ts-harness (conformance-lite snapshots)
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir (avoids polluting the
          # root target/ cache used by MSRV-focused workflows).
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          bash vendor/ecma-rs/scripts/cargo_agent.sh run -p typecheck-ts-harness --release -- conformance \
            --root typecheck-ts-harness/fixtures/conformance-lite \
            --compare snapshot \
            --manifest typecheck-ts-harness/fixtures/conformance-lite/manifest.toml \
            --jobs 4 \
            --json > typecheck-conformance-lite.json

      - name: Upload conformance-lite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-conformance-lite
          path: typecheck-conformance-lite.json
          if-no-files-found: warn

      - name: emit-js (TS erasure groundwork)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh test -p emit-js

      - name: ts-erase (if present)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          if cargo metadata --no-deps --format-version 1 | rg -q '"name":"ts-erase"'; then
            bash scripts/cargo_agent.sh test -p ts-erase
          else
            echo "ts-erase package not present in this checkout; skipping."
          fi

      - name: native-oracle-harness (if present)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          if cargo metadata --no-deps --format-version 1 | rg -q '"name":"native-oracle-harness"'; then
            bash scripts/cargo_agent.sh test -p native-oracle-harness
          else
            echo "native-oracle-harness package not present in this checkout; skipping."
          fi

      - name: runtime-native reactor conformance
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
          if [[ "${RUSTFLAGS:-}" != *"force-frame-pointers=yes"* ]]; then
            export RUSTFLAGS="${RUSTFLAGS:-} -C force-frame-pointers=yes"
          fi
          # Only run the portable reactor conformance suite; `runtime-native` has other tests/benches
          # that may be heavier and are not needed for this workflow's goals.
          bash scripts/cargo_agent.sh test -p runtime-native --test reactor_conformance

  ecma-rs-native-macos:
    name: ecma-rs native reactor (macOS, Rust 1.92.0)
    runs-on: macos-latest
    env:
      # These integration tests serialize on a global runtime lock; running too many test threads
      # adds contention and can make timing-based tests flaky on GitHub-hosted macOS runners.
      RUST_TEST_THREADS: 2
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Keep CI lightweight: do not fetch heavyweight nested corpora submodules (test262,
          # TypeScript, ...). This job relies only on the vendored source + fixtures.
          submodules: false

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        run: |
          bash scripts/check_no_conflict_markers.sh
          bash scripts/ci_check_no_merge_conflicts.sh

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Cache cargo registry (ecma-rs native macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-native-macos-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-macos-cargo-registry-

      - name: Cache cargo git (ecma-rs native macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-native-macos-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-macos-cargo-git-

      - name: Cache target dir (vendor/ecma-rs, macOS)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-native-reactor-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-reactor-target-1.92.0-

      - name: Generate Cargo.lock (vendor/ecma-rs)
        working-directory: vendor/ecma-rs
        run: cargo generate-lockfile

      - name: runtime-native reactor + async event loop (kqueue + wake)
        working-directory: vendor/ecma-rs
        run: |
          set -euo pipefail
          # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
          if [[ "${RUSTFLAGS:-}" != *"force-frame-pointers=yes"* ]]; then
            export RUSTFLAGS="${RUSTFLAGS:-} -C force-frame-pointers=yes"
          fi
          # Default macOS kqueue wake path (EVFILT_USER).
          cargo test -p runtime-native --locked \
            --test reactor_conformance \
            --test reactor_kqueue \
            --test kqueue_reactor \
            --test io_watchers \
            --test async_event_loop \
            --test async_fd \
            --test async_rt_reactor_adapter

          # Exercise the force-pipe wake fallback path on platforms that default to kqueue/EVFILT_USER.
          cargo test -p runtime-native --locked --features force_pipe_wake \
            --test reactor_conformance \
            --test reactor_kqueue_pipe_wake \
            --test kqueue_reactor \
            --test io_watchers \
            --test async_event_loop \
            --test async_fd \
            --test async_rt_reactor_adapter
