name: ecma-rs native groundwork

on:
  push:
    paths:
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/run_limited.sh"
      - ".github/workflows/ecma_rs_native.yml"
  pull_request:
    paths:
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/run_limited.sh"
      - ".github/workflows/ecma_rs_native.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ecma-rs-native:
    name: ecma-rs native (Rust 1.92.0)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Keep CI lightweight: do not fetch heavyweight nested corpora submodules (test262,
          # TypeScript, ...). This job relies only on the vendored source + fixtures.
          submodules: false

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Ensure build dependencies are available
        run: |
          set -euo pipefail
          pkgs=()
          if ! command -v mold >/dev/null 2>&1; then
            pkgs+=(mold)
          fi
          if ! command -v rg >/dev/null 2>&1; then
            pkgs+=(ripgrep)
          fi
          # LLVM 18 tools (llc/llvm-readobj/llvm-objdump) are needed for the stackmap ABI regression scripts.
          if ! command -v llc-18 >/dev/null 2>&1 || \
             ! command -v llvm-readobj-18 >/dev/null 2>&1 || \
             ! command -v llvm-objdump-18 >/dev/null 2>&1; then
            pkgs+=(llvm-18)
          fi
          # PIE stackmaps link regression scripts use clang+lnd/objcopy.
          if ! command -v clang-18 >/dev/null 2>&1; then
            pkgs+=(clang-18)
          fi
          if ! command -v ld.lld-18 >/dev/null 2>&1; then
            pkgs+=(lld-18)
          fi
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            exit 0
          fi
          sudo apt-get update
          if sudo apt-get install -y "${pkgs[@]}"; then
            exit 0
          fi

          # Fallback: some Ubuntu images don't ship `llvm-18` in the default apt repos.
          if printf '%s\n' "${pkgs[@]}" | grep -Eqx '(llvm-18|clang-18|lld-18)'; then
            echo "llvm-18 install failed; adding apt.llvm.org repo and retrying..." >&2
            sudo apt-get install -y wget lsb-release ca-certificates
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
            codename="$(lsb_release -cs)"
            echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-18 main" | \
              sudo tee /etc/apt/sources.list.d/llvm-18.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y "${pkgs[@]}"
          else
            exit 1
          fi

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Cache cargo registry (ecma-rs native)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-native-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-cargo-registry-

      - name: Cache cargo git (ecma-rs native)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-native-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-cargo-git-

      - name: Cache target dir (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-native-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-target-1.92.0-

      - name: Diagnostic code policy
        run: bash vendor/ecma-rs/scripts/check_diagnostic_codes.sh

      - name: LLVM statepoint stackmap ABI (scripts)
        run: |
          set -euo pipefail
          bash vendor/ecma-rs/scripts/test_stackmap_abi.sh
          bash vendor/ecma-rs/scripts/test_statepoint_flags_patchbytes.sh
          bash vendor/ecma-rs/scripts/test_stackmaps_pie_link.sh

      - name: typecheck-ts (strict-native groundwork)
        working-directory: vendor/ecma-rs
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir (avoids polluting the
          # root target/ cache used by MSRV-focused workflows).
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh test -p typecheck-ts

      - name: emit-js (TS erasure groundwork)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: bash scripts/cargo_agent.sh test -p emit-js

      - name: ts-erase (if present)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          if cargo metadata --no-deps --format-version 1 | rg -q '"name":"ts-erase"'; then
            bash scripts/cargo_agent.sh test -p ts-erase
          else
            echo "ts-erase package not present in this checkout; skipping."
          fi

      - name: native-oracle-harness (if present)
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          if cargo metadata --no-deps --format-version 1 | rg -q '"name":"native-oracle-harness"'; then
            bash scripts/cargo_agent.sh test -p native-oracle-harness
          else
            echo "native-oracle-harness package not present in this checkout; skipping."
          fi

      - name: runtime-native reactor conformance
        working-directory: vendor/ecma-rs
        env:
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
        run: |
          set -euo pipefail
          # Only run the portable reactor conformance suite; `runtime-native` has other tests/benches
          # that may be heavier and are not needed for this workflow's goals.
          bash scripts/cargo_agent.sh test -p runtime-native --test reactor_conformance

  ecma-rs-native-macos:
    name: ecma-rs native reactor (macOS, Rust 1.92.0)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Keep CI lightweight: do not fetch heavyweight nested corpora submodules (test262,
          # TypeScript, ...). This job relies only on the vendored source + fixtures.
          submodules: false

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Cache cargo registry (ecma-rs native macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-ecma-rs-native-macos-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-macos-cargo-registry-

      - name: Cache cargo git (ecma-rs native macOS)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-ecma-rs-native-macos-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-macos-cargo-git-

      - name: Cache target dir (vendor/ecma-rs, macOS)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-ecma-rs-native-reactor-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-ecma-rs-native-reactor-target-1.92.0-

      - name: Generate Cargo.lock (vendor/ecma-rs)
        working-directory: vendor/ecma-rs
        run: cargo generate-lockfile

      - name: runtime-native reactor conformance (kqueue + wake)
        working-directory: vendor/ecma-rs
        run: |
          set -euo pipefail
          cargo test -p runtime-native --test reactor_conformance --locked
          # Exercise the force-pipe wake fallback path on platforms that default to kqueue/EVFILT_USER.
          cargo test -p runtime-native --test reactor_conformance --locked --features force_pipe_wake
