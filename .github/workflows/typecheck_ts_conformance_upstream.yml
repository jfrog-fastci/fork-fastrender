name: typecheck-ts upstream conformance

concurrency:
  group: typecheck-ts-upstream-conformance-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - ".gitmodules"
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/ci_init_ecma_rs_submodule.sh"
      - ".github/workflows/typecheck_ts_conformance_upstream.yml"
  pull_request:
    paths:
      - ".gitmodules"
      - "vendor/ecma-rs/**"
      - "scripts/cargo_agent.sh"
      - "scripts/ci_init_ecma_rs_submodule.sh"
      - ".github/workflows/typecheck_ts_conformance_upstream.yml"
  # Full upstream conformance runs are heavy; keep them on a schedule + manual dispatch.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      shard_total:
        description: "Total number of shards (default: 16)"
        required: false
        default: "16"
      shards:
        description: "Comma-separated shard indices to run (blank = all shards)"
        required: false
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

  # Conformance is large; keep the PR signal lightweight and run the full shard
  # set only on schedule/workflow_dispatch.
  #
  # - PR/push: runs a single shard (`0/N`) as a smoke test.
  # - schedule/manual: runs all `0..N-1` shards.
  #
  # Adjust `UPSTREAM_CONFORMANCE_SHARD_TOTAL` to change the full run size.
  UPSTREAM_CONFORMANCE_SHARD_TOTAL: "16"
  # For workflow_dispatch only: override the shard count without editing the workflow.
  UPSTREAM_CONFORMANCE_SHARD_TOTAL_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.shard_total || '' }}
  UPSTREAM_CONFORMANCE_PR_SHARDS: "0"
  # For workflow_dispatch only: override which shards run (comma-separated indices).
  UPSTREAM_CONFORMANCE_SHARDS_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.shards || '' }}

jobs:
  upstream-conformance-matrix:
    name: Compute upstream conformance shard matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      run_enabled: ${{ steps.manifest.outputs.run_enabled }}
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Ensure upstream expectations manifest exists
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          manifest="vendor/ecma-rs/typecheck-ts-harness/fixtures/conformance-upstream/manifest.toml"
          if [[ -f "${manifest}" ]]; then
            echo "run_enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::warning::Upstream conformance expectations manifest is missing (${manifest})." >&2
          echo "::warning::Skipping upstream conformance on PR/push; scheduled/manual runs require a checked-in manifest." >&2

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "::error::Refusing to run scheduled/manual upstream conformance without a checked-in manifest." >&2
            exit 1
          fi

          echo "run_enabled=false" >> "${GITHUB_OUTPUT}"

      - name: Compute matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          shard_total="${UPSTREAM_CONFORMANCE_SHARD_TOTAL}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${UPSTREAM_CONFORMANCE_SHARD_TOTAL_INPUT:-}" ]]; then
            shard_total="${UPSTREAM_CONFORMANCE_SHARD_TOTAL_INPUT}"
          fi
          if [[ ! "${shard_total}" =~ ^[0-9]+$ || "${shard_total}" -eq 0 ]]; then
            echo "::error::Invalid shard_total '${shard_total}' (expected a positive integer)." >&2
            exit 1
          fi
          export shard_total

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${UPSTREAM_CONFORMANCE_SHARDS_INPUT:-}" ]]; then
              shard_indices="${UPSTREAM_CONFORMANCE_SHARDS_INPUT}"
            else
              shard_indices="$(python3 - <<PY
          import os
          n = int(os.environ["shard_total"])
          print(",".join(str(i) for i in range(n)))
          PY
              )"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            shard_indices="$(python3 - <<PY
          import os
          n = int(os.environ["shard_total"])
          print(",".join(str(i) for i in range(n)))
          PY
            )"
          else
            # PR/push safety: only run a small shard set (see env docs above).
            shard_indices="${UPSTREAM_CONFORMANCE_PR_SHARDS}"
          fi

          export shard_total shard_indices
          matrix="$(python3 - <<PY
          import json
          import os
          import re
          
          n = int(os.environ["shard_total"])
          raw = os.environ.get("shard_indices", "").strip()
          if raw:
            parts = [p.strip() for p in raw.split(",") if p.strip() != ""]
          else:
            parts = []
          
          indices = []
          for part in parts:
            if not re.fullmatch(r"\\d+", part):
              raise SystemExit(f"error: invalid shard index '{part}' (expected integer)")
            idx = int(part)
            if idx < 0 or idx >= n:
              raise SystemExit(f"error: shard index {idx} out of range (valid: 0..{n - 1})")
            indices.append(idx)
          
          # Preserve order but drop duplicates.
          seen = set()
          deduped = []
          for idx in indices:
            if idx in seen:
              continue
            seen.add(idx)
            deduped.append(idx)
          
          print(json.dumps({"include": [{"shard_index": i, "shard_total": n} for i in deduped]}))
          PY
          )"

          echo "shard_total=${shard_total}" >> "${GITHUB_OUTPUT}"
          echo "shard_indices=${shard_indices}" >> "${GITHUB_OUTPUT}"
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

      - name: Matrix summary (step summary)
        if: always()
        run: |
          {
            echo "## Upstream TS conformance matrix"
            echo
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Enabled: ${{ steps.manifest.outputs.run_enabled }}"
            echo "- Shard total (effective): ${{ steps.compute.outputs.shard_total }}"
            echo "- Shards (effective): ${{ steps.compute.outputs.shard_indices }}"
            echo "- Shards (default full run): ${UPSTREAM_CONFORMANCE_SHARD_TOTAL}"
            echo "- Shards (default PR/push): ${UPSTREAM_CONFORMANCE_PR_SHARDS}"
            echo
            echo '```json'
            echo '${{ steps.compute.outputs.matrix }}'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  upstream-conformance:
    name: Upstream TypeScript conformance (${{ matrix.shard_index }}/${{ matrix.shard_total }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: upstream-conformance-matrix
    if: needs.upstream-conformance-matrix.outputs.run_enabled == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.upstream-conformance-matrix.outputs.matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      # `submodules: recursive` is required so CI can see the upstream TypeScript suite at
      # `vendor/ecma-rs/parse-js/tests/TypeScript`. The repository also has other heavyweight
      # corpora/spec submodules that we do *not* need for this job, so mark only the TypeScript
      # submodule as active to keep checkout time reasonable.
      - name: Limit active submodules to TypeScript suite
        run: |
          set -euo pipefail
          git config --global --unset-all submodule.active || true
          # Git considers submodules "active" by default when they have a URL configured, even if
          # `submodule.active` is present. Use explicit `:(exclude)` pathspecs to deactivate the
          # heavyweight corpora/spec submodules so `actions/checkout` doesn't fetch them.
          #
          # TypeScript suite (needed):
          # - current monorepo layout: vendor/ecma-rs/parse-js/tests/TypeScript
          # - legacy layout where `vendor/ecma-rs` was itself a submodule: parse-js/tests/TypeScript
          git config --global --add submodule.active vendor/ecma-rs/parse-js/tests/TypeScript
          git config --global --add submodule.active parse-js/tests/TypeScript
          # Exclude other heavyweight submodules we don't need for typecheck conformance CI.
          git config --global --add submodule.active ":(exclude)specs/**"
          git config --global --add submodule.active ":(exclude)vendor/ecma-rs/test262/**"
          git config --global --add submodule.active ":(exclude)vendor/ecma-rs/test262-semantic/**"

      - name: Checkout (with TypeScript suite)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Assert TypeScript conformance suite is present
        shell: bash
        run: |
          set -euo pipefail
          suite="vendor/ecma-rs/parse-js/tests/TypeScript/tests/cases/conformance"
          if [[ ! -d "${suite}" ]]; then
            echo "::error::Missing TypeScript conformance suite directory (${suite}). Did the submodule checkout fail?" >&2
            exit 1
          fi
          if [[ -z "$(find "${suite}" -type f -print -quit)" ]]; then
            echo "::error::TypeScript conformance suite appears empty (${suite}). Did the submodule checkout fail?" >&2
            exit 1
          fi

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          # Match `vendor/ecma-rs/rust-toolchain.toml`.
          toolchain: "1.92.0"

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vendor/ecma-rs/typecheck-ts-harness/package-lock.json

      - name: Cache cargo registry (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-typecheck-ts-upstream-conformance-cargo-registry-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-typecheck-ts-upstream-conformance-cargo-registry-

      - name: Cache cargo git (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-typecheck-ts-upstream-conformance-cargo-git-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-typecheck-ts-upstream-conformance-cargo-git-

      - name: Cache target dir (vendor/ecma-rs)
        uses: actions/cache@v4
        with:
          path: vendor/ecma-rs/target
          key: ${{ runner.os }}-typecheck-ts-upstream-conformance-target-1.92.0-${{ hashFiles('vendor/ecma-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-typecheck-ts-upstream-conformance-target-1.92.0-

      - name: Init ecma-rs checkout (vendored/submodule compatibility)
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: "CI guardrails: no merge conflict markers (Rust sources, ecma-rs aware)"
        run: bash scripts/check_no_conflict_markers.sh

      - name: TypeScript version sync (vendor/ecma-rs)
        working-directory: vendor/ecma-rs
        run: bash scripts/check_typescript_version_sync.sh

      - name: Install typecheck-ts-harness Node deps (npm ci)
        run: |
          set -euo pipefail
          cd vendor/ecma-rs/typecheck-ts-harness
          npm ci --ignore-scripts

      - name: Run upstream TypeScript conformance shard (compare vs tsc)
        id: run_conformance
        working-directory: vendor/ecma-rs
        env:
          # Keep cargo_agent locks within the ecma-rs workspace target dir.
          FASTR_CARGO_LOCK_DIR: target/.cargo_agent_locks
          # Cap Rust-side parallelism; the harness has its own `--jobs` flag.
          RAYON_NUM_THREADS: 4
        run: |
          set -euo pipefail

          report_path="${GITHUB_WORKSPACE}/typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.json"
          stderr_path="${GITHUB_WORKSPACE}/typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.stderr.log"
          triage_path="${GITHUB_WORKSPACE}/typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.json"
          triage_stderr_path="${GITHUB_WORKSPACE}/typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.stderr.log"
          triage_manifest_path="${GITHUB_WORKSPACE}/typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.manifest.toml"
          rm -f "${report_path}" "${stderr_path}"
          rm -f "${triage_path}" "${triage_stderr_path}"
          rm -f "${triage_manifest_path}"

          status=0
          run_timeout_secs=600
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Scheduled/manual runs execute the full shard set; give each shard
            # more time to complete (still bounded so hangs can't stall CI forever).
            run_timeout_secs=1800
          fi
          timeout -k 10 "${run_timeout_secs}" bash scripts/cargo_agent.sh run -p typecheck-ts-harness --release -- \
            conformance \
            --root parse-js/tests/TypeScript/tests/cases/conformance \
            --compare tsc \
            --fail-on new \
            --manifest typecheck-ts-harness/fixtures/conformance-upstream/manifest.toml \
            --json \
            --jobs 4 \
            --timeout-secs 20 \
            --shard ${{ matrix.shard_index }}/${{ matrix.shard_total }} \
            --shard-strategy hash \
            > "${report_path}" 2> >(tee "${stderr_path}" >&2) || status=$?

          # The harness is expected to emit JSON even on failure (e.g. uncovered regressions).
          if [[ ! -s "${report_path}" ]]; then
            echo "::error::typecheck-ts-harness did not emit a JSON report (stdout was empty). See ${stderr_path}." >&2
            echo '{"compare_mode":"tsc","results":[],"error":"no_json_report"}' > "${report_path}"
            # Preserve the original exit status (e.g. timeout) if one was produced.
            if [[ "${status}" -eq 0 ]]; then
              status=1
            fi
          else
            # Ensure the report is valid JSON so downstream triage tooling can rely on it.
            if ! REPORT_PATH="${report_path}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          path = Path(os.environ["REPORT_PATH"])
          data = json.loads(path.read_text(encoding="utf-8"))
          if not isinstance(data, dict):
            raise SystemExit("report JSON should be an object")
          PY
            then
              echo "::error::typecheck-ts-harness emitted an invalid JSON report. See ${report_path} and ${stderr_path}." >&2
              echo '{"compare_mode":"tsc","results":[],"error":"invalid_json_report"}' > "${report_path}"
              if [[ "${status}" -eq 0 ]]; then
                status=1
              fi
            fi
          fi

          # Generate a triage report from the JSON (captures top codes/outcomes/prefixes and suggested
          # manifest entries). This should succeed even when the conformance run found uncovered
          # mismatches; in that case we still want an artifact for debugging.
          if [[ -x "target/release/typecheck-ts-harness" ]]; then
            timeout -k 10 120 target/release/typecheck-ts-harness triage --input "${report_path}" --json \
              > "${triage_path}" 2> "${triage_stderr_path}" || true
            timeout -k 10 120 target/release/typecheck-ts-harness triage --input "${report_path}" --emit-manifest \
              > "${triage_manifest_path}" 2> /dev/null || true
          fi
          if [[ ! -s "${triage_path}" ]]; then
            echo "{\"error\":\"triage_failed\"}" > "${triage_path}"
          fi
          if [[ ! -s "${triage_stderr_path}" ]]; then
            echo "triage: failed or produced no output" > "${triage_stderr_path}"
          fi
          if [[ ! -s "${triage_manifest_path}" ]]; then
            echo "# triage: failed or produced no manifest suggestions" > "${triage_manifest_path}"
          fi

          echo "status=${status}" >> "${GITHUB_OUTPUT}"

      - name: Upload conformance shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck_ts_conformance_upstream_shard_${{ matrix.shard_index }}
          path: |
            typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.json
            typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.stderr.log
            typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.json
            typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.stderr.log
            typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.manifest.toml
          if-no-files-found: error

      - name: Shard summary (step summary)
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          report_path = Path(os.environ["REPORT_PATH"])
          triage_stderr_path = Path(os.environ["TRIAGE_STDERR_PATH"])
          shard = os.environ["SHARD"]
          shard_total = os.environ["SHARD_TOTAL"]
          status = os.environ.get("STATUS", "")
          
          data = {}
          if report_path.exists():
            try:
              data = json.loads(report_path.read_text())
            except Exception as exc:
              data = {"error": f"failed to parse JSON report: {exc}"}
          else:
            data = {"error": "missing JSON report"}
          
          summary = data.get("summary") if isinstance(data, dict) else None
          outcomes = summary.get("outcomes") if isinstance(summary, dict) else None
          mismatches = summary.get("mismatches") if isinstance(summary, dict) else None
          
          def get_int(obj, key):
            if not isinstance(obj, dict):
              return 0
            val = obj.get(key, 0)
            return val if isinstance(val, int) else 0
          
          total = get_int(summary, "total")
          match = get_int(outcomes, "match")
          extra = get_int(outcomes, "rust_extra_diagnostics")
          missing = get_int(outcomes, "rust_missing_diagnostics")
          span = get_int(outcomes, "span_mismatch")
          code = get_int(outcomes, "code_mismatch")
          ice = get_int(outcomes, "rust_ice")
          tsc_crashed = get_int(outcomes, "tsc_crashed")
          timeout = get_int(outcomes, "timeout")
          
          expected = get_int(mismatches, "expected")
          unexpected = get_int(mismatches, "unexpected")
          flaky = get_int(mismatches, "flaky")
          xpass = get_int(mismatches, "xpass")
          
          lines = []
          lines.append(f"## Upstream TS conformance shard {shard}/{shard_total}")
          lines.append("")
          if status:
            lines.append(f"- Exit status: `{status}`")
          if "error" in data:
            lines.append(f"- Report error: `{data['error']}`")
          else:
            lines.append(f"- Total cases: {total}")
            lines.append(
              f"- Outcomes: match={match}, extra={extra}, missing={missing}, span={span}, code={code}, rust_ice={ice}, tsc_crashed={tsc_crashed}, timeout={timeout}"
            )
            if isinstance(mismatches, dict):
              lines.append(f"- Mismatches: expected={expected}, unexpected={unexpected}, flaky={flaky}, xpass={xpass}")
          lines.append("")
          
          if triage_stderr_path.exists():
            triage_lines = triage_stderr_path.read_text(encoding="utf-8", errors="replace").splitlines()
            if triage_lines:
              lines.append("### Triage summary")
              lines.append("")
              lines.append("```")
              lines.extend(triage_lines[:200])
              if len(triage_lines) > 200:
                lines.append("... (truncated)")
              lines.append("```")
              lines.append("")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
            with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n".join(lines))
              f.write("\n")
          PY
        env:
          REPORT_PATH: typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.json
          TRIAGE_STDERR_PATH: typecheck-conformance-upstream-shard-${{ matrix.shard_index }}.triage.stderr.log
          SHARD: ${{ matrix.shard_index }}
          SHARD_TOTAL: ${{ matrix.shard_total }}
          STATUS: ${{ steps.run_conformance.outputs.status }}

      - name: Fail on uncovered regressions (post-upload)
        if: steps.run_conformance.outputs.status != '0'
        run: exit ${{ steps.run_conformance.outputs.status }}

  upstream-conformance-merge:
    name: Upstream TypeScript conformance (merged triage)
    runs-on: ubuntu-latest
    needs:
      - upstream-conformance-matrix
      - upstream-conformance
    if: >-
      always() &&
      needs.upstream-conformance-matrix.outputs.run_enabled == 'true' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Install Rust toolchain (vendor/ecma-rs)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"

      - name: Install jq (if missing)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: typecheck_ts_conformance_upstream_shard_*
          path: reports/shards
          merge-multiple: true

      - name: Merge shard JSON reports
        run: |
          set -euo pipefail
          mkdir -p reports

          shopt -s nullglob
          all=(reports/shards/typecheck-conformance-upstream-shard-*.json)
          files=()
          for f in "${all[@]}"; do
            # Exclude the per-shard triage JSON artifacts; we only want the raw conformance reports.
            if [[ "${f}" == *.triage.json ]]; then
              continue
            fi
            files+=("${f}")
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No shard conformance JSON reports found under reports/shards/." >&2
            exit 1
          fi

          # Surface stub-report errors (e.g. shard crashed before emitting JSON).
          : > reports/typecheck-ts-upstream-conformance-shard-errors.txt
          for f in "${files[@]}"; do
            err="$(jq -r '.error // empty' "$f" || true)"
            if [[ -n "${err}" ]]; then
              echo "${f}: ${err}" | tee -a reports/typecheck-ts-upstream-conformance-shard-errors.txt >&2
            fi
          done
          if [[ ! -s reports/typecheck-ts-upstream-conformance-shard-errors.txt ]]; then
            echo "(none)" > reports/typecheck-ts-upstream-conformance-shard-errors.txt
          fi

          jq -s '{
            compare_mode: (.[0].compare_mode),
            results: ([.[].results[]] | sort_by(.id))
          }' "${files[@]}" > reports/typecheck-ts-upstream-conformance-merged.json

      - name: Triage merged report
        run: |
          set -euo pipefail

          # Ensure the vendored `vendor/ecma-rs` tree is available for the nested cargo wrapper.
          bash scripts/ci_init_ecma_rs_submodule.sh
          bash scripts/check_no_conflict_markers.sh

          timeout -k 10 600 bash vendor/ecma-rs/scripts/cargo_agent.sh run -p typecheck-ts-harness --release -- \
            triage \
            --input reports/typecheck-ts-upstream-conformance-merged.json \
            --json \
            > reports/typecheck-ts-upstream-conformance-triage.json 2> reports/typecheck-ts-upstream-conformance-triage.stderr.log

          timeout -k 10 600 bash vendor/ecma-rs/scripts/cargo_agent.sh run -p typecheck-ts-harness --release -- \
            triage \
            --input reports/typecheck-ts-upstream-conformance-merged.json \
            --emit-manifest \
            > reports/typecheck-ts-upstream-conformance-suggestions.toml 2> /dev/null

      - name: Upload merged reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck_ts_conformance_upstream_merged
          path: |
            reports/typecheck-ts-upstream-conformance-shard-errors.txt
            reports/typecheck-ts-upstream-conformance-merged.json
            reports/typecheck-ts-upstream-conformance-triage.json
            reports/typecheck-ts-upstream-conformance-triage.stderr.log
            reports/typecheck-ts-upstream-conformance-suggestions.toml
