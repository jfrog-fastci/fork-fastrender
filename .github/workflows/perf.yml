name: Performance regression

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGRESSION_THRESHOLD: "0.05"
  REGRESSION_METRIC: median
  UI_PERF_SMOKE_THRESHOLD: "0.05"

jobs:
  perf-regressions:
    name: Criterion perf regressions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources, ecma-rs aware)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Init required spec submodules
        shell: bash
        run: |
          set -euo pipefail
          # The vendored `parse-js` crate uses `include_str!` on these TC39 HTML tables.
          git submodule update --init specs/tc39-ecma262

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: perf-cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: perf-cargo-index-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: perf-cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run perf regression benches
        run: cargo bench --bench perf_regressions --locked -- --noplot

      - name: Upload Criterion output
        uses: actions/upload-artifact@v4
        with:
          name: criterion-output
          path: target/criterion
          if-no-files-found: error

      - name: Download previous baseline
        id: download_baseline
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: perf.yml
          workflow_conclusion: success
          branch: main
          name: criterion-output
          path: baseline

      - name: Locate baseline measurements
        if: steps.download_baseline.outcome == 'success'
        run: |
          set -e
          if [ -d baseline/target/criterion ]; then
            echo "BASELINE_DIR=baseline/target/criterion" >> "$GITHUB_ENV"
            exit 0
          fi
          match=$(find baseline -type d -path "*/target/criterion" | head -n 1 || true)
          if [ -z "$match" ]; then
            echo "Downloaded artifact did not contain target/criterion" >&2
            exit 1
          fi
          echo "BASELINE_DIR=$match" >> "$GITHUB_ENV"
          echo "Using baseline directory at $match"

      - name: Compare against baseline
        if: steps.download_baseline.outcome == 'success'
        run: |
          set -o pipefail
          cargo run --release --bin bench_compare -- \
            --baseline "${BASELINE_DIR}" \
            --new target/criterion \
            --regression-threshold "${REGRESSION_THRESHOLD}" \
            --metric "${REGRESSION_METRIC}" | tee bench_compare_report.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Criterion regression check"
            echo
            echo '```'
            cat bench_compare_report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Baseline unavailable
        if: steps.download_baseline.outcome != 'success'
        run: |
          echo "Previous perf benchmark artifact not found; skipping regression gate."
          {
            echo "## Criterion regression check"
            echo
            echo "No prior baseline artifact was available from main."
            echo "The uploaded Criterion output from this run will serve as the next baseline."
          } >> "$GITHUB_STEP_SUMMARY"

  ui-perf-smoke:
    name: UI perf smoke regressions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "CI guardrails: no merge conflict markers (Rust sources)"
        shell: bash
        run: bash scripts/ci_check_no_merge_conflicts.sh

      - name: Init ecma-rs submodule
        shell: bash
        run: bash scripts/ci_init_ecma_rs_submodule.sh

      - name: Assert ecma-rs is checked out
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f vendor/ecma-rs/Cargo.toml ]; then
            echo "Missing vendor/ecma-rs submodule checkout (expected vendor/ecma-rs/Cargo.toml)." >&2
            echo "Run: git submodule update --init vendor/ecma-rs" >&2
            exit 1
          fi

      - name: "CI guardrails: no merge conflict markers (Rust sources, ecma-rs aware)"
        shell: bash
        run: bash scripts/check_no_conflict_markers.sh

      - name: Init required spec submodules
        shell: bash
        run: |
          set -euo pipefail
          # The vendored `parse-js` crate uses `include_str!` on these TC39 HTML tables.
          git submodule update --init specs/tc39-ecma262

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ui-perf-cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ui-perf-cargo-index-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ui-perf-cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ui_perf_smoke (release)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/cargo_agent.sh build --locked --release --bin ui_perf_smoke

      - name: Download previous ui_perf_smoke baseline
        id: download_ui_perf_baseline
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: perf.yml
          workflow_conclusion: success
          branch: main
          name: ui_perf_smoke
          path: baseline

      - name: Locate ui_perf_smoke baseline JSON
        if: steps.download_ui_perf_baseline.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f baseline/target/ui_perf_smoke.json ]; then
            echo "UI_PERF_SMOKE_BASELINE=baseline/target/ui_perf_smoke.json" >> "$GITHUB_ENV"
            exit 0
          fi
          match=$(find baseline -type f -name "ui_perf_smoke.json" | head -n 1 || true)
          if [ -z "$match" ]; then
            echo "Downloaded baseline artifact did not contain ui_perf_smoke.json" >&2
            exit 1
          fi
          echo "UI_PERF_SMOKE_BASELINE=$match" >> "$GITHUB_ENV"
          echo "Using ui_perf_smoke baseline at $match"

      - name: Run ui_perf_smoke (baseline gate when available)
        id: ui_perf_smoke
        shell: bash
        run: |
          set -euo pipefail
          report_path=target/ui_perf_smoke_report.txt
          status=0
          args=(--output target/ui_perf_smoke.json)

          if [ -n "${UI_PERF_SMOKE_BASELINE:-}" ]; then
            args+=(--baseline "${UI_PERF_SMOKE_BASELINE}")
            args+=(--threshold "${UI_PERF_SMOKE_THRESHOLD}")
            args+=(--fail-on-regression)
          fi

          FASTR_USE_BUNDLED_FONTS=1 \
          RAYON_NUM_THREADS=1 \
            bash scripts/run_limited.sh --as 64G -- \
              target/release/ui_perf_smoke "${args[@]}" \
              > /dev/null 2> "${report_path}" || status=$?

          if [ ! -s target/ui_perf_smoke.json ]; then
            echo "ui_perf_smoke did not produce target/ui_perf_smoke.json" >&2
            status=1
          fi

          cat "${report_path}" >&2 || true

          {
            echo "## UI perf smoke regression check"
            echo
            if [ -n "${UI_PERF_SMOKE_BASELINE:-}" ]; then
              echo "Baseline: ${UI_PERF_SMOKE_BASELINE}"
              echo "Threshold: ${UI_PERF_SMOKE_THRESHOLD} (relative)"
            else
              echo "No prior baseline artifact was available from main; skipping regression gate."
              echo "Threshold: ${UI_PERF_SMOKE_THRESHOLD} (relative)"
              echo
              echo "The uploaded ui_perf_smoke output from this run will serve as the next baseline."
            fi
            echo
            echo '```'
            tail -n 200 "${report_path}" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit $status

      - name: Upload ui_perf_smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui_perf_smoke
          path: target/ui_perf_smoke.json
          if-no-files-found: ignore
