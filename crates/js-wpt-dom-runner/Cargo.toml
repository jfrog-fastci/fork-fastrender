[package]
name = "js-wpt-dom-runner"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
conformance-harness = { path = "../../engines/ecma-rs/conformance-harness" }
globset = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1.0"
url = "2.5"
walkdir = "2"
html5ever = "0.35"
markup5ever_rcdom = "0.35"
vm-js = { path = "../../engines/ecma-rs/vm-js" }
parse-js = { path = "../../engines/ecma-rs/parse-js" }
