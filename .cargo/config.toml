[alias]
xtask = "run -p xtask --"

[env]
# libaom (used for AVIF decoding via `image`/`avif-decode`) requires an assembler (yasm/nasm) for
# optimized builds. Our CI/agent environments don't necessarily have those tools installed, so
# force the portable (non-asm) build by default.
#
# This keeps `cargo build` working out-of-the-box while still supporting AVIF decode.
AOM_TARGET_CPU = "generic"

# Some sys crates (notably `libaom-sys`, used for AVIF decoding) use CMake and attempt to enable
# x86_64 assembly optimizations. Our CI/container images do not ship with `yasm`/`nasm`, so force
# libaom to fall back to the generic (no-asm) CPU target.
#
# Override `AOM_TARGET_CPU` in your shell to re-enable optimized builds.
#
# `cmake` crate forwards this env var as extra configure args.
CMAKE_ARGS = "-DAOM_TARGET_CPU=generic"

[build]
# Some of our agent/CI environments configure a global `build.rustc-wrapper` (often `sccache`).
# Under `scripts/run_limited.sh` (RLIMIT_AS), that wrapper can fail before Cargo even starts
# compiling (e.g. while probing `rustc -vV`).
#
# Force-disable any globally configured wrapper so `scripts/cargo_agent.sh` works reliably.
rustc-wrapper = ""
rustc-workspace-wrapper = ""
# Use the mold linker on Linux for much faster links (and to avoid sporadic `rust-lld` SIGBUS
# incidents observed under heavy concurrency).
#
# `clang` is used as the linker driver because it consistently supports `-fuse-ld=...`.
[target.'cfg(target_os = "linux")']
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
