[alias]
xtask = "run -p xtask --"

# Some sys crates (notably `libaom-sys`, used for AVIF decoding) use CMake and attempt to enable
# x86_64 assembly optimizations. Our CI/container images do not ship with `yasm`/`nasm`, so force
# libaom to fall back to the generic (no-asm) CPU target.
#
# Override `AOM_TARGET_CPU` in your shell to re-enable optimized builds.
# `cmake` crate forwards `CMAKE_ARGS` as extra configure args.
[env]
AOM_TARGET_CPU = "generic"
CMAKE_ARGS = "-DAOM_TARGET_CPU=generic"

# Use the mold linker on Linux for much faster links (and to avoid sporadic `rust-lld` SIGBUS
# incidents observed under heavy concurrency).
#
# `clang` is used as the linker driver because it consistently supports `-fuse-ld=...`.
[target.'cfg(target_os = "linux")']
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
