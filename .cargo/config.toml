[alias]
xtask = "run -p xtask --"

[env]
# libaom (used for AVIF decoding via `avif-decode`/`libaom-sys`) enables x86_64 assembly
# optimizations by default and fails configuration when no assembler (yasm/nasm) is available.
#
# Some CI/agent/container environments do not ship those tools, so wrap CMake so `libaom-sys`
# configure steps default to a portable (non-asm) build.
#
# Override by setting `AOM_TARGET_CPU` to a non-`generic` value (and ensuring yasm/nasm are
# installed) if you want the optimized build.
CMAKE = { value = "tools/cmake_wrapper.sh", relative = true }

# The Rust test harness runs each `#[test]` in its own thread with a small default stack (often
# ~2MiB). Some of our layout tests exercise deeply-recursive layout paths and can overflow that
# default. Bump the minimum stack size for spawned threads so `cargo test` is reliable.
RUST_MIN_STACK = "4194304"

# `vendor/ecma-rs` uses `RUSTC_BOOTSTRAP=1` so the nested workspace can use a stable toolchain while
# still enabling a small number of unstable features (e.g. `#[thread_local]` in `runtime-native`).
# Setting it at the repo root ensures `cargo test --manifest-path vendor/ecma-rs/...` works when
# invoked from this workspace.
RUSTC_BOOTSTRAP = "1"
[build]
# Some of our agent/CI environments configure a global `build.rustc-wrapper` (often `sccache`).
# Under `scripts/run_limited.sh` (RLIMIT_AS), that wrapper can fail before Cargo even starts
# compiling (e.g. while probing `rustc -vV`).
#
# Force-disable any globally configured wrapper so `scripts/cargo_agent.sh` works reliably.
rustc-wrapper = ""
rustc-workspace-wrapper = ""

# `vendor/ecma-rs/runtime-native`'s FP-based stack walker requires frame pointers.
# Enforce them at the repo level so `cargo test --manifest-path vendor/ecma-rs/...` works from
# this repository root without extra environment setup.
rustflags = ["-C", "force-frame-pointers=yes"]
[target.'cfg(target_os = "linux")']
# Use `clang` as the linker driver on Linux.
#
# Prefer `mold` when available via a small wrapper to keep linking fast for huge debug/test
# binaries, while remaining portable in environments that don't ship `mold`.
linker = "tools/clang_wrapper.sh"
rustflags = ["-C", "force-frame-pointers=yes"]
#
# NOTE: We intentionally avoid hard-coding `-fuse-ld=mold` here because `clang` errors when `ld.mold`
# is missing. `tools/clang_wrapper.sh` enables it conditionally when available.
