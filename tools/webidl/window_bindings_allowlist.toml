# WebIDL allowlist for Window-facing bindings generation (`bash scripts/cargo_agent.sh xtask webidl-bindings`).
#
# This controls what gets emitted into:
# - src/js/webidl/bindings/generated/mod.rs
#
# The generator treats this file as the source of truth for *what* gets generated and will fail if
# any allowlisted interface/member is missing from `src/webidl/generated/mod.rs` (typo guard).
#
# Keep this intentionally small and grow it as new Window-facing APIs are implemented.
prototype_chains = true

[[interface]]
name = "EventTarget"
constructors = true
attributes = []
operations = ["addEventListener", "removeEventListener", "dispatchEvent"]

[[interface]]
name = "Node"
constructors = false
attributes = [
  "nodeType",
  "nodeName",
  "parentNode",
  "parentElement",
  "childNodes",
  "firstChild",
  "lastChild",
  "nextSibling",
  "previousSibling",
  "textContent",
]
operations = ["appendChild", "insertBefore", "removeChild", "replaceChild", "cloneNode"]

[[interface]]
name = "CharacterData"
constructors = false
attributes = []
operations = []

[[interface]]
name = "Document"
constructors = false
attributes = ["documentElement", "body", "head"]
operations = [
  "getElementById",
  "getElementsByClassName",
  "getElementsByTagName",
  "getElementsByTagNameNS",
  "getElementsByName",
  "querySelector",
  "querySelectorAll",
  "createElement",
  "createTextNode",
  "createDocumentFragment",
]

[[interface]]
name = "DocumentFragment"
constructors = false
attributes = []
operations = []

[[interface]]
name = "Element"
constructors = false
attributes = [
  "id",
  "className",
  "classList",
  "tagName",
  "children",
  "firstElementChild",
  "lastElementChild",
  "childElementCount",
  "nextElementSibling",
  "previousElementSibling",
  "style",
  "offsetWidth",
  "offsetHeight",
  "offsetLeft",
  "offsetTop",
  "clientWidth",
  "clientHeight",
  "scrollWidth",
  "scrollHeight",
  "scrollTop",
  "scrollLeft",
]
operations = [
  "append",
  "prepend",
  "remove",
  "getAttribute",
  "setAttribute",
  "removeAttribute",
  "matches",
  "closest",
  "getBoundingClientRect",
  "getElementsByTagName",
  "getElementsByClassName",
  "getElementsByTagNameNS",
  "querySelector",
  "querySelectorAll",
  "replaceWith",
]

[[interface]]
name = "Text"
constructors = false
attributes = []
operations = []

[[interface]]
name = "NodeList"
constructors = false
attributes = ["length"]
operations = ["item"]

[[interface]]
name = "HTMLCollection"
constructors = false
attributes = ["length"]
operations = ["item", "namedItem"]

[[interface]]
name = "DOMTokenList"
constructors = false
attributes = ["value", "length"]
operations = ["add", "remove", "toggle", "contains", "replace", "item", "supports"]

[[interface]]
name = "URL"
constructors = true
attributes = ["href", "origin", "searchParams"]
operations = ["toJSON", "canParse", "parse"]

[[interface]]
name = "URLSearchParams"
constructors = true
attributes = ["size"]
# Intentionally exclude `sort` so a unit test can validate the allowlist is honored.
operations = ["append", "delete", "get", "getAll", "has", "set"]

[[interface]]
name = "Window"
constructors = false
attributes = ["document"]
operations = ["alert", "setTimeout", "setInterval", "clearTimeout", "clearInterval", "queueMicrotask"]
