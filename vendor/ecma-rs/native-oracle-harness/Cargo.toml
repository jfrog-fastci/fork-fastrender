[package]
name = "native-oracle-harness"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
# Enable falling back to the `optimize-js` decompiler when `ts-erase` or
# `emit-js` cannot handle a particular TypeScript construct yet.
optimize-js-fallback = ["dep:optimize-js"]
# Enable strict-native typechecking via the `typecheck-ts` crate.
typecheck-strict-native = ["dep:typecheck-ts"]
# Enable running TS fixtures through `native-js` and comparing their stdout to the
# `vm-js` oracle.
native-js-runner = ["dep:native-js", "dep:wait-timeout"]

[dependencies]
diagnostics = { workspace = true }
emit-js = { workspace = true }
parse-js = { workspace = true, features = ["diagnostics"] }
thiserror = { workspace = true }
ts-erase = { workspace = true }
vm-js = { workspace = true }
toml = { workspace = true }
typecheck-ts = { workspace = true, optional = true }

optimize-js = { workspace = true, optional = true }
native-js = { workspace = true, optional = true }
wait-timeout = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
