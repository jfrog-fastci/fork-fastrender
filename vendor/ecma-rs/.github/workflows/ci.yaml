name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-js:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: prettier --check
        run: >
          npx --yes prettier@3.4.2 --check
          'version'
          '.github/workflows/*.yaml'
          'minify-js-nodejs/**/*.{js,json,ts,d.ts}'
          'optimize-js-debugger/src/**/*.{ts,tsx,css,html}'
          'optimize-js-debugger/*.ts'
          'typecheck-ts-harness/scripts/*.js'

  test:
    runs-on: ubuntu-24.04
    needs: fmt-js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep clang lld llvm

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: Lint committed TypeScript baselines
        run: cargo run -p typecheck-ts-harness --locked -- lint-baselines

      - name: Check UTF-8 source-text public APIs
        run: ./scripts/check_utf8_apis.sh
      - name: Check diagnostic codes
        run: ./scripts/check_diagnostic_codes.sh
      - name: Check TypeScript version sync
        run: ./scripts/check_typescript_version_sync.sh

      # native-js / native-js-cli depend on LLVM via llvm-sys/inkwell.
      # Keep the base workspace CI job LLVM-free and lint/test them in a
      # dedicated job that installs LLVM 18.
      - name: cargo clippy (workspace)
        env:
          # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
          RUSTFLAGS: -C force-frame-pointers=yes
        run: >
          cargo clippy --workspace --all-targets --all-features
          --exclude native-js --exclude native-js-cli
          --locked --
          -A clippy::style
          -A clippy::complexity
          -A clippy::perf
          -A clippy::nursery
          -A clippy::pedantic
          -D clippy::correctness
          -D clippy::suspicious

      - name: cargo check (workspace)
        env:
          # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
          RUSTFLAGS: -C force-frame-pointers=yes
        run: >
          cargo check --workspace --all-targets
          --exclude native-js --exclude native-js-cli
          --locked

      - name: cargo test (workspace)
        env:
          # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
          RUSTFLAGS: -C force-frame-pointers=yes
        run: >
          cargo test --workspace
          --exclude native-js --exclude native-js-cli
          --locked

      - name: Verify `.llvm_stackmaps` is retained in native binaries
        run: ./scripts/check_llvm_stackmaps.sh

      - name: Smoke fuzz (bounded)
        run: |
          cargo test -p typecheck-ts --features fuzzing --test fuzz_smoke --locked -- --ignored
          cargo test -p semantic-js --features fuzzing --test fuzz_smoke --locked -- --ignored
          cargo test -p typecheck-ts-harness --test fuzz_smoke --locked -- --ignored

      - name: Regenerate docs/deps.md
        run: ./scripts/gen_deps_graph.sh

      - name: Ensure docs/deps.md is up to date
        run: git diff --exit-code docs/deps.md

  native-js:
    runs-on: ubuntu-24.04
    needs: test
    env:
      LLVM_SYS_180_PREFIX: /usr/lib/llvm-18
      # native-js builds and tests are LLVM-heavy and can spawn lots of threads.
      # Keep this job bounded on GitHub-hosted runners.
      RUST_TEST_THREADS: 2
      # `native-js` integration tests link against `runtime-native`, whose build
      # script requires frame pointers for FP-based stack walking.
      RUSTFLAGS: -C force-frame-pointers=yes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy

      - name: Install LLVM 18 toolchain (apt.llvm.org)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget lsb-release
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18
          llvm-config-18 --version
          clang-18 --version
          ld.lld-18 --version

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo clippy (native-js)
        run: >
          cargo clippy -p native-js --all-targets --all-features --locked --
          -A clippy::style
          -A clippy::complexity
          -A clippy::perf
          -A clippy::nursery
          -A clippy::pedantic
          -D clippy::correctness
          -D clippy::suspicious

      - name: cargo test (native-js)
        run: cargo test -p native-js --locked

      - name: cargo test (native-js-cli)
        run: cargo test -p native-js-cli --locked

  runtime-native-macos:
    runs-on: macos-latest
    needs: fmt-js
    env:
      # `runtime-native` enforces frame pointers for FP-based stack walking (see runtime-native/build.rs).
      RUSTFLAGS: -C force-frame-pointers=yes
      # The runtime-native integration tests serialize global state; keep test concurrency low for
      # stability on GitHub-hosted macOS runners.
      RUST_TEST_THREADS: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo check (runtime-native)
        run: cargo check -p runtime-native --all-targets --locked

      - name: cargo test (runtime-native)
        run: cargo test -p runtime-native --locked

      # `kqueue` wakeups prefer EVFILT_USER on macOS, but fall back to a pipe-based
      # mechanism when unsupported. Exercise the portable fallback in CI too.
      - name: cargo test (runtime-native, force pipe wake)
        run: |
          cargo test -p runtime-native --test reactor_conformance --features force_pipe_wake --locked
          cargo test -p runtime-native --test reactor_kqueue_pipe_wake --features force_pipe_wake --locked
          cargo test -p runtime-native --test kqueue_reactor --features force_pipe_wake --locked
          cargo test -p runtime-native --test io_watchers --features force_pipe_wake --locked
          cargo test -p runtime-native --test async_event_loop --features force_pipe_wake --locked
          cargo test -p runtime-native --test async_fd --features force_pipe_wake --locked
          cargo test -p runtime-native --test async_rt_reactor_adapter --features force_pipe_wake --locked

  typecheck-ts-harness:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run conformance mini suite (snapshots)
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          conformance
          --root typecheck-ts-harness/fixtures/conformance-mini
          --compare snapshot
          --manifest typecheck-ts-harness/fixtures/conformance-mini/manifest.toml
          --json
          > typecheck-conformance-mini.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-conformance-mini
          path: typecheck-conformance-mini.json

  typecheck-ts-bench-smoke:
    runs-on: ubuntu-24.04
    needs: test
    env:
      # `typecheck-ts` uses rayon internally. Keep the bench harness bounded on GitHub-hosted runners.
      RAYON_NUM_THREADS: 2
      TYPECHECK_TS_BENCH_JSON: "1"
      # Increase scale to shrink iteration counts (the benches divide by this value).
      TYPECHECK_TS_BENCH_ITERS_SCALE: "100"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: typecheck-ts bench smoke (JSON + determinism)
        run: |
          set -euo pipefail

          mkdir -p reports

          timeout -k 10 900 cargo bench -p typecheck-ts-bench --bench pipeline --locked --jobs 2 > reports/typecheck-ts-bench-run1.json
          timeout -k 10 900 cargo bench -p typecheck-ts-bench --bench pipeline --locked --jobs 2 > reports/typecheck-ts-bench-run2.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          def normalize(path: str) -> None:
            data = json.loads(Path(path).read_text())
            for bench in data.get("benches", []):
              # Timing fields naturally vary between runs; strip them so we can
              # compare the logical shape of the bench output.
              bench.pop("total_nanos", None)

              details = bench.get("details")
              if not isinstance(details, dict):
                continue

              metrics = details.get("metrics")
              if isinstance(metrics, dict):
                for key in list(metrics.keys()):
                  if key.endswith("_ms") or key.endswith("_ns") or key.endswith("_nanos"):
                    metrics.pop(key, None)
                if not metrics:
                  details.pop("metrics", None)

              counters = details.get("counters")
              if isinstance(counters, dict) and not counters:
                details.pop("counters", None)

              if not details:
                bench.pop("details", None)

            Path(path.replace(".json", ".normalized.json")).write_text(
              json.dumps(data, sort_keys=True, indent=2) + "\n"
            )

          normalize("reports/typecheck-ts-bench-run1.json")
          normalize("reports/typecheck-ts-bench-run2.json")
          PY

          if ! diff -u \
            reports/typecheck-ts-bench-run1.normalized.json \
            reports/typecheck-ts-bench-run2.normalized.json \
            > reports/typecheck-ts-bench.normalized.diff; then
            cat reports/typecheck-ts-bench.normalized.diff >&2
            exit 1
          fi

      - name: Upload benchmark smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-ts-bench-smoke
          path: reports

  difftsc:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run difftsc against baselines
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          difftsc
          --suite typecheck-ts-harness/fixtures/difftsc
          --compare-rust
          --use-baselines
          --manifest typecheck-ts-harness/fixtures/difftsc/manifest.toml
          --json
          > difftsc-report.json

      - name: Upload difftsc report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: difftsc-report
          path: difftsc-report.json

  difftsc-live-tsc:
    runs-on: ubuntu-24.04
    needs: test
    env:
      RAYON_NUM_THREADS: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Determine bundled TypeScript version
        run: |
          set -euo pipefail
          VERSION=$(cargo run -p typecheck-ts-cli --quiet --locked -- print-typescript-version)
          echo "TYPESCRIPT_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install TypeScript (npm)
        working-directory: ./typecheck-ts-harness
        run: npm ci --ignore-scripts

      - name: Show TypeScript version
        working-directory: ./typecheck-ts-harness
        run: node -p "require('typescript').version"

      - name: Run difftsc against live tsc
        run: >
          cargo run -p typecheck-ts-harness --release --locked --jobs 2 --
          difftsc
          --suite typecheck-ts-harness/fixtures/difftsc
          --compare-rust
          --manifest typecheck-ts-harness/fixtures/difftsc/manifest.toml
          --json
          > difftsc-live-tsc.json

      - name: Verify conformance snapshots (tsc vs baselines)
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          verify-snapshots
          --root typecheck-ts-harness/fixtures/conformance-mini
          --node node
          --jobs 2
          --timeout-secs 20
          --json
          > conformance-mini-snapshot-verify.json

      - name: Upload live difftsc report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: difftsc-live-tsc
          path: difftsc-live-tsc.json

      - name: Upload conformance snapshot verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-mini-snapshot-verify
          path: conformance-mini-snapshot-verify.json

  typecheck-ts-upstream-conformance:
    name: typecheck-ts upstream conformance (${{ matrix.shard }}/8)
    runs-on: ubuntu-24.04
    needs: test
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      CONFORMANCE_FILTER: "es2020/**"
      SHARD_TOTAL: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch TypeScript conformance suite (submodule)
        run: git submodule update --init --recursive parse-js/tests/TypeScript

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: typecheck-ts-harness/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Install TypeScript (npm)
        working-directory: ./typecheck-ts-harness
        run: npm ci --ignore-scripts

      - name: Show TypeScript version
        working-directory: ./typecheck-ts-harness
        run: node -p "require('typescript').version"

      - name: Run upstream conformance shard (JSON)
        env:
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          set -euxo pipefail
          report="typecheck-upstream-es2020-shard-${SHARD_INDEX}-of-${SHARD_TOTAL}.json"

          cargo run -p typecheck-ts-harness --release --locked -- \
            conformance \
            --filter "${CONFORMANCE_FILTER}" \
            --compare tsc \
            --manifest typecheck-ts-harness/fixtures/upstream_manifest.toml \
            --fail-on new \
            --shard "${SHARD_INDEX}/${SHARD_TOTAL}" \
            --shard-strategy hash \
            --timeout-secs 20 \
            --jobs 2 \
            --json \
            > "${report}"

      - name: Upload upstream conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-upstream-es2020-shard-${{ matrix.shard }}-of-8
          path: typecheck-upstream-es2020-shard-${{ matrix.shard }}-of-8.json

  test262-parser:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch test262 parser tests corpus
        run: git submodule update --init test262/data

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run test262 parser tests
        run: |
          mkdir -p reports
          cargo run -p test262 --release --locked -- \
            --data-dir test262/data \
            --manifest test262/manifest.toml \
            --report-path reports/test262-parser-report.json \
            --fail-on new

      - name: Upload test262 parser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-parser-report
          path: reports/test262-parser-report.json
