name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-js:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: prettier --check
        run: >
          npx --yes prettier@3.4.2 --check
          'version'
          '.github/workflows/*.yaml'
          'minify-js-nodejs/**/*.{js,json,ts,d.ts}'
          'optimize-js-debugger/src/**/*.{ts,tsx,css,html}'
          'optimize-js-debugger/*.ts'
          'typecheck-ts-harness/scripts/*.js'

  test:
    runs-on: ubuntu-24.04
    needs: fmt-js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep clang lld llvm

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: Check UTF-8 source-text public APIs
        run: ./scripts/check_utf8_apis.sh
      - name: Check diagnostic codes
        run: ./scripts/check_diagnostic_codes.sh

      # native-js / native-js-cli depend on LLVM via llvm-sys/inkwell.
      # Keep the base workspace CI job LLVM-free and lint/test them in a
      # dedicated job that installs LLVM 18.
      - name: cargo clippy (workspace)
        run: >
          cargo clippy --workspace --all-targets --all-features
          --exclude native-js --exclude native-js-cli
          --locked --
          -A clippy::style
          -A clippy::complexity
          -A clippy::perf
          -A clippy::nursery
          -A clippy::pedantic
          -D clippy::correctness
          -D clippy::suspicious

      - name: cargo check (workspace)
        run: >
          cargo check --workspace --all-targets
          --exclude native-js --exclude native-js-cli
          --locked

      - name: cargo test (workspace)
        run: >
          cargo test --workspace
          --exclude native-js --exclude native-js-cli
          --locked

      - name: Verify `.llvm_stackmaps` is retained in native binaries
        run: ./scripts/check_llvm_stackmaps.sh

      - name: Smoke fuzz (bounded)
        run: |
          cargo test -p typecheck-ts --features fuzzing --test fuzz_smoke --locked -- --ignored
          cargo test -p semantic-js --features fuzzing --test fuzz_smoke --locked -- --ignored
          cargo test -p typecheck-ts-harness --test fuzz_smoke --locked -- --ignored

      - name: Regenerate docs/deps.md
        run: ./scripts/gen_deps_graph.sh

      - name: Ensure docs/deps.md is up to date
        run: git diff --exit-code docs/deps.md

  native-js:
    runs-on: ubuntu-24.04
    needs: test
    env:
      LLVM_SYS_180_PREFIX: /usr/lib/llvm-18
      # native-js builds and tests are LLVM-heavy and can spawn lots of threads.
      # Keep this job bounded on GitHub-hosted runners.
      RUST_TEST_THREADS: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy

      - name: Install LLVM 18 toolchain (apt.llvm.org)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget lsb-release
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18
          llvm-config-18 --version
          clang-18 --version
          ld.lld-18 --version

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo clippy (native-js)
        run: >
          cargo clippy -p native-js --all-targets --all-features --locked --
          -A clippy::style
          -A clippy::complexity
          -A clippy::perf
          -A clippy::nursery
          -A clippy::pedantic
          -D clippy::correctness
          -D clippy::suspicious

      - name: cargo test (native-js)
        run: cargo test -p native-js --locked

      - name: cargo test (native-js-cli)
        run: cargo test -p native-js-cli --locked

  runtime-native-macos:
    runs-on: macos-latest
    needs: fmt-js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      # Cargo.lock is intentionally untracked for this library workspace.
      # Generate it on the fly so we can use --locked for reproducible
      # dependency resolution in CI.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: cargo check (runtime-native)
        run: cargo check -p runtime-native --all-targets --locked

      - name: cargo test (runtime-native)
        run: cargo test -p runtime-native --locked

  typecheck-ts-harness:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run conformance mini suite (snapshots)
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          conformance
          --root typecheck-ts-harness/fixtures/conformance-mini
          --compare snapshot
          --manifest typecheck-ts-harness/fixtures/conformance-mini/manifest.toml
          --json
          > typecheck-conformance-mini.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-conformance-mini
          path: typecheck-conformance-mini.json

  difftsc:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run difftsc against baselines
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          difftsc
          --suite typecheck-ts-harness/fixtures/difftsc
          --compare-rust
          --use-baselines
          --manifest typecheck-ts-harness/fixtures/difftsc/manifest.toml
          --json
          > difftsc-report.json

      - name: Upload difftsc report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: difftsc-report
          path: difftsc-report.json

  difftsc-live-tsc:
    runs-on: ubuntu-24.04
    needs: test
    env:
      TYPESCRIPT_VERSION: 5.9.3
      RAYON_NUM_THREADS: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Install TypeScript (npm)
        working-directory: ./typecheck-ts-harness
        run: npm install --no-save --no-package-lock --ignore-scripts "typescript@${TYPESCRIPT_VERSION}"

      - name: Show TypeScript version
        working-directory: ./typecheck-ts-harness
        run: node -p "require('typescript').version"

      - name: Run difftsc against live tsc
        run: >
          cargo run -p typecheck-ts-harness --release --locked --jobs 2 --
          difftsc
          --suite typecheck-ts-harness/fixtures/difftsc
          --compare-rust
          --manifest typecheck-ts-harness/fixtures/difftsc/manifest.toml
          --json
          > difftsc-live-tsc.json

      - name: Verify conformance snapshots (tsc vs baselines)
        run: >
          cargo run -p typecheck-ts-harness --release --locked --
          verify-snapshots
          --root typecheck-ts-harness/fixtures/conformance-mini
          --node node
          --jobs 2
          --timeout-secs 20
          --json
          > conformance-mini-snapshot-verify.json

      - name: Upload live difftsc report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: difftsc-live-tsc
          path: difftsc-live-tsc.json

      - name: Upload conformance snapshot verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-mini-snapshot-verify
          path: conformance-mini-snapshot-verify.json

  test262-parser:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch test262 parser tests corpus
        run: git submodule update --init test262/data

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run test262 parser tests
        run: |
          mkdir -p reports
          cargo run -p test262 --release --locked -- \
            --data-dir test262/data \
            --manifest test262/manifest.toml \
            --report-path reports/test262-parser-report.json \
            --fail-on new

      - name: Upload test262 parser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-parser-report
          path: reports/test262-parser-report.json
