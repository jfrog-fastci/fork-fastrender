[package]
name = "emit-js"
version = "0.1.0"
edition.workspace = true
description = "JavaScript/TypeScript emitter"
license.workspace = true
repository.workspace = true

[dependencies]
diagnostics = { workspace = true }
hir-js = { workspace = true }
parse-js = { workspace = true, features = ["diagnostics"] }

[dev-dependencies]
derive-visitor = { workspace = true }
parse-js = { workspace = true, features = ["diagnostics", "serde"] }
serde = { workspace = true }
serde_json = { workspace = true }

[features]
default = []
# Enable emission support for `hir-js` semantic operation nodes (Array.map/filter/reduce, Promise.all, etc).
semantic-ops = ["hir-js/semantic-ops"]
