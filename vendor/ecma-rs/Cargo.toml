[workspace]
resolver = "2"
members = [
  "conformance-harness",
  "diagnostics",
  "bench/minify-js",
  "bench/typecheck-ts",
  "megatest-harness",
  "native-js",
  "native-js-cli",
  "stackmap",
  "llvm-stackmaps",
  "minify-js-cli",
  "minify-js-nodejs",
  "minify-js",
  "native-oracle-harness",
  "ts-erase",
  "optimize-js-debugger",
  "optimize-js",
  "parse-js-cli",
  "parse-js",
  "effect-model",
  "knowledge-base",
  "effect-js",
  "effect-js-cli",
  "emit-js",
  "runtime-native",
  "runtime-io-uring",
  "vm-js",
  "runtime-js",
  "stackmap-context",
  "runtime-native-abi",
  "webidl",
  "webidl-vm-js",
  "webidl-runtime",
  "types-ts-interned",
  "hir-js",
  "typecheck-ts",
  "test262",
  "test262-semantic",
  "typecheck-ts-harness",
  "semantic-js",
  "typecheck-ts-cli",
]
# Default workspace members are the core crates that do not require heavy system
# deps (notably LLVM for `native-js`/`runtime-native`). Full coverage is still
# available via `--workspace`.
default-members = [
  "diagnostics",
  "emit-js",
  "hir-js",
  "minify-js",
  "parse-js",
  "runtime-js",
  "semantic-js",
  "typecheck-ts",
  "types-ts-interned",
  "vm-js",
  "webidl",
  "webidl-vm-js",
  "webidl-runtime",
]
exclude = ["fuzz"]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/wilsonzlin/ecma-rs"

[workspace.dependencies]
# Workspace crates (keep path + version in one place so publishable crates can
# depend on them with `workspace = true`).
conformance-harness = { path = "conformance-harness", version = "0.1.0" }
diagnostics = { path = "diagnostics", version = "0.1.0" }
effect-model = { path = "effect-model", version = "0.1.0" }
effect-js = { path = "effect-js", version = "0.1.0" }
knowledge-base = { path = "knowledge-base", version = "0.1.0" }
emit-js = { path = "emit-js", version = "0.1.0" }
hir-js = { path = "hir-js", version = "0.1.0" }
native-js = { path = "native-js", version = "0.1.0" }
native-js-cli = { path = "native-js-cli", version = "0.1.0" }
minify-js = { path = "minify-js", version = "0.6.0" }
ts-erase = { path = "ts-erase", version = "0.1.0" }
optimize-js = { path = "optimize-js", version = "0.1.0" }
parse-js = { path = "parse-js", version = "0.24.1" }
semantic-js = { path = "semantic-js", version = "0.1.0" }
typecheck-ts = { path = "typecheck-ts", version = "0.1.0" }
types-ts-interned = { path = "types-ts-interned", version = "0.1.0" }
native-oracle-harness = { path = "native-oracle-harness", version = "0.1.0" }
vm-js = { path = "vm-js", version = "0.1.0" }
runtime-io-uring = { path = "runtime-io-uring", version = "0.1.0" }
runtime-js = { path = "runtime-js", version = "0.1.0" }
runtime-native-abi = { path = "runtime-native-abi", version = "0.1.0" }
runtime-native = { path = "runtime-native", version = "0.1.0" }
webidl = { path = "webidl", version = "0.1.0" }
webidl-vm-js = { path = "webidl-vm-js", version = "0.1.0" }
webidl-js-runtime = { path = "webidl-runtime", version = "0.1.0" }
stackmap = { path = "stackmap", version = "0.1.0" }
stackmap-context = { path = "stackmap-context", version = "0.1.0" }

# Shared third-party dependencies.
addr2line = "0.25.1"
ahash = "0.8.7"
arc-swap = "1.7.1"
aho-corasick = "1.1"
anyhow = "1.0"
assert_cmd = "2.0"
axum = { version = "0.7.9", default-features = false }
bitflags = "2"
bumpalo = "3.14"
clap = { version = "4.5.17", default-features = false, features = ["std", "help", "usage", "error-context"] }
criterion = { version = "0.5.1", default-features = false }
dashmap = "6.1.0"
derive_more = "1.0.0"
derive-visitor = "0.4.0"
fast-float = "0.2.0"
gimli = "0.32.3"
globset = { version = "0.4", default-features = false }
# Pin to indexmap 2.5.0 to keep the normal dependency graph on hashbrown 0.14
# (matching dashmap/salsa) and avoid compiling multiple hashbrown versions.
indexmap = "=2.5.0"
itertools = "0.10.5"
itoa = "1.0"
inkwell = { version = "0.5.0", default-features = false, features = ["llvm18-0"] }
io-uring = "0.7.4"
json5 = "0.4"
libc = "0.2"
llvm-sys = { version = "180", features = ["prefer-dynamic"] }
maplit = "1"
memchr = "2"
neon = { version = "1", default-features = false }
num-bigint = "0.4.6"
num-traits = "0.2.19"
once_cell = "1.20.2"
object = "0.37.3"
ordered-float = "3"
parking_lot = "0.12"
predicates = { version = "3.1", default-features = false }
proptest = { version = "1", default-features = false, features = ["std"] }
rand = { version = "0.9", default-features = false, features = ["std", "std_rng"] }
rayon = "1.10.0"
regex = "1.11"
rmp-serde = "1.3.0"
ryu = "1.0"
salsa = "0.18"
serde = { version = "1.0.216", features = ["derive"] }
serde_json = "1.0.133"
serde_yaml = "0.9"
semver = "1.0"
similar = "2.1.0"
smallvec = "1.15.1"
target-lexicon = "0.13.2"
static_assertions = "1.1.0"
tempfile = "3.12"
thiserror = "1.0"
tokio = { version = "1.42.0", default-features = false }
toml = { version = "0.8", default-features = false, features = ["parse"] }
tower = "0.5.2"
tower-http = { version = "0.6.2", default-features = false }
tracing = "0.1"
tracing-subscriber = { version = "0.3.19", default-features = false }
unicode-ident = "1.0"
unicode-normalization = "0.1.22"
walkdir = "2.5"
sha2 = "0.10"
wait-timeout = "0.2"
crossbeam-deque = "0.8.6"
crossbeam-utils = "0.8.21"
memoffset = "0.6.5"

[patch.crates-io]
derive-visitor = { path = "third_party/derive-visitor" }
derive-visitor-macros = { path = "third_party/derive-visitor-macros" }
socket2 = { path = "third_party/socket2" }

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
strip = true

[profile.release.package."*"]
codegen-units = 1
opt-level = 3

[profile.release-with-debug]
inherits = "release"
debug = true
strip = "none"
