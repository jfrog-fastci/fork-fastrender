[package]
name = "native-js"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Native (LLVM-backed) code generation for a strict TypeScript subset"
publish = false

[features]
default = []
# Optional helper to assign sequential/deterministic `"statepoint-id"` callsite attributes.
statepoint-directives = []
# Enable the GC IR lint in non-debug builds. Debug builds/tests always run it.
gc-lint = []

[dependencies]
anyhow = { workspace = true }
diagnostics = { workspace = true }
hir-js = { workspace = true }
inkwell = { workspace = true }
llvm-sys = { workspace = true }
parse-js = { workspace = true }
tempfile = { workspace = true }
target-lexicon = { workspace = true }
thiserror = { workspace = true }
typecheck-ts = { workspace = true }
types-ts-interned = { workspace = true }

[dev-dependencies]
object = { workspace = true }
tempfile = { workspace = true }
runtime-native = { workspace = true }

