[package]
name = "native-js"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Native (LLVM-backed) code generation for a strict TypeScript subset"
publish = false

[features]
default = []
# Optional helper to assign sequential/deterministic `"statepoint-id"` callsite attributes.
statepoint-directives = []
# Enable the GC IR lint in non-debug builds. Debug builds/tests always run it.
gc-lint = []
# Enable post-`rewrite-statepoints-for-gc` callsite verification in non-debug builds.
# Debug builds/tests always run it.
gc-callsite-verify = []
# Ensure `runtime-native` is built as part of the normal dependency graph so its
# `staticlib` artifact (`libruntime_native.a`) is available for `EmitKind::Executable`.
link-runtime-native = ["dep:runtime-native"]
# Legacy HIR→LLVM "expression-only" backend (deprecated).
#
# This older backend is intentionally kept behind a feature to avoid accidental tests/tools
# depending on it instead of the checked `codegen` backend.
legacy-expr-backend = []

[dependencies]
anyhow = { workspace = true }
diagnostics = { workspace = true }
hir-js = { workspace = true }
inkwell = { workspace = true }
llvm-sys = { workspace = true }
parse-js = { workspace = true }
runtime-native-abi = { workspace = true }
runtime-native = { workspace = true, optional = true }
tempfile = { workspace = true }
target-lexicon = { workspace = true }
thiserror = { workspace = true }
typecheck-ts = { workspace = true }
types-ts-interned = { workspace = true }

[dev-dependencies]
gimli = { version = "0.29.0", default-features = false, features = ["read", "std"] }
object = { workspace = true }
tempfile = { workspace = true }
llvm-stackmaps = { path = "../llvm-stackmaps" }
runtime-native = { workspace = true }
wait-timeout = { workspace = true }
