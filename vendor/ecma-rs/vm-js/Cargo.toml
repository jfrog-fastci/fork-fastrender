[package]
name = "vm-js"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
diagnostics = { workspace = true }
thiserror = { workspace = true }
parse-js = { workspace = true, features = ["diagnostics"] }
hir-js = { workspace = true }
derive-visitor = { workspace = true }
itoa = { workspace = true }
ryu = { workspace = true }
semantic-js = { workspace = true }
fast-float = { workspace = true }
icu_properties = { version = "2.1.2", features = ["compiled_data"] }
icu_casemap = { version = "2.1.1", features = ["compiled_data"] }
unicode-normalization = { workspace = true }
rustc-hash = "2.1.1"

[dev-dependencies]
libc = { workspace = true }

[features]
# Enables GC invariant validation in non-debug (release) builds.
#
# This is intended for fuzzing and production-like reproductions where debug builds are too slow.
# By default, these checks run only when `debug_assertions` are enabled.
gc_validate = []
semantic-ops = ["hir-js/semantic-ops"]
