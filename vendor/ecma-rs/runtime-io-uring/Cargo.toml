[package]
name = "runtime-io-uring"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
# Debug-only pointer-stability instrumentation intended to catch missing pinning/roots when
# integrating with a moving GC. When disabled, all instrumentation should compile away to
# near-zero overhead.
debug_stability = []

[dependencies]
[target.'cfg(target_os = "linux")'.dependencies]
io-uring = { workspace = true }
libc = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
tempfile = { workspace = true }
