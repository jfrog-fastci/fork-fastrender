# Initial curated module-centric suite for `vm-js`.
#
# This is intended to stay small/fast while still exercising real module semantics:
# - static imports/exports (`language/module-code`)
# - `import.meta`
# - dynamic `import()`
# - top-level await that settles via Promise jobs (microtasks)
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "language/module-code/**/*.js",
  "language/expressions/import.meta/**/*.js",
  "language/expressions/dynamic-import/**/*.js",
  "language/module-code/top-level-await/**/*.js",
]

exclude = [
  # `vm-js` only implements standard `import()`; skip stage/proposal syntax that depends on
  # non-standard host hooks (import phases / source phase imports).
  "language/module-code/source-phase-import/**/*.js",
  "language/expressions/dynamic-import/**/*import-source*.js",
  "language/expressions/dynamic-import/**/*import-defer*.js",

  # `vm-js` does not yet implement generator/async-generator execution (`yield` / `async function*`);
  # exclude dynamic-import tests that exercise those runtime paths.
  "language/expressions/dynamic-import/assignment-expression/yield-*.js",
  "language/expressions/dynamic-import/**/nested-async-gen-*.js",
  "language/expressions/dynamic-import/for-await-resolution-and-error-agen*.js",
  "language/expressions/dynamic-import/import-attributes/2nd-param-evaluation-abrupt-return.js",
  "language/expressions/dynamic-import/import-attributes/*yield*.js",

  # Top-level-await syntax-coverage cases that currently require unimplemented runtime features in
  # `vm-js` (notably class inheritance) or trigger known lexical-environment issues.
  "language/module-code/top-level-await/syntax/export-class-decl-await-expr-*.js",
  "language/module-code/top-level-await/syntax/export-dft-class-decl-await-expr-*.js",
  "language/module-code/top-level-await/syntax/for-await-expr-*.js",

  # `parse-js` currently rejects keywords used as `IdentifierName` in import/export specifiers.
  "language/module-code/instn-named-id-name.js",
  "language/module-code/instn-star-id-name.js",

  # Private name validity rules across nested classes are not fully implemented in `vm-js` yet.
  "language/module-code/privatename-valid-no-earlyerr.js",

  # Module graph execution-order mismatch (DFS traversal) in `vm-js`.
  "language/module-code/verify-dfs.js",
]
