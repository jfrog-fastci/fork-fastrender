# Web-standard URL APIs that are available as Node.js globals.
#
# These entries are duplicated from `web/url.yaml` so that `TargetEnv::Node` lookups can resolve
# them without incorrectly matching DOM-only web APIs.
#
# Note: Node's WHATWG URL implementation has been available for a long time. We treat these as
# available from `v0.1.0` to avoid overfitting to exact historical release lines.

- name: URL
  kind: constructor
  since: "v0.1.0"
  effects:
    allocates: true
    may_throw: true
  purity: Pure

- name: URLSearchParams
  kind: constructor
  since: "v0.1.0"
  effects:
    allocates: true
    may_throw: true
  purity: Pure

- name: URLPattern
  kind: constructor
  # Global `URLPattern` is relatively new in Node; conservatively gate to Node 21+.
  since: "v21.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

- name: URL.prototype.toString
  kind: function
  since: "v0.1.0"
  effects:
    allocates: true
    may_throw: false
  purity: Pure
  properties:
    encoding.output: ascii

- name: URL.prototype.toJSON
  since: "v0.1.0"
  effects:
    allocates: true
    may_throw: false
  purity: Pure
  properties:
    encoding.output: ascii

# Treat getters as pure reads.
- name: URL.prototype.href
  kind: property_get
  since: "v0.1.0"
  effects:
    allocates: true
    may_throw: false
  purity: Pure
  properties:
    returns: string
    encoding.output: ascii

