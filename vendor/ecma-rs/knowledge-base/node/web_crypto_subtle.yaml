# WebCrypto `crypto.subtle` APIs that are available as Node.js globals.
#
# These entries are duplicated from `web/crypto_subtle.yaml` so that `TargetEnv::Node` lookups can
# resolve them without matching browser-only APIs.
#
# Node notes:
# - Node exposes WebCrypto as `globalThis.crypto` in modern releases; we conservatively gate
#   `crypto.subtle.*` to Node 19+.

- name: crypto.subtle.digest
  kind: function
  since: "v19.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating
  async: true
  parallelizable: true
  idempotent: true
  deterministic: true

- name: crypto.subtle.encrypt
  kind: function
  since: "v19.0.0"
  effects:
    allocates: true
    nondeterministic: true
    may_throw: true
  purity: Allocating
  async: true
  parallelizable: true
  idempotent: false
  deterministic: false

