# Web-standard fetch APIs that are available in Node.js as globals (via undici).
#
# These entries are duplicated from `web/fetch*.yaml` so that `TargetEnv::Node` lookups can resolve
# them without incorrectly matching DOM-only web APIs.
#
# Version notes:
# - Node's global `fetch`/`Headers`/`Request`/`Response` landed in Node 18.

- name: fetch
  kind: function
  semantics: Fetch
  signature: "(input, init?) => Promise<Response>"
  since: "v18.0.0"
  effects:
    base: [io, network, async, may_throw]
    depends_on_args: [0]
    io: true
    network: true
    may_throw: true
  purity:
    kind: impure
    template: impure
  async: true
  parallelizable: true
  idempotent: false
  deterministic: false

- name: Response.prototype.json
  semantics: ResponseJson
  signature: "() => Promise<any>"
  since: "v18.0.0"
  effects:
    Custom:
      flags: IO
      throws: Maybe
  purity: Impure
  async: true

