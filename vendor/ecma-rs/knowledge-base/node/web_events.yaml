  since: "v18.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

- name: MessageEvent
  kind: constructor
  since: "v18.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

- name: CloseEvent
  kind: constructor
  since: "v18.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

- name: ErrorEvent
  kind: constructor
  since: "v18.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

