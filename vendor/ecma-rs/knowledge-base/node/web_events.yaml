# Web-standard event constructors and EventTarget methods that are available in Node.js.
#
# These entries are duplicated from `web/events.yaml` so that `TargetEnv::Node` lookups can resolve
# them without matching DOM-specific event APIs.

- name: EventTarget
  kind: constructor
  since: "v15.0.0"
  effects:
    allocates: true
    may_throw: false
  purity: Allocating
  async: false
  parallelizable: true
  idempotent: false
  deterministic: true

- name: Event
  kind: constructor
  since: "v18.0.0"
  effects:
    allocates: true
    may_throw: true
  purity: Allocating

- name: CustomEvent
