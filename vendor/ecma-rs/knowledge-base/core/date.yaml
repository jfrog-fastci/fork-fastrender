- name: Date.now
  effects:
    Custom:
      flags: NONDETERMINISTIC
      throws: Never
  purity: ReadOnly
  async: false
  deterministic: false
  idempotent: false

- name: Date.parse
  effects:
    Custom:
      flags: ""
      throws: Maybe
  purity: Pure

- name: Date.prototype.toISOString
  effects:
    Custom:
      flags: ALLOCATES
      throws: Maybe
  purity: Pure
  properties:
    encoding.output: ascii
