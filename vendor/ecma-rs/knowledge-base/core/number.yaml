- name: Number.isFinite
  effects: Pure
  purity: Pure

- name: Number.isNaN
  effects: Pure
  purity: Pure

- name: parseInt
  effects:
    Custom:
      flags: ""
      throws: Maybe
  purity: Pure

- name: parseFloat
  effects:
    Custom:
      flags: ""
      throws: Maybe
  purity: Pure

- name: Number.prototype.toString
  effects:
    template: pure
    may_throw: true
    allocates: true
    io: false
    network: false
    nondeterministic: false
  purity: Pure
  properties:
    encoding.output: ascii
