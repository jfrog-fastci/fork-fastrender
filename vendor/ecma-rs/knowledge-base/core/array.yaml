- name: Array.prototype.map
  semantics: Map
  effects:
    depends_on_args:
      base: ALLOCATES | MAY_THROW
      args: [0]
  purity:
    depends_on_args:
      base: Allocating
      args: [0]
  properties:
    fusable: true
    output_length: same_as_input
    fusion:
      fusable_with:
        - Array.prototype.map
        - Array.prototype.filter
        - Array.prototype.reduce
    output:
      length_relation: same_as_input
    parallel:
      requires_callback_pure: true
      forbid_uses_index: true
      forbid_uses_array: true

- name: Array.prototype.filter
  semantics: Filter
  effects:
    depends_on_args:
      base: ALLOCATES | MAY_THROW
      args: [0]
  purity:
    depends_on_args:
      base: Allocating
      args: [0]
  properties:
    fusable: true
    output_length: at_most_input
    fusion:
      fusable_with:
        - Array.prototype.map
        - Array.prototype.filter
        - Array.prototype.reduce
    output:
      length_relation: le_input
    parallel:
      requires_callback_pure: true
      forbid_uses_index: true
      forbid_uses_array: true

- name: Array.prototype.reduce
  semantics: Reduce
  effects:
