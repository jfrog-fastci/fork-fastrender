# Semantic definitions for a small, high-value subset of RxJS APIs.
#
# Canonical naming:
# - `rxjs.*` for creation functions / classes from the `rxjs` entrypoint.
# - `rxjs.operators.*` for pipeable operators from `rxjs/operators`.

rxjs.Observable:
  aliases: []
  semantics: ObservableConstructor
  since: "v0.1.0"
  purity:
    template: allocating
  throws: maybe
  effects:
    template: pure
    allocates: true
    io: false
    network: false
    may_throw: true
    nondeterministic: false
  properties:
    kind: observable
    lazy: true
    subscribe_function_argument: 0

