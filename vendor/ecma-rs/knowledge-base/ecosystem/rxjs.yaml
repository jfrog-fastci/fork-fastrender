    since: "v0.1.0"
    purity:
      template: pure
    effects:
      template: pure
      may_throw: true
      allocates: true
      io: false
      network: false
      nondeterministic: true
    properties:
      kind: observable_combinator
      lazy: true
      depends_on_scheduling: true

  - name: rxjs.operators.map
    aliases: []
    semantics: Map
    since: "v0.1.0"
