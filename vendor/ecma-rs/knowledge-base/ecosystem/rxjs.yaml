# Semantic definitions for a small, high-value subset of RxJS APIs.
#
# Canonical naming:
# - `rxjs.*` for creation functions / classes from the `rxjs` entrypoint.
# - `rxjs.operators.*` for pipeable operators from `rxjs/operators`.

schema_version: 1
symbols:
  - name: rxjs.Observable
    aliases: []
    semantics: ObservableConstructor
    since: "v0.1.0"
    purity:
      template: pure
    effects:
      template: pure
      may_throw: true
      allocates: true
      io: false
      network: false
      nondeterministic: false
    properties:
      kind: observable
      lazy: true
      subscribe_function_argument: 0

  - name: rxjs.of
    aliases: []
    semantics: ObservableOf
    since: "v0.1.0"
    purity:
      template: pure
    effects:
      template: pure
      may_throw: true
      allocates: true
      io: false
      network: false
      nondeterministic: false
    properties:
      kind: observable_creation
      lazy: true

  - name: rxjs.from
    aliases: []
    semantics: ObservableFrom
    since: "v0.1.0"
    purity:
      template: pure
    effects:
      template: pure
      may_throw: true
      allocates: true
      io: false
      network: false
      nondeterministic: true
    properties:
      kind: observable_creation
      lazy: true
      nondeterministic_if: input_is_promise_or_async_iterable

  - name: rxjs.merge
    aliases: []
    semantics: ObservableMerge
    since: "v0.1.0"
    purity:
      template: pure
    effects:
      template: pure
      may_throw: true
      allocates: true
      io: false
      network: false
      nondeterministic: true
    properties:
      kind: observable_combinator
      lazy: true
      interleaves_sources: true

  - name: rxjs.combineLatest
    aliases: []
