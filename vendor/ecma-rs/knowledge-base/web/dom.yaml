document.querySelector:
  aliases:
    - document.querySelector
  since: "baseline"
  purity:
    # Reads the DOM, which is external state.
    template: readonly
  throws: maybe # Invalid selector syntax.
  effects:
    template: unknown
    io: false
    network: false

document.getElementById:
  aliases:
    - document.getElementById
  since: "baseline"
  purity:
    template: readonly
  throws: never
  effects:
    template: unknown
    io: false
    network: false

Element.prototype.querySelector:
  aliases:
    - Element.prototype.querySelector
  since: "baseline"
  purity:
    template: readonly
  throws: maybe
  effects:
    template: unknown
    io: false
    network: false

Element.prototype.querySelectorAll:
  aliases:
    - Element.prototype.querySelectorAll
  since: "baseline"
  purity:
    template: readonly
  throws: maybe
  effects:
    template: unknown
    io: false
    network: false

Element.prototype.getAttribute:
  aliases:
    - Element.prototype.getAttribute
  since: "baseline"
