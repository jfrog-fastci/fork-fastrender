# Web platform timers + task scheduling.

- name: setTimeout
  kind: function
  aliases:
    - setTimeout
    - window.setTimeout
    - globalThis.setTimeout
  # Keep metadata aligned with `node:timers.setTimeout` to avoid alias conflicts
  # (Node and browsers both expose global `setTimeout`).
  since: "v0.1.0"
  effects: Unknown
  purity: Impure
  # Schedules a task.
  async: true
  parallelizable: false
  idempotent: false
  deterministic: false

