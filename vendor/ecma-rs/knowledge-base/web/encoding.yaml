# Web platform text encoding + base64 helpers.

- name: atob
  kind: function
  aliases:
    - atob
    - window.atob
    - globalThis.atob
  since: "baseline"
  effects:
    allocates: true
    may_throw: true
  purity: Pure
  properties:
    # `atob` returns a "binary string" (byte string) with code points 0..255.
    encoding.output: latin1

- name: btoa
  kind: function
  aliases:
    - btoa
    - window.btoa
    - globalThis.btoa
  since: "baseline"
  effects:
    allocates: true
    may_throw: true
  purity: Pure
  properties:
    # Base64 output uses ASCII characters.
    encoding.output: ascii

- name: TextEncoder
  kind: constructor
  aliases:
    - TextEncoder
    - window.TextEncoder
    - globalThis.TextEncoder
  since: "baseline"
  effects:
    allocates: true
    may_throw: false
  purity: Pure

- name: TextEncoder.prototype.encode
  kind: function
  aliases:
    - TextEncoder.prototype.encode
  since: "baseline"
  effects:
    allocates: true
    may_throw: false
  purity: Pure

- name: TextDecoder
  kind: constructor
  aliases:
    - TextDecoder
    - window.TextDecoder
    - globalThis.TextDecoder
  since: "baseline"
  effects:
    allocates: true
    may_throw: true
  purity: Pure

- name: TextDecoder.prototype.decode
  kind: function
  aliases:
    - TextDecoder.prototype.decode
  since: "baseline"
  effects:
    allocates: true
    may_throw: true
  purity: Pure
