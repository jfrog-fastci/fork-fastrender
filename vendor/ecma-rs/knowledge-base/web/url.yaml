- name: URL
  aliases:
    - URL
  since: "baseline"
  effects:
    Custom:
      flags: ALLOCATES
      throws: Maybe
  purity: Pure

- name: URL.createObjectURL
  aliases:
    - URL.createObjectURL
  since: "baseline"
  effects: Unknown
  purity: Impure

- name: URL.prototype.toString
  aliases:
    - URL.prototype.toString
  since: "baseline"
  effects: Pure
  purity: Pure
  properties:
    encoding.output: ascii

# Treat getters as pure reads.
- name: URL.prototype.href
  aliases:
    - URL.prototype.href
