- name: navigator.sendBeacon
  kind: function
  aliases:
    - navigator.sendBeacon
    - window.navigator.sendBeacon
    - globalThis.navigator.sendBeacon
  since: "baseline"
  effects:
    base: [io, network, may_throw]
    io: true
    network: true
    may_throw: true
  purity: Impure
  async: false
  parallelizable: true
  idempotent: false
  deterministic: false
