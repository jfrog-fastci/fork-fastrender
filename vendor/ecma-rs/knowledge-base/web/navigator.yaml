# Navigator APIs (user agent, beacon, etc).

- name: navigator.userAgent
  kind: getter
  aliases:
    - navigator.userAgent
    - window.navigator.userAgent
    - globalThis.navigator.userAgent
  since: "baseline"
  effects:
    Custom:
      flags: READS_GLOBAL | ALLOCATES
      throws: Never
  purity: ReadOnly
  properties:
    encoding.output: ascii

