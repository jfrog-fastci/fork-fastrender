# Observer APIs (MutationObserver / IntersectionObserver / ResizeObserver).

- name: MutationObserver
  kind: constructor
  aliases:
    - window.MutationObserver
    - globalThis.MutationObserver
  since: "baseline"
  effects:
    Custom:
      flags: ALLOCATES
      throws: Maybe
  purity: Allocating

- name: MutationObserver.prototype.observe
  kind: function
  aliases:
    - MutationObserver.prototype.observe
  since: "baseline"
  effects:
    Custom:
      flags: WRITES_GLOBAL
      throws: Maybe
  purity: Impure
  async: true

- name: MutationObserver.prototype.disconnect
  kind: function
  aliases:
    - MutationObserver.prototype.disconnect
  since: "baseline"
  effects:
    Custom:
      flags: WRITES_GLOBAL
      throws: Never
  purity: Impure

- name: MutationObserver.prototype.takeRecords
  kind: function
