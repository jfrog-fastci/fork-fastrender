[package]
name = "effect-js"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
typed = ["dep:typecheck-ts", "dep:types-ts-interned"]
# Enables the `hir-js/semantic-ops` feature and extends `effect-js` analyses to
# understand the extra HIR expression variants.
hir-semantic-ops = ["hir-js/semantic-ops", "typecheck-ts?/semantic-ops"]
# Backwards-compatible alias (most crates use `semantic-ops` as the feature name).
semantic-ops = ["hir-semantic-ops"]

[dependencies]
anyhow = { workspace = true }
effect-model = { workspace = true }
knowledge-base = { workspace = true }
hir-js = { workspace = true }
smallvec = { workspace = true }
serde_json = { workspace = true }

typecheck-ts = { workspace = true, optional = true }
types-ts-interned = { workspace = true, optional = true }

[dev-dependencies]
diagnostics = { workspace = true }

[[example]]
name = "recognize"
required-features = ["typed"]
