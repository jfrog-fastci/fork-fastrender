[package]
name = "runtime-native"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false
build = "build.rs"

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[features]
# Escape hatch for experiments. Disables the build-time check that the crate is compiled with
# `-C force-frame-pointers=yes`.
#
# WARNING: the runtime-native FP stack walker / GC root enumerator assumes a stable frame-pointer
# chain. Enabling this feature may lead to hard crashes or silent memory corruption.
allow_omit_frame_pointers = []

# Enables parsing the in-memory stackmaps section via linker-defined boundary
# symbols.
#
# Note: LLVM emits stackmaps into `.llvm_stackmaps`, but PIE/DSO builds typically
# rename that input section to `.data.rel.ro.llvm_stackmaps` before the final
# link so relocations can be applied without `DT_TEXTREL`.
#
# Preferred names (shared with `native-js`):
# - `__start_llvm_stackmaps`
# - `__stop_llvm_stackmaps`
#
# `runtime-native/link/stackmaps.ld` defines these on Linux/ELF and also provides
# legacy/generic aliases:
# - `__fastr_stackmaps_{start,end}`
# - `__llvm_stackmaps_{start,end}`
# - `__stackmaps_{start,end}`
#
# Keep this feature opt-in: some binaries don't link stackmaps, and missing
# symbols would otherwise fail the link.
llvm_stackmaps_linker = []

# Always-on statepoint verification can be enabled by consumers that want a hard failure in
# release builds too. In debug builds we verify unconditionally.
verify-statepoints = []
gc_stats = []
# Enables expensive GC verification helpers (heap integrity checks, forwarding verification,
# nursery poisoning) intended for tests and debugging.
gc_debug = []
rt-trace = []
# Force the kqueue reactor to use a pipe-based wakeup instead of EVFILT_USER.
# Intended for tests to exercise the portable fallback even on macOS.
force_pipe_wake = []

# Enables conservative stack scanning fallback when stackmap coverage is incomplete.
# Intended for bring-up/debug/emergency use only; it may keep garbage alive via false positives.
conservative_roots = []

# Test-only feature:
# - Enables Loom model-checking tests (`tests/loom_*.rs`)
# - Swaps the small Loom-specific test harness' atomics/Mutex to loom types
#
# Run with:
#   # `runtime-native` requires frame pointers; easiest is via the LLVM wrapper:
#   bash scripts/cargo_llvm.sh test -p runtime-native --features loom --test loom_promise_waiters
#   # Or, if you already set `RUSTFLAGS="-C force-frame-pointers=yes"`:
#   bash scripts/cargo_agent.sh test -p runtime-native --features loom loom_
loom = ["dep:loom"]

# Internal/test-only: exported functions used by frame-pointer regression checks.
fp_regression = []

[dependencies]
anyhow = { workspace = true }
arc-swap = { workspace = true }
bitflags = { workspace = true }
clap = { workspace = true, features = ["derive"] }
crossbeam-deque = { workspace = true }
crossbeam-utils = { workspace = true }
libc = { workspace = true }
object = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
stackmap-context = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
runtime-native-abi = { workspace = true }
loom = { version = "0.7", optional = true }
static_assertions = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
io-uring = { workspace = true }

[build-dependencies]
object = { workspace = true }
cc = "1"

[dev-dependencies]
assert_cmd = { workspace = true }
serde_json = { workspace = true }
memoffset = { workspace = true }
proptest = { workspace = true }
rand = { workspace = true }
tempfile = { workspace = true }
backtrace = "0.3"
object = { workspace = true, features = ["write_core"] }
loom = "0.7"
runtime-io-uring = { workspace = true }

[[bin]]
name = "stackmap-dump"
path = "src/bin/stackmap_dump.rs"

[[bin]]
name = "ffi-panic-smoke"
path = "src/bin/ffi_panic_smoke.rs"

[[bench]]
name = "card_table"
harness = false

[[bench]]
name = "bump_alloc"
harness = false

[[bench]]
name = "parallel_spawn_join"
harness = false

[[bench]]
name = "scheduler_throughput"
harness = false

[[bench]]
name = "async_timers"
harness = false

[[bench]]
name = "microtasks"
harness = false

[[bench]]
name = "gc_major_pause"
harness = false

[[bench]]
name = "gc_major_mark"
harness = false

[[test]]
name = "stackmaps_symbols_runtime"
path = "tests/bin/stackmaps_symbols_runtime.rs"
required-features = ["llvm_stackmaps_linker"]

[[test]]
name = "loom_promise_waiters"
path = "tests/loom_promise_waiters.rs"
required-features = ["loom"]
