[package]
name = "runtime-native"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
crate-type = ["rlib", "staticlib"]

[features]
# Enables parsing the in-memory `.llvm_stackmaps` section via GNU ld/lld
# `__start_llvm_stackmaps` / `__stop_llvm_stackmaps` symbols.
#
# Keep this feature opt-in: test binaries and non-AOT tools don't always link a
# `.llvm_stackmaps` section, and missing symbols would otherwise fail the link.
llvm_stackmaps_linker = []
gc_stats = []

[dependencies]
ahash = { workspace = true }
bitflags = { workspace = true }
libc = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
rand = { workspace = true }
tempfile = { workspace = true }
backtrace = "0.3"

[[bench]]
name = "card_table"
harness = false
