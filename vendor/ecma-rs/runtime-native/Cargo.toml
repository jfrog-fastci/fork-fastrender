[package]
name = "runtime-native"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false
build = "build.rs"

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[features]
# Enables parsing the in-memory `.llvm_stackmaps` section via the `native-js`
# exported boundary symbols:
# - `__fastr_stackmaps_start`
# - `__fastr_stackmaps_end`
#
# The linker script fragment (`stackmaps.ld`) defines these symbols on Linux/ELF.
# It also defines `__stackmaps_start` / `__stackmaps_end` as a generic alias.
#
# Keep this feature opt-in: test binaries and non-AOT tools don't always link a
# `.llvm_stackmaps` section, and missing symbols would otherwise fail the link.
llvm_stackmaps_linker = []

# Always-on statepoint verification can be enabled by consumers that want a hard failure in
# release builds too. In debug builds we verify unconditionally.
verify-statepoints = []
gc_stats = []
# Enables expensive GC verification helpers (heap integrity checks, forwarding verification,
# nursery poisoning) intended for tests and debugging.
gc_debug = []
rt-trace = []
# Force the kqueue reactor to use a pipe-based wakeup instead of EVFILT_USER.
# Intended for tests to exercise the portable fallback even on macOS.
force_pipe_wake = []

# Test-only feature:
# - Enables Loom model-checking tests (`tests/loom_*.rs`)
# - Swaps the small Loom-specific test harness' atomics/Arc/Mutex to loom types
#
# Run with:
#   cargo test -p runtime-native --features loom loom_
loom = ["dep:loom"]

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
arc-swap = { workspace = true }
bitflags = { workspace = true }
clap = { workspace = true, features = ["derive"] }
crossbeam-deque = { workspace = true }
crossbeam-utils = { workspace = true }
libc = { workspace = true }
io-uring = "0.7"
object = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
stackmap-context = { path = "../stackmap-context" }
thiserror = { workspace = true }
runtime-native-abi = { workspace = true }
loom = { version = "0.7", optional = true }

[build-dependencies]
object = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
serde_json = { workspace = true }
criterion = { workspace = true }
proptest = { workspace = true }
rand = { workspace = true }
tempfile = { workspace = true }
backtrace = "0.3"
object = { workspace = true }
loom = "0.7"

[[bin]]
name = "stackmap-dump"
path = "src/bin/stackmap_dump.rs"

[[bench]]
name = "card_table"
harness = false

[[bench]]
name = "bump_alloc"
harness = false

[[bench]]
name = "parallel_spawn_join"
harness = false

[[bench]]
name = "scheduler_throughput"
harness = false

[[bench]]
name = "async_timers"
harness = false

[[bench]]
name = "microtasks"
harness = false
