[package]
name = "optimize-js"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
semantic-ops = ["hir-js/semantic-ops", "emit-js/semantic-ops", "typecheck-ts?/semantic-ops"]
native-async-ops = []
native-fusion = ["semantic-ops"]
native-array-ops = []
typed = ["dep:typecheck-ts", "dep:types-ts-interned"]
parallel-analyses = ["dep:rayon"]
# Integration tests that execute decompiled JS under the `vm-js` oracle. Keep this behind an
# explicit feature so scoped unit test runs (`cargo test -p optimize-js --lib`) don't compile the
# full VM.
vm-js-tests = ["dep:vm-js"]
serde = [
  "dep:serde",
  "dep:serde_json",
  "dep:rmp-serde",
  "dashmap/serde",
  "diagnostics/serde",
  "effect-model/serde",
  "hir-js/serde",
  "num-bigint/serde",
  "parse-js/serde",
  "typecheck-ts?/serde",
  "types-ts-interned?/serde",
]

[dependencies]
dashmap = { workspace = true }
derive-visitor = { workspace = true }
effect-model = { workspace = true }
itertools = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
once_cell = { workspace = true }
rayon = { workspace = true, optional = true }
ryu = { workspace = true }
diagnostics = { workspace = true }
parse-js = { workspace = true, features = ["diagnostics"] }
semantic-js = { workspace = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
rmp-serde = { workspace = true, optional = true }
emit-js = { workspace = true }
hir-js = { workspace = true }
typecheck-ts = { workspace = true, optional = true }
types-ts-interned = { workspace = true, optional = true }
vm-js = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }

[[bench]]
name = "analysis"
harness = false

[[bench]]
name = "optimize"
harness = false

[[bench]]
name = "typed"
harness = false

[[example]]
name = "native_ready"
path = "examples/native_ready.rs"
required-features = ["typed"]
