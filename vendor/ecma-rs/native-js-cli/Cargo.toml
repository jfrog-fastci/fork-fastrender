[package]
name = "native-js-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI for compiling TypeScript to native executables via native-js (LLVM)"
publish = false
default-run = "native-js-cli"

[dependencies]
clap = { workspace = true, features = ["derive"] }
diagnostics = { workspace = true, features = ["serde"] }
inkwell = { workspace = true }
native-js = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
target-lexicon = { workspace = true }
tempfile = { workspace = true }
typecheck-ts = { workspace = true, features = ["resolve", "tsconfig"] }
wait-timeout = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
tempfile = { workspace = true }
runtime-native = { workspace = true }
