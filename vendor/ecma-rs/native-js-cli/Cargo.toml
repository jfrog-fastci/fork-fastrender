[package]
name = "native-js-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI for compiling TypeScript to native executables via native-js (LLVM)"
publish = false
default-run = "native-js-cli"

[dependencies]
addr2line = { workspace = true }
clap = { workspace = true, features = ["derive"] }
diagnostics = { workspace = true, features = ["serde"] }
gimli = { workspace = true }
inkwell = { workspace = true }
native-js = { workspace = true }
object = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
target-lexicon = { workspace = true }
tempfile = { workspace = true }
typecheck-ts = { workspace = true, features = ["resolve", "tsconfig"] }
wait-timeout = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
tempfile = { workspace = true }
# Ensure `libruntime_native.a` is built so `native-js` can link and run native executables in
# integration tests (the AOT tests invoke the `native-js` binary directly).
runtime-native = { workspace = true }
