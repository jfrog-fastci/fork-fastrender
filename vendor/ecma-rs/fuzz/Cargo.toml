[package]
name = "ecma-rs-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[features]
# Enable the typed optimizer pipeline by default so typed targets work without extra flags.
default = ["typed"]
typed = ["dep:typecheck-ts", "optimize-js/typed"]

[dependencies]
libfuzzer-sys = "0.4"
parse-js = { path = "../parse-js" }
vm-js = { path = "../vm-js" }
typecheck-ts = { path = "../typecheck-ts", optional = true }

[dependencies.llvm-stackmaps]
path = "../llvm-stackmaps"

[dependencies.optimize-js]
path = "../optimize-js"
features = ["semantic-ops"]

[dependencies.stackmap]
path = "../stackmap"

[dependencies.types-ts-interned]
path = "../types-ts-interned"
features = ["fuzzing", "serde-json"]

[[bin]]
name = "type_graph"
path = "fuzz_targets/type_graph.rs"
test = false
doc = false

[[bin]]
name = "parse_js"
path = "fuzz_targets/parse_js.rs"
test = false
doc = false

[[bin]]
name = "vm_js_exec"
path = "fuzz_targets/vm_js_exec.rs"
test = false
doc = false

[[bin]]
name = "llvm_stackmaps_parse"
path = "fuzz_targets/llvm_stackmaps_parse.rs"
test = false
doc = false

[[bin]]
name = "llvm_stackmaps_statepoint_view"
path = "fuzz_targets/llvm_stackmaps_statepoint_view.rs"
test = false
doc = false

[[bin]]
name = "optimize_js_compile"
path = "fuzz_targets/optimize_js_compile.rs"
test = false
doc = false

[[bin]]
name = "optimize_js_compile_typed"
path = "fuzz_targets/optimize_js_compile_typed.rs"
test = false
doc = false

[[bin]]
name = "optimize_js_untyped_compile"
path = "fuzz_targets/optimize_js_untyped_compile.rs"
test = false
doc = false

[[bin]]
name = "optimize_js_typed_compile"
path = "fuzz_targets/optimize_js_typed_compile.rs"
test = false
doc = false

[[bin]]
name = "stackmap_relocate_statepoint"
path = "fuzz_targets/stackmap_relocate_statepoint.rs"
test = false
doc = false

[[bin]]
name = "stackmap_relocation"
path = "fuzz_targets/stackmap_relocation.rs"
test = false
doc = false
