## Expectations manifest for the curated `conformance-lite` snapshot suite.
##
## Policy:
## - Prefer keeping this empty (all cases must match their stored snapshots).
## - If a case is flaky or blocked on missing checker support, add an `xfail`/`flaky`
##   entry with a reason + tracking issue, and keep it narrowly scoped.
## - Remove entries once they start passing (CI treats XPASS as a failure under
##   `--fail-on new`).
##
## Format:
## [[expectations]]
## id = "match/example.ts"
## status = "xfail" # pass | skip | xfail | flaky
## reason = "explain why"
## tracking_issue = "https://…"

[[expectations]]
id = "match/generic_defaults.ts"
status = "xfail"
reason = "Default type parameters are not supported by the Rust checker yet."

[[expectations]]
id = "match/narrowing_truthiness.ts"
status = "xfail"
reason = "Flow narrowing for truthiness checks is not implemented yet."

[[expectations]]
id = "match/narrowing_typeof.ts"
status = "xfail"
reason = "Flow narrowing for typeof checks is not implemented yet."

[[expectations]]
id = "mismatch/excess_property_error.ts"
status = "xfail"
reason = "Excess property diagnostics differ from tsc (code/span)."

[[expectations]]
id = "mismatch/overload_no_match.ts"
status = "xfail"
reason = "Overload resolution diagnostics differ from tsc (code/span)."
