## Expectations manifest for the curated `conformance-lite` snapshot suite.
##
## Policy:
## - Prefer keeping this empty (all cases must match their stored snapshots).
## - If a case is flaky or blocked on missing checker support, add an `xfail`/`flaky`
##   entry with a reason + tracking issue, and keep it narrowly scoped.
## - Remove entries once they start passing (CI treats XPASS as a failure under
##   `--fail-on new`).
##
## Format:
## [[expectations]]
## id = "match/example.ts"
## status = "xfail" # pass | skip | xfail | flaky
## reason = "explain why"
## tracking_issue = "https://…"

[[expectations]]
