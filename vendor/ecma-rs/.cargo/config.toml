[env]
# `cargo-fuzz` uses `-Zsanitizer=...` for sanitizer runtimes, which requires a
# nightly compiler. This repo pins a stable toolchain for normal development,
# so we opt into `RUSTC_BOOTSTRAP=1` to allow `cargo fuzz` to build targets
# without switching toolchains.
RUSTC_BOOTSTRAP = "1"

# The parent repository's `.cargo/config.toml` configures `-fuse-ld=mold` for
# faster linking. Some build environments ship a `clang` that does not recognize
# `mold` as a valid `-fuse-ld` value.
#
# Override it in this nested workspace so `vendor/ecma-rs` builds work reliably
# everywhere.
[target.'cfg(target_os = "linux")']
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
