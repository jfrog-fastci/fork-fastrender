[env]
# `cargo-fuzz` uses `-Zsanitizer=...` for sanitizer runtimes, which requires a
# nightly compiler. This repo pins a stable toolchain for normal development,
# so we opt into `RUSTC_BOOTSTRAP=1` to allow `cargo fuzz` to build targets
# without switching toolchains.
RUSTC_BOOTSTRAP = "1"

# The parent repository configures `clang` as the linker driver on Linux and
# intentionally avoids pinning a specific `-fuse-ld=...` implementation (which
# can break in minimal CI images).
#
# Keep the nested `vendor/ecma-rs` workspace similarly portable so its tools can
# be built directly from this subdirectory as well.
[target.'cfg(target_os = "linux")']
linker = "clang"
