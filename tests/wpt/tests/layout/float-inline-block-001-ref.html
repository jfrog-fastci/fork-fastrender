<!doctype html>
<meta charset="utf-8">
<title>Inline-block participates in inline formatting around floats reference</title>
<style>
  body {
    margin: 0;
  }

  .box {
    position: absolute;
    top: 0;
    width: 60px;
    height: 60px;
  }

  .float {
    left: 0;
    background: #00f;
  }

  .ib {
    left: 60px;
    background: #0f0;
  }
</style>
<div class="box float"></div>
<div class="box ib"></div>
