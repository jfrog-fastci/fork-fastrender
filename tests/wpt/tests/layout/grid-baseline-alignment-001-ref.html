<!doctype html>
<meta charset="utf-8">
<title>Reference: Grid alignment: baseline aligns items within a row</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }

  .grid {
    display: grid;
    width: 80px;
    height: 40px;
    grid-template-columns: 40px 40px;
    grid-template-rows: 40px;
    align-items: start;
    background: #d1d5db;
  }

  .a {
    width: 40px;
    height: 20px;
    position: relative;
    top: 10px;
    background: #ef4444;
  }

  .b {
    width: 40px;
    height: 30px;
    background: #22c55e;
  }
</style>
<div class="grid">
  <div class="a"></div>
  <div class="b"></div>
</div>
