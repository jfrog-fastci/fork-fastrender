<!doctype html>
<meta charset="utf-8">
<title>Flex auto minimum size vs min-width: 0 reference</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .frame {
    position: absolute;
    left: 10px;
    width: 100px;
    height: 20px;
    box-shadow: 0 0 0 2px #000;
  }
  .row1 {
    top: 10px;
  }
  .row2 {
    top: 40px;
  }
  .fixed {
    position: absolute;
    left: 0;
    top: 0;
    width: 20px;
    height: 20px;
    background: #ef4444;
  }
  .auto {
    position: absolute;
    left: 20px;
    top: 0;
    width: 150px;
    height: 20px;
    background: #22c55e;
  }
  .clip {
    position: absolute;
    left: 20px;
    top: 0;
    width: 80px;
    height: 20px;
    background: #22c55e;
    overflow: hidden;
  }
  .intrinsic {
    width: 150px;
    height: 20px;
  }
</style>
<div class="frame row1"><div class="fixed"></div><div class="auto"></div></div>
<div class="frame row2"><div class="fixed"></div><div class="clip"><div class="intrinsic"></div></div></div>
