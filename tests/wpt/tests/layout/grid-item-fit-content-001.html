<!doctype html>
<meta charset="utf-8">
<title>Grid intrinsic sizing: fit-content() resolves for grid items</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }

  .grid {
    display: grid;
    width: 200px;
    grid-template-columns: max-content;
    justify-content: start;
    background: #d1d5db;
  }

  .item {
    width: fit-content(80px);
    background: #22c55e;
  }

  .intrinsic {
    font-size: 0;
    line-height: 0;
  }

  .seg {
    display: inline-block;
    width: 60px;
    height: 20px;
  }
</style>
<div class="grid">
  <div class="item">
    <div class="intrinsic"><span class="seg"></span><wbr><span class="seg"></span></div>
  </div>
</div>
