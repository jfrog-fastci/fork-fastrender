<!doctype html>
<meta charset="utf-8">
<title>Reference: Absolute insets are relative to the padding edge</title>
<style>
  html, body {
    margin: 0;
    background: #fff;
  }

  #cb {
    position: relative;
    box-sizing: border-box;
    width: 200px;
    height: 160px;
    border: 10px solid #000;
    /* No padding; the white content box is positioned to match. */
    background: #08f;
  }

  #content {
    position: absolute;
    background: #fff;
    top: 20px;
    left: 20px;
    width: 140px;
    height: 100px;
  }

  #box {
    position: absolute;
    width: 40px;
    height: 40px;
    background: #0a0;
    top: 0;
    left: 0;
  }
</style>
<div id="cb">
  <div id="content"></div>
  <div id="box"></div>
</div>
