<!doctype html>
<meta charset="utf-8">
<title>Grid align-content/justify-content: space-between</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .grid {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 120px;
    height: 120px;
    display: grid;
    grid-template-columns: 20px 20px;
    grid-template-rows: 20px 20px;
    justify-content: space-between;
    align-content: space-between;
    box-shadow: 0 0 0 2px #000;
  }
  .cell {
    width: 100%;
    height: 100%;
  }
  .a {
    background: #ef4444;
  }
  .b {
    background: #22c55e;
  }
  .c {
    background: #3b82f6;
  }
  .d {
    background: #111827;
  }
</style>
<div class="grid"><div class="cell a"></div><div class="cell b"></div><div class="cell c"></div><div class="cell d"></div></div>
