<!doctype html>
<meta charset="utf-8">
<title>Grid align-content/justify-content: space-between reference</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .frame {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 120px;
    height: 120px;
    box-shadow: 0 0 0 2px #000;
  }
  .cell {
    position: absolute;
    width: 20px;
    height: 20px;
  }
  .a {
    left: 0;
    top: 0;
    background: #ef4444;
  }
  .b {
    left: 100px;
    top: 0;
    background: #22c55e;
  }
  .c {
    left: 0;
    top: 100px;
    background: #3b82f6;
  }
  .d {
    left: 100px;
    top: 100px;
    background: #111827;
  }
</style>
<div class="frame"><div class="cell a"></div><div class="cell b"></div><div class="cell c"></div><div class="cell d"></div></div>
