<!doctype html>
<meta charset="utf-8">
<title>Float shrink-to-fit width reference</title>
<style>
  body {
    margin: 0;
    background: #f00;
  }

  .box {
    position: absolute;
    top: 0;
    height: 40px;
  }

  .float {
    left: 0;
    width: 80px;
    background: #0f0;
  }
</style>
<div class="box float"></div>
