<!doctype html>
<meta charset="utf-8">
<title>Absolute insets are relative to the padding edge (not the content edge)</title>
<style>
  html, body {
    margin: 0;
    background: #fff;
  }

  #cb {
    position: relative;
    box-sizing: border-box;
    width: 200px;
    height: 160px;
    border: 10px solid #000;
    padding: 20px;
    background: #08f;
  }

  /* White content box to make the padding area visible. */
  #content {
    width: 140px;
    height: 100px;
    background: #fff;
  }

  #box {
    position: absolute;
    width: 40px;
    height: 40px;
    background: #0a0;
    top: 0;
    left: 0;
  }
</style>
<div id="cb">
  <div id="content"></div>
  <div id="box"></div>
</div>
