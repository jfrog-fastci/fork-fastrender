<!doctype html>
<meta charset="utf-8">
<title>Nested float inside padded container reference</title>
<style>
  body {
    margin: 0;
    font-size: 0;
  }

  .container {
    position: relative;
    box-sizing: border-box;
    width: 160px;
    height: 100px;
    padding: 10px;
    background: #ddd;
  }

  .box {
    position: absolute;
  }

  .float {
    left: 10px;
    top: 10px;
    width: 40px;
    height: 40px;
    background: #00f;
  }

  .a {
    left: 50px;
    top: 10px;
    width: 100px;
    height: 40px;
    background: #0f0;
  }

  .b {
    left: 10px;
    top: 50px;
    width: 140px;
    height: 40px;
    background: #0f0;
  }
</style>
<div class="container">
  <div class="box float"></div>
  <div class="box a"></div>
  <div class="box b"></div>
</div>
