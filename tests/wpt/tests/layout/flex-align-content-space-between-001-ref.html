<!doctype html>
<meta charset="utf-8">
<title>Flex align-content: space-between with wrapping reference</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .frame {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 100px;
    height: 100px;
    box-shadow: 0 0 0 2px #000;
  }
  .item {
    position: absolute;
    width: 50px;
    height: 20px;
  }
  .a {
    left: 0;
    top: 0;
    background: #ef4444;
  }
  .b {
    left: 50px;
    top: 0;
    background: #22c55e;
  }
  .c {
    left: 0;
    top: 80px;
    background: #3b82f6;
  }
  .d {
    left: 50px;
    top: 80px;
    background: #111827;
  }
</style>
<div class="frame"><div class="item a"></div><div class="item b"></div><div class="item c"></div><div class="item d"></div></div>
