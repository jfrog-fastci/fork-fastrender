<!doctype html>
<meta charset="utf-8">
<title>Nested float inside padded container</title>
<style>
  body {
    margin: 0;
    font-size: 0;
  }

  .container {
    box-sizing: border-box;
    width: 160px;
    height: 100px;
    padding: 10px;
    background: #ddd;
  }

  .float {
    float: left;
    width: 40px;
    height: 40px;
    background: #00f;
  }

  .piece {
    display: inline-block;
    background: #0f0;
    vertical-align: top;
  }

  .piece.a {
    width: 100px;
    height: 40px;
  }

  .piece.b {
    width: 140px;
    height: 40px;
  }
</style>
<div class="container">
  <div class="float"></div>
  <div>
    <span class="piece a"></span><span class="piece b"></span>
  </div>
</div>
