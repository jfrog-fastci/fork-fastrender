<!doctype html>
<meta charset="utf-8">
<title>Absolute inset shorthand</title>
<style>
  html, body {
    margin: 0;
    background: #fff;
  }

  #cb {
    position: relative;
    width: 200px;
    height: 160px;
    background: #ddd;
  }

  #box {
    position: absolute;
    background: #0a0;
    inset: 10px 20px 30px 40px;
  }
</style>
<div id="cb">
  <div id="box"></div>
</div>
