<!doctype html>
<meta charset="utf-8">
<title>Absolute positioning bottom/right equivalence</title>
<style>
  html, body {
    margin: 0;
    background: #fff;
  }

  #cb {
    position: relative;
    width: 200px;
    height: 160px;
    background: #ddd;
  }

  #box {
    position: absolute;
    width: 40px;
    height: 30px;
    background: #0a0;
    bottom: 20px;
    right: 30px;
  }
</style>
<div id="cb">
  <div id="box"></div>
</div>
