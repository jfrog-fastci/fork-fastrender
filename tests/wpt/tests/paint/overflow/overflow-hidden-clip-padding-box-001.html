<!doctype html>
<meta charset="utf-8">
<title>overflow:hidden clips to the padding box</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .container {
    position: relative;
    width: 120px;
    height: 120px;
    box-sizing: border-box;
    border: 10px solid rgb(0, 0, 0);
    overflow: hidden;
    background: white;
  }

  .child {
    position: absolute;
    left: -10px;
    top: -10px;
    width: 60px;
    height: 60px;
    background: rgb(220, 0, 0);
  }
</style>
<div class="container">
  <div class="child"></div>
</div>
