<!doctype html>
<meta charset="utf-8">
<title>positioned element with z-index:auto paints above floats</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .positioned {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 120px;
    height: 120px;
    background: rgb(0, 160, 0);
  }

  .float {
    float: left;
    width: 120px;
    height: 120px;
    margin-top: 40px;
    margin-left: 40px;
    background: rgb(220, 0, 0);
  }
</style>

<div class="root">
  <div class="positioned"></div>
  <div class="float"></div>
</div>
