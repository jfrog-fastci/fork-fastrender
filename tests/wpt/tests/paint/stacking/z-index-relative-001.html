<!doctype html>
<meta charset="utf-8">
<title>z-index reorders relative positioned siblings</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    width: 200px;
    height: 200px;
    background: white;
    padding-top: 1px;
    box-sizing: border-box;
  }

  .box {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .red {
    background: rgb(220, 0, 0);
    margin-top: 20px;
    margin-left: 20px;
    z-index: 2;
  }

  .green {
    background: rgb(0, 160, 0);
    margin-top: -60px;
    margin-left: 60px;
    z-index: 1;
  }
</style>

<div class="root">
  <div class="box red"></div>
  <div class="box green"></div>
</div>
