<!doctype html>
<meta charset="utf-8">
<title>backdrop-filter creates a stacking context reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .box {
    position: absolute;
    width: 120px;
    height: 120px;
  }

  .blue {
    top: 40px;
    left: 40px;
    background: rgb(0, 0, 220);
  }

  .green {
    top: 80px;
    left: 80px;
    background: rgb(0, 160, 0);
  }
</style>

<div class="root">
  <div class="box blue"></div>
  <div class="box green"></div>
</div>
