<!doctype html>
<meta charset="utf-8">
<title>z-index reorders flex items</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    width: 200px;
    height: 200px;
    background: white;
  }

  .container {
    display: flex;
    width: 200px;
    height: 200px;
    align-items: flex-start;
    justify-content: flex-start;
    padding-top: 20px;
    padding-left: 20px;
    box-sizing: border-box;
  }

  .box {
    width: 120px;
    height: 120px;
  }

  .green {
    background: rgb(0, 160, 0);
    z-index: 2;
  }

  .red {
    background: rgb(220, 0, 0);
    margin-left: -60px;
    z-index: 1;
  }
</style>

<div class="root">
  <div class="container">
    <div class="box green"></div>
    <div class="box red"></div>
  </div>
</div>
