<!doctype html>
<meta charset="utf-8">
<title>positioned element with z-index:auto paints above in-flow content</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
    border: 1px solid transparent;
    box-sizing: border-box;
  }

  .positioned {
    position: absolute;
    top: 60px;
    left: 60px;
    width: 120px;
    height: 120px;
    background: rgb(0, 160, 0);
  }

  .inflow {
    width: 120px;
    height: 120px;
    background: rgb(220, 0, 0);
    margin-top: 20px;
    margin-left: 20px;
  }
</style>

<div class="root">
  <div class="positioned"></div>
  <div class="inflow"></div>
</div>
