<!doctype html>
<meta charset="utf-8">
<title>negative z-index paints below positioned parent background when parent is not a stacking context</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .parent {
    position: relative;
    width: 120px;
    height: 120px;
    background: rgb(0, 160, 0);
  }

  .child {
    position: absolute;
    left: 0;
    top: 0;
    width: 120px;
    height: 120px;
    background: rgb(220, 0, 0);
    z-index: -1;
  }
</style>
<div class="parent">
  <div class="child"></div>
</div>
