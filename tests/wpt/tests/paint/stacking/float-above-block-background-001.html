<!doctype html>
<meta charset="utf-8">
<title>floats paint above in-flow block backgrounds</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    width: 200px;
    height: 200px;
    background: white;
  }

  .float {
    float: left;
    width: 120px;
    height: 120px;
    margin-top: 40px;
    margin-left: 40px;
    background: rgb(220, 0, 0);
  }

  .block {
    width: 200px;
    height: 200px;
    background: rgb(0, 160, 0);
  }
</style>

<div class="root">
  <div class="float"></div>
  <div class="block"></div>
</div>
