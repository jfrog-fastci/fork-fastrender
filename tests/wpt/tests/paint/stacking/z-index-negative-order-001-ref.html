<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .box {
    position: absolute;
    width: 80px;
    height: 80px;
  }

  .back {
    left: 10px;
    top: 10px;
    background: rgb(0, 0, 200);
  }

  .front {
    left: 30px;
    top: 30px;
    background: rgb(220, 0, 0);
  }
</style>
<div class="root">
  <div class="box back"></div>
  <div class="box front"></div>
</div>
