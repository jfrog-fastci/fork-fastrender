<!doctype html>
<meta charset="utf-8">
<title>position:sticky creates a stacking context</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
    border: 1px solid transparent;
    box-sizing: border-box;
  }

  .sticky-parent {
    position: sticky;
    top: 0;
    width: 160px;
    height: 160px;
    margin-top: 19px;
    margin-left: 19px;
  }

  .child {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 120px;
    height: 120px;
    background: rgb(0, 0, 220);
    z-index: 10;
  }

  .outside {
    position: absolute;
    top: 80px;
    left: 80px;
    width: 120px;
    height: 120px;
    background: rgb(0, 160, 0);
    z-index: 5;
  }
</style>

<div class="root">
  <div class="sticky-parent">
    <div class="child"></div>
  </div>
  <div class="outside"></div>
</div>
