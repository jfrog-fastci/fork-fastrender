<!doctype html>
<meta charset="utf-8">
<title>positive z-index stacking contexts paint above positioned z-index:auto reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .box {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 120px;
    height: 120px;
  }

  .green {
    background: rgb(0, 160, 0);
  }

  .red {
    background: rgb(220, 0, 0);
  }
</style>

<div class="root">
  <div class="box green"></div>
  <div class="box red"></div>
</div>
