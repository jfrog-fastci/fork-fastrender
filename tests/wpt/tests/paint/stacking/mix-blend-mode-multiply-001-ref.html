<!doctype html>
<meta charset="utf-8">
<title>mix-blend-mode multiply reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .red {
    position: absolute;
    top: 0;
    left: 0;
    width: 120px;
    height: 200px;
    background: rgb(255, 0, 0);
  }

  .black {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 80px;
    height: 120px;
    background: rgb(0, 0, 0);
  }

  .blue {
    position: absolute;
    top: 40px;
    left: 120px;
    width: 40px;
    height: 120px;
    background: rgb(0, 0, 255);
  }
</style>

<div class="root">
  <div class="red"></div>
  <div class="black"></div>
  <div class="blue"></div>
</div>
