<!doctype html>
<meta charset="utf-8">
<title>negative z-index paints behind non-positioned in-flow content</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .inflow {
    width: 80px;
    height: 80px;
    margin-left: 20px;
    margin-top: 20px;
    background: rgb(0, 160, 0);
  }

  .neg {
    position: absolute;
    left: 40px;
    top: 40px;
    width: 80px;
    height: 80px;
    background: rgb(220, 0, 0);
    z-index: -1;
  }
</style>
<div class="root">
  <div class="neg"></div>
  <div class="inflow"></div>
</div>
