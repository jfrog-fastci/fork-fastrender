<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .green {
    position: absolute;
    left: 20px;
    top: 20px;
    width: 80px;
    height: 80px;
    background: rgb(0, 160, 0);
  }

  .red {
    position: absolute;
    left: 40px;
    top: 40px;
    width: 80px;
    height: 80px;
    background: rgb(220, 0, 0);
  }
</style>
<div class="root">
  <div class="red"></div>
  <div class="green"></div>
</div>
