<!doctype html>
<meta charset="utf-8">
<title>transform creates a stacking context for in-flow elements</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: rgb(0, 0, 200);
  }

  .root {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .transform-parent {
    position: relative;
    width: 120px;
    height: 120px;
    transform: translate(0px, 0px);
  }

  .child {
    position: absolute;
    left: 0;
    top: 0;
    width: 120px;
    height: 120px;
    background: rgb(0, 0, 200);
    z-index: 999;
  }

  .outside {
    position: absolute;
    left: 30px;
    top: 30px;
    width: 60px;
    height: 60px;
    background: rgb(220, 0, 0);
    z-index: 1;
  }
</style>
<div class="root">
  <div class="transform-parent">
    <div class="child"></div>
  </div>
  <div class="outside"></div>
</div>
