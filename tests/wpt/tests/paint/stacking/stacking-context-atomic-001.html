<!doctype html>
<meta charset="utf-8">
<title>child stacking contexts paint atomically</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .context-a {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 160px;
    height: 160px;
    z-index: 1;
  }

  .context-b {
    position: absolute;
    top: 60px;
    left: 60px;
    width: 160px;
    height: 160px;
    z-index: 2;
  }

  .box {
    position: absolute;
    width: 120px;
    height: 120px;
  }

  .red {
    background: rgb(220, 0, 0);
    top: 0;
    left: 0;
    z-index: 999;
  }

  .green {
    background: rgb(0, 160, 0);
    top: 0;
    left: 0;
    z-index: -999;
  }
</style>

<div class="root">
  <div class="context-a">
    <div class="box red"></div>
  </div>
  <div class="context-b">
    <div class="box green"></div>
  </div>
</div>
