<!doctype html>
<meta charset="utf-8">
<title>z-index reorders grid items</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    display: grid;
    grid-template-columns: 20px 120px 60px;
    grid-template-rows: 20px 120px 60px;
    width: 200px;
    height: 200px;
    background: white;
  }

  .green {
    background: rgb(0, 160, 0);
    grid-row: 2 / 3;
    grid-column: 2 / 3;
    z-index: 2;
  }

  .red {
    background: rgb(220, 0, 0);
    grid-row: 2 / 4;
    grid-column: 2 / 4;
    z-index: 1;
  }
</style>

<div class="root">
  <div class="green"></div>
  <div class="red"></div>
</div>
