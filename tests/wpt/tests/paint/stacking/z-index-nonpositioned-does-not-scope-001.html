<!doctype html>
<meta charset="utf-8">
<title>z-index on a non-positioned ancestor does not scope descendant z-index</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .parent {
    width: 120px;
    height: 120px;
    z-index: 0;
  }

  .child {
    position: absolute;
    left: 20px;
    top: 20px;
    width: 80px;
    height: 80px;
    background: rgb(0, 0, 200);
    z-index: 10;
  }

  .outside {
    position: absolute;
    left: 40px;
    top: 40px;
    width: 80px;
    height: 80px;
    background: rgb(220, 0, 0);
    z-index: 5;
  }
</style>
<div class="root">
  <div class="parent">
    <div class="child"></div>
  </div>
  <div class="outside"></div>
</div>
