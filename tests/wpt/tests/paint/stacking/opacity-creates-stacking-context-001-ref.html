<!doctype html>
<meta charset="utf-8">
<title>opacity creates a stacking context reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    width: 200px;
    height: 200px;
    background: white;
  }

  .opacity-parent {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 160px;
    height: 160px;
  }

  .child {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 120px;
    height: 120px;
    background: rgb(0, 0, 220);
    opacity: 0.5;
  }

  .outside {
    position: absolute;
    top: 80px;
    left: 80px;
    width: 120px;
    height: 120px;
    background: rgb(0, 160, 0);
  }
</style>

<div class="root">
  <div class="opacity-parent">
    <div class="child"></div>
  </div>
  <div class="outside"></div>
</div>
