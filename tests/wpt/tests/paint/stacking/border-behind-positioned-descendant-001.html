<!doctype html>
<meta charset="utf-8">
<title>borders paint behind overlapping positioned descendants</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .box {
    position: relative;
    width: 120px;
    height: 120px;
    box-sizing: border-box;
    border: 10px solid rgb(0, 0, 0);
    background: white;
  }

  .child {
    position: absolute;
    left: -10px;
    top: -10px;
    width: 40px;
    height: 40px;
    background: rgb(220, 0, 0);
  }
</style>
<div class="box">
  <div class="child"></div>
</div>
