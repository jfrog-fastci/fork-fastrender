<!doctype html>
<meta charset="utf-8">
<title>Negative z-index places element behind siblings</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .root {
    position: relative;
    z-index: 0;
    width: 200px;
    height: 200px;
    background: white;
    z-index: 0;
  }

  .box {
    position: absolute;
    width: 120px;
    height: 120px;
  }

  .green {
    background: rgb(0, 160, 0);
    top: 20px;
    left: 20px;
  }

  .red {
    background: rgb(220, 0, 0);
    top: 60px;
    left: 60px;
    z-index: -1;
  }
</style>

<div class="root">
  <div class="box green"></div>
  <div class="box red"></div>
</div>
