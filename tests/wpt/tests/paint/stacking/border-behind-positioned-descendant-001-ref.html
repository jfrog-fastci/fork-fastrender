<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .outer {
    position: relative;
    width: 120px;
    height: 120px;
    background: rgb(0, 0, 0);
  }

  .inner {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 100px;
    height: 100px;
    background: white;
  }

  .child {
    position: absolute;
    left: 0;
    top: 0;
    width: 40px;
    height: 40px;
    background: rgb(220, 0, 0);
  }
</style>
<div class="outer">
  <div class="inner"></div>
  <div class="child"></div>
</div>
