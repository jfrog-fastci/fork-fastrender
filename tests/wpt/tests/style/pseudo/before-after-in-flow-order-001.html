<!doctype html>
<meta charset="utf-8">
<title>::before and ::after appear before/after normal children</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #host {
    width: 80px;
    height: 90px;
    background: red;
    margin: 20px;
  }
  #host::before {
    content: "";
    display: block;
    width: 80px;
    height: 30px;
    background: green;
  }
  #host::after {
    content: "";
    display: block;
    width: 80px;
    height: 30px;
    background: rgb(200, 120, 0);
  }
  .middle {
    width: 80px;
    height: 30px;
    background: blue;
  }
</style>
<div id="host">
  <div class="middle"></div>
</div>
