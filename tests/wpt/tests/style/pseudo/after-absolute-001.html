<!doctype html>
<meta charset="utf-8">
<title>::after absolute positioned box</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #parent {
    position: relative;
    width: 100px;
    height: 80px;
    background: red;
    margin: 20px;
  }
  #parent::after {
    content: "";
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 30px;
    height: 30px;
    background: green;
  }
</style>
<div id="parent"></div>
