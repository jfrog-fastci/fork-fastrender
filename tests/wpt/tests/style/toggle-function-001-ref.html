<!doctype html>
<meta charset="utf-8">
<title>CSS Values 5 toggle() substitution function reference</title>
<style>
  body {
    margin: 0;
    background: white;
  }

  #a,
  #b,
  #c {
    box-sizing: border-box;
  }

  #a {
    width: 140px;
    height: 140px;
    padding: 20px;
    background-color: rgb(0, 128, 0);
  }

  #b {
    width: 100%;
    height: 100%;
    padding: 20px;
    background-color: red;
  }

  #c {
    width: 100%;
    height: 100%;
    background-color: green;
  }
</style>
<div id="a"><div id="b"><div id="c"></div></div></div>
