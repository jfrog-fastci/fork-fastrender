<!doctype html>
<meta charset="utf-8">
<title>@supports not() semantics</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  /* (display:flex) should be true, so `not (...)` is false. */
  @supports not (display: flex) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
