<!doctype html>
<meta charset="utf-8">
<title>@supports selector() true branch applies</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  /* Selector queries use forgiving parsing; :has(*) is supported by FastRender's selector engine. */
  @supports selector(:has(*)) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
