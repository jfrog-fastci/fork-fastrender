<!doctype html>
<meta charset="utf-8">
<title>@supports selector() forgiving parsing</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  /* The first selector is invalid, but the second is valid; forgiving parsing should make this true. */
  @supports selector(:not-a-real-pseudo, div) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
