<!doctype html>
<meta charset="utf-8">
<title>@container style() ignores revert keywords inside url() values</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    --flag: url(revert);
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  /* `revert` inside `url()` should not be treated as the cascade keyword. */
  @container style(--flag: url(revert)) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
