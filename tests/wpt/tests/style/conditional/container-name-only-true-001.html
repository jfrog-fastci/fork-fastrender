<!doctype html>
<meta charset="utf-8">
<title>@container name-only condition matches</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    container-type: inline-size;
    container-name: outer;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  /* Name-only conditions should match when a named query container exists. */
  @container outer {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
