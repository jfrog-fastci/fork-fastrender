<!doctype html>
<meta charset="utf-8">
<title>@container style() named selection reference</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #outer {
    width: 100px;
    height: 100px;
    container-name: outer;
    background-color: rgb(0, 160, 0);
  }
  #inner {
    width: 100px;
    height: 100px;
    container-name: inner;
    background-color: rgb(255, 0, 0);
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(0, 160, 0);
  }
</style>
<div id="outer">
  <div id="inner">
    <div id="box"></div>
  </div>
</div>
