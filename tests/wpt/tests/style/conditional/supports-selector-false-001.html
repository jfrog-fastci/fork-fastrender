<!doctype html>
<meta charset="utf-8">
<title>@supports selector() false branch does not apply</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  /* No selector in the list is valid. */
  @supports selector(:not-a-real-pseudo) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
