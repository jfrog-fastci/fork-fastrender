<!doctype html>
<meta charset="utf-8">
<title>@container inline-size max-width query</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    container-type: inline-size;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  @container (max-width: 120px) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
