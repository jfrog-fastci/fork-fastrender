<!doctype html>
<meta charset="utf-8">
<title>@container named selection</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #outer {
    width: 100px;
    height: 60px;
    container-type: inline-size;
    container-name: outer;
  }
  #inner {
    width: 60px;
    height: 60px;
    container-type: inline-size;
    container-name: inner;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  /* Must select the named outer container (100px) rather than the nearest one (60px). */
  @container outer (min-width: 90px) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="outer">
  <div id="inner">
    <div id="box"></div>
  </div>
</div>
