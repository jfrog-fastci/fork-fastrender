<!doctype html>
<meta charset="utf-8">
<title>@container style() boolean feature respects registered custom property initial value</title>
<style>
  body {
    margin: 0;
    background: white;
  }

  @property --n {
    syntax: "<number>";
    inherits: false;
    initial-value: 0;
  }

  .container {
    width: 120px;
    height: 60px;
    container-type: inline-size;
  }

  #initial {
    --n: 0;
  }

  #noninitial {
    --n: 1;
  }

  .box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  @container style(--n) {
    .box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="initial" class="container">
  <div class="box"></div>
</div>
<div id="noninitial" class="container">
  <div class="box"></div>
</div>
