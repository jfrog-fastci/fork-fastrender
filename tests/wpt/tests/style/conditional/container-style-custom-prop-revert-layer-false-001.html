<!doctype html>
<meta charset="utf-8">
<title>@container style() treats revert-layer as invalid in style queries</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    --flag: revert-layer;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  /* `revert-layer` is invalid in style queries, even if the custom property value matches. */
  @container style(--flag: revert-layer) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
