<!doctype html>
<meta charset="utf-8">
<title>@container style() resolves var() in feature values</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    --expected: yes;
    --flag: yes;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  @container style(--flag: var(--expected)) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
