<!doctype html>
<meta charset="utf-8">
<title>@supports unknown property is false</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  @supports (this-property-does-not-exist: 1) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
