<!doctype html>
<meta charset="utf-8">
<title>@supports container-type true branch applies</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #box {
    width: 120px;
    height: 120px;
    background: rgb(255, 0, 0);
  }

  @supports (container-type: inline-size) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="box"></div>
