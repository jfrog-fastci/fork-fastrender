<!doctype html>
<meta charset="utf-8">
<title>@container requires a query container</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    /* Intentionally omit container-type so this does not establish a query container. */
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  @container (min-width: 80px) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
