<!doctype html>
<meta charset="utf-8">
<title>@container or() short-circuits unknown queries when known branch is true</title>
<style>
  body {
    margin: 0;
    background: white;
  }
  #container {
    width: 100px;
    height: 100px;
    container-type: inline-size;
  }
  #box {
    width: 100%;
    height: 100%;
    background: rgb(255, 0, 0);
  }

  /* First branch is true; unknown branch should not prevent matching. */
  @container (min-width: 80px) or (foo: 1) {
    #box {
      background: rgb(0, 160, 0);
    }
  }
</style>
<div id="container">
  <div id="box"></div>
</div>
