<!doctype html>
<meta charset="utf-8">
<title>container query style: custom property equality</title>
<style>
html, body {
  margin: 0;
  background: #fff;
}
.container {
  container-type: style;
  width: 200px;
  height: 50px;
  --theme: dark;
}
.target {
  width: 200px;
  height: 50px;
  background: #00f;
}
@container style(--theme: dark) {
  .target { background: #0f0; }
}
</style>
<div class="container">
  <div class="target"></div>
</div>
