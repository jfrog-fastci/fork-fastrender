<!doctype html>
<meta charset="utf-8">
<title>feTurbulence baseFrequency=0 turbulence is fully transparent</title>
<style>
html, body {
  margin: 0;
  background: black;
}
svg { display: none; }
.frame {
  position: relative;
  width: 40px;
  height: 40px;
  box-sizing: border-box;
  border: 1px solid white;
}
.interior {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: white;
  filter: url(#turb);
}
</style>
<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="turb" x="0" y="0" width="1" height="1"
            filterUnits="objectBoundingBox">
      <feTurbulence type="turbulence" baseFrequency="0" numOctaves="1" seed="0"/>
    </filter>
  </defs>
</svg>
<div class="frame">
  <!-- Interior is filtered; baseFrequency=0 for type=turbulence currently yields transparent output. -->
  <div class="interior"></div>
</div>
