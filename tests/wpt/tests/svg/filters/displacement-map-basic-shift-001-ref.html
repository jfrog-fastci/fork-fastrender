<!doctype html>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    background: white;
  }
  .frame {
    position: relative;
    width: 60px;
    height: 20px;
    background: rgb(210, 230, 255);
    overflow: hidden;
  }
  .pattern {
    position: absolute;
    top: 0;
    left: -1px;
    width: 60px;
    height: 20px;
  }
  .stripe {
    position: absolute;
    top: 0;
    width: 10px;
    height: 20px;
  }
  .r { left: 0px; background: rgb(255, 0, 0); }
  .g { left: 10px; background: rgb(0, 255, 0); }
  .b { left: 20px; background: rgb(0, 0, 255); }
  .y { left: 30px; background: rgb(255, 255, 0); }
  .m { left: 40px; background: rgb(255, 0, 255); }
  .c { left: 50px; background: rgb(0, 255, 255); }
</style>
<!-- Reference for displacement-map-basic-shift-001.html -->
<div class="frame">
  <!-- dx=+1px samples at x+1, so the visible content is shifted left by 1px. -->
  <div class="pattern">
    <div class="stripe r"></div>
    <div class="stripe g"></div>
    <div class="stripe b"></div>
    <div class="stripe y"></div>
    <div class="stripe m"></div>
    <div class="stripe c"></div>
  </div>
</div>
