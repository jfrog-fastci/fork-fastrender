<!doctype html>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    background: white;
  }
  .frame {
    position: relative;
    width: 60px;
    height: 20px;
    background: rgb(255, 0, 255);
    overflow: hidden;
  }
  .pattern {
    position: absolute;
    top: -1px;
    left: 0;
    width: 60px;
    height: 20px;
    background: rgb(0, 200, 0);
  }
</style>
<!-- Reference for displacement-map-out-of-bounds-001.html -->
<div class="frame">
  <!-- dy=+1px samples at y+1, so the visible content is shifted up by 1px and the last row is transparent. -->
  <div class="pattern"></div>
</div>
