<!doctype html>
<meta charset="utf-8">
<title>feTurbulence baseFrequency=0 fractalNoise fast-path (sRGB vs linearRGB)</title>
<style>
html, body {
  margin: 0;
  background: black;
}
svg { display: none; }
.box {
  position: absolute;
  top: 0;
  width: 40px;
  height: 40px;
  background: white;
}
#srgb {
  left: 0;
  filter: url(#turb-srgb);
}
#linear {
  left: 60px;
  filter: url(#turb-linear);
}
</style>
<!-- See docs/notes/svg_filters_turbulence_displacement.md section “baseFrequency=0 fast-path”. -->
<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="turb-srgb" x="0" y="0" width="1" height="1" filterUnits="objectBoundingBox"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0" numOctaves="1" seed="0"/>
    </filter>
    <filter id="turb-linear" x="0" y="0" width="1" height="1" filterUnits="objectBoundingBox"
            color-interpolation-filters="linearRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0" numOctaves="1" seed="0"/>
    </filter>
  </defs>
</svg>
<div class="box" id="srgb"></div>
<div class="box" id="linear"></div>
