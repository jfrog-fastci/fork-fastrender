<!doctype html>
<meta charset="utf-8">
<link rel="match" href="displacement-map-basic-shift-001-ref.html">
<style>
  html, body {
    margin: 0;
    background: white;
  }
  .frame {
    position: relative;
    width: 60px;
    height: 20px;
    background: rgb(210, 230, 255);
    overflow: hidden;
  }
  .pattern {
    position: absolute;
    top: 0;
    left: 0;
    width: 60px;
    height: 20px;
  }
  .stripe {
    position: absolute;
    top: 0;
    width: 10px;
    height: 20px;
  }
  .r { left: 0px; background: rgb(255, 0, 0); }
  .g { left: 10px; background: rgb(0, 255, 0); }
  .b { left: 20px; background: rgb(0, 0, 255); }
  .y { left: 30px; background: rgb(255, 255, 0); }
  .m { left: 40px; background: rgb(255, 0, 255); }
  .c { left: 50px; background: rgb(0, 255, 255); }
  svg { display: none; }
</style>
<!--
  Basic feDisplacementMap shift.

  Map construction:
  We want dx = +1px and dy = 0px with scale=2.

    dx = (xChannel - 0.5) * scale
    dy = (yChannel - 0.5) * scale

  The displacement map samples *premultiplied* channel values (matching Chrome/resvg). Use an
  opaque feFlood so the sampled channel values are the intended bytes:

    flood-color = rgb(255, 128, 0)  ->  R=1.0, G≈0.5

  So with scale=2:
    dx = (1.0 - 0.5) * 2 = +1
    dy ≈ (128/255 - 0.5) * 2 ≈ 0   (small enough that nearest-neighbor pixel-center rounding
                                   keeps the Y coordinate unchanged)

  This pins down:
  - displacement scale units for X
  - sampling coordinate convention (integer displacements should be exact)
  - out-of-bounds sampling along +X (the vacated 1px column is transparent)
-->
<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shift-x-plus-1" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feFlood flood-color="rgb(255, 128, 0)" flood-opacity="1" result="map"></feFlood>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
</svg>
<div class="frame">
  <div class="pattern" style="filter: url(#shift-x-plus-1)">
    <div class="stripe r"></div>
    <div class="stripe g"></div>
    <div class="stripe b"></div>
    <div class="stripe y"></div>
    <div class="stripe m"></div>
    <div class="stripe c"></div>
  </div>
</div>
