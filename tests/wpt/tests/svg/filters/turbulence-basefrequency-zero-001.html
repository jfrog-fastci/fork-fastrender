<!doctype html>
<meta charset="utf-8">
<link rel="match" href="turbulence-basefrequency-zero-001-ref.html">
<style>
  html, body {
    margin: 0;
    background: white;
  }
  svg { display: block; }
</style>
<!--
  feTurbulence(baseFrequency=0) produces Perlin noise of 0 everywhere, which maps to 0.5 gray.

  This test locks down generator output encoding under color-interpolation-filters:
  - Default (linearRGB): 0.5 in *linear* RGB is encoded to sRGB bytes (~188).
  - Explicit sRGB: 0.5 in sRGB is encoded to byte 128.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" shape-rendering="crispEdges">
  <defs>
    <filter id="turbulence-linear" x="0" y="0" width="1" height="1">
      <feTurbulence baseFrequency="0" numOctaves="1" seed="0"></feTurbulence>
    </filter>
    <filter id="turbulence-srgb" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feTurbulence baseFrequency="0" numOctaves="1" seed="0"></feTurbulence>
    </filter>
  </defs>

  <rect x="0" y="0" width="80" height="20" fill="black" filter="url(#turbulence-linear)"></rect>
  <rect x="0" y="20" width="80" height="20" fill="black" filter="url(#turbulence-srgb)"></rect>
</svg>
