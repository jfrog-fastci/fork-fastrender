<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }
  table {
    table-layout: fixed;
    width: 300px;
    border-collapse: separate;
    border-spacing: 0;
    border: 0;
    padding: 0;
  }
  td {
    padding: 0;
    border: 0;
    height: 20px;
  }
  td.a { background: rgb(255, 0, 0); }
  td.b { background: rgb(0, 255, 0); }
  td.c { background: rgb(0, 0, 255); }
</style>
<table>
  <colgroup>
    <col style="width: 50px">
    <col style="width: 125px">
    <col style="width: 125px">
  </colgroup>
  <tr>
    <td class="a"></td>
    <td class="b"></td>
    <td class="c"></td>
  </tr>
</table>
