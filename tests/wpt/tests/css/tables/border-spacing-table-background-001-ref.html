<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  .container {
    position: relative;
    width: 90px;
    height: 50px;
    background: rgb(0, 160, 0);
  }

  .cell {
    position: absolute;
    top: 10px;
    width: 30px;
    height: 30px;
  }

  .a { left: 10px; background: rgb(220, 0, 0); }
  .b { left: 50px; background: rgb(0, 0, 200); }
</style>
<div class="container">
  <div class="cell a"></div>
  <div class="cell b"></div>
</div>
