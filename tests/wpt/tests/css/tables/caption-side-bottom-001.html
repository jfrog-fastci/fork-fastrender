<!doctype html>
<meta charset="utf-8">
<title>Caption-side bottom places caption after table grid</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }
  table {
    width: 100px;
    border-collapse: separate;
    border-spacing: 0;
    border: 0;
    padding: 0;
  }
  caption {
    caption-side: bottom;
    height: 20px;
    padding: 0;
    background: rgb(0, 0, 255);
  }
  td {
    padding: 0;
    border: 0;
    height: 30px;
    background: rgb(255, 0, 0);
  }
</style>
<table>
  <caption></caption>
  <tr><td></td></tr>
</table>
