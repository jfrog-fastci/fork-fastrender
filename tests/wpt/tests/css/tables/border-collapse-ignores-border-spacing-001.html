<!doctype html>
<meta charset="utf-8">
<title>border-spacing is ignored when border-collapse: collapse</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  table {
    border-collapse: collapse;
    border-spacing: 20px;
    border: 0;
    font-size: 0;
    line-height: 0;
  }

  td {
    padding: 0;
    width: 20px;
    height: 20px;
    background: rgb(220, 0, 0);
    border: 0;
  }
</style>
<table>
  <tr><td></td></tr>
</table>
