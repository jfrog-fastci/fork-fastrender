<!doctype html>
<meta charset="utf-8">
<title>rowspan and colspan interact in the grid</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  table {
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0;
    line-height: 0;
  }

  td {
    padding: 0;
    width: 20px;
    height: 20px;
    border: 0;
  }

  td.a { background: rgb(220, 0, 0); }
  td.b { background: rgb(0, 160, 0); }
  td.c { background: rgb(0, 0, 200); }
  td.d { background: rgb(220, 220, 0); }
  td.e { background: rgb(0, 200, 200); }
  td.f { background: rgb(220, 0, 220); }
</style>
<table>
  <tr>
    <td class="a" rowspan="2" colspan="2"></td>
    <td class="b"></td>
  </tr>
  <tr>
    <td class="c"></td>
  </tr>
  <tr>
    <td class="d"></td>
    <td class="e"></td>
    <td class="f"></td>
  </tr>
</table>
