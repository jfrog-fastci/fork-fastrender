<!doctype html>
<meta charset="utf-8">
<title>Border-spacing offsets edge cells from table border edge</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }
  table {
    border-collapse: separate;
    border-spacing: 10px;
    border: 0;
    padding: 0;
  }
  td {
    padding: 0;
    border: 0;
    width: 20px;
    height: 20px;
    background: rgb(255, 0, 0);
  }
</style>
<table>
  <tr><td></td></tr>
</table>
