<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }
  #container {
    position: relative;
    width: 250px;
    height: 40px;
  }
  #left {
    position: absolute;
    left: 0;
    top: 0;
    width: 200px;
    height: 40px;
    background: rgb(255, 0, 0);
  }
  #right {
    position: absolute;
    left: 200px;
    top: 0;
    width: 50px;
    height: 40px;
    background: rgb(0, 255, 0);
  }
</style>
<div id="container">
  <div id="left"></div>
  <div id="right"></div>
</div>
