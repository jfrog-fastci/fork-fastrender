<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  .container {
    position: relative;
    width: 60px;
    height: 60px;
  }

  .a {
    position: absolute;
    left: 0;
    top: 0;
    width: 40px;
    height: 40px;
    background: rgb(220, 0, 0);
  }

  .b {
    position: absolute;
    left: 40px;
    top: 0;
    width: 20px;
    height: 20px;
    background: rgb(0, 160, 0);
  }

  .c {
    position: absolute;
    left: 40px;
    top: 20px;
    width: 20px;
    height: 20px;
    background: rgb(0, 0, 200);
  }

  .d {
    position: absolute;
    left: 0;
    top: 40px;
    width: 20px;
    height: 20px;
    background: rgb(220, 220, 0);
  }

  .e {
    position: absolute;
    left: 20px;
    top: 40px;
    width: 20px;
    height: 20px;
    background: rgb(0, 200, 200);
  }

  .f {
    position: absolute;
    left: 40px;
    top: 40px;
    width: 20px;
    height: 20px;
    background: rgb(220, 0, 220);
  }
</style>
<div class="container">
  <div class="a"></div>
  <div class="b"></div>
  <div class="c"></div>
  <div class="d"></div>
  <div class="e"></div>
  <div class="f"></div>
</div>
