<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  .grid {
    position: relative;
    width: 120px;
    height: 120px;
    background: rgb(0, 0, 0);
  }

  .cell {
    position: absolute;
    width: 40px;
    height: 40px;
  }

  .a { left: 10px; top: 10px; background: rgb(220, 0, 0); }
  .b { left: 70px; top: 10px; background: rgb(0, 160, 0); }
  .c { left: 10px; top: 70px; background: rgb(0, 0, 200); }
  .d { left: 70px; top: 70px; background: rgb(220, 220, 0); }
</style>
<div class="grid">
  <div class="cell a"></div>
  <div class="cell b"></div>
  <div class="cell c"></div>
  <div class="cell d"></div>
</div>
