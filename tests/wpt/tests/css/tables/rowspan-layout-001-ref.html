<!doctype html>
<meta charset="utf-8">
<title>Reference</title>
<style>
  html, body {
    margin: 0;
    background: white;
  }

  .container {
    position: relative;
    width: 60px;
    height: 60px;
  }

  .a {
    position: absolute;
    left: 0;
    top: 0;
    width: 30px;
    height: 60px;
    background: rgb(220, 0, 0);
  }

  .b {
    position: absolute;
    left: 30px;
    top: 0;
    width: 30px;
    height: 30px;
    background: rgb(0, 160, 0);
  }

  .c {
    position: absolute;
    left: 30px;
    top: 30px;
    width: 30px;
    height: 30px;
    background: rgb(0, 0, 200);
  }
</style>
<div class="container">
  <div class="a"></div>
  <div class="b"></div>
  <div class="c"></div>
</div>
