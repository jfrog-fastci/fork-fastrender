<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>multicol: column-fill:balance balances content between columns</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: white;
      }

      #multicol {
        width: 100px;
        height: 100px;
        column-count: 2;
        column-gap: 0;
        column-fill: balance;
      }

      .item {
        width: 100%;
        height: 20px;
      }

      .i1 {
        background: rgb(255, 0, 0);
      }
      .i2 {
        background: rgb(0, 255, 0);
      }
      .i3 {
        background: rgb(0, 0, 255);
      }
      .i4 {
        background: rgb(255, 255, 0);
      }
      .i5 {
        background: rgb(255, 0, 255);
      }
      .i6 {
        background: rgb(0, 255, 255);
      }
    </style>
  </head>
  <body>
    <div id="multicol">
      <div class="item i1"></div>
      <div class="item i2"></div>
      <div class="item i3"></div>
      <div class="item i4"></div>
      <div class="item i5"></div>
      <div class="item i6"></div>
    </div>
  </body>
</html>
