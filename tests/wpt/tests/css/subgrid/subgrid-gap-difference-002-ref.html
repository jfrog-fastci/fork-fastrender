<!doctype html>
<meta charset="utf-8">
<title>subgrid row gap difference reference</title>
<style>
  body {
    margin: 0;
  }

  .container {
    display: grid;
    grid-template-rows: 40px 1fr;
    row-gap: 20px;
    width: 30px;
    height: 120px;
    background: #ff0000;
    margin-bottom: 10px;
  }

  .subgrid {
    grid-row: 1 / 3;
    display: grid;
    width: 30px;
    height: 120px;
  }

  .gap0 {
    grid-template-rows: 50px 70px;
    row-gap: 0px;
  }

  .gap10 {
    grid-template-rows: 45px 65px;
    row-gap: 10px;
  }

  .item {
    width: 100%;
  }

  .a {
    grid-row: 1;
    background: #00ff00;
  }

  .b {
    grid-row: 2;
    background: #0000ff;
  }
</style>

<div class="container">
  <div class="subgrid gap0">
    <div class="item a"></div>
    <div class="item b"></div>
  </div>
</div>

<div class="container">
  <div class="subgrid gap10">
    <div class="item a"></div>
    <div class="item b"></div>
  </div>
</div>
