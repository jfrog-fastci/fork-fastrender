<!doctype html>
<meta charset="utf-8">
<title>subgrid gap difference reference</title>
<style>
  body {
    margin: 0;
  }

  .container {
    display: grid;
    grid-template-columns: 100px 1fr;
    column-gap: 40px;
    width: 300px;
    height: 30px;
    background: #ff0000;
    margin-bottom: 10px;
  }

  .subgrid {
    grid-column: 1 / 3;
    display: grid;
    height: 30px;
  }

  .gap0 {
    grid-template-columns: 120px 180px;
    column-gap: 0px;
  }

  .gap20 {
    grid-template-columns: 110px 170px;
    column-gap: 20px;
  }

  .item {
    height: 100%;
  }

  .a {
    grid-column: 1;
    background: #00ff00;
  }

  .b {
    grid-column: 2;
    background: #0000ff;
  }
</style>

<div class="container">
  <div class="subgrid gap0">
    <div class="item a"></div>
    <div class="item b"></div>
  </div>
</div>

<div class="container">
  <div class="subgrid gap20">
    <div class="item a"></div>
    <div class="item b"></div>
  </div>
</div>
