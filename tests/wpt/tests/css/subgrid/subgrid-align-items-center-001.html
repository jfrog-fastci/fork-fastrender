<!doctype html>
<meta charset="utf-8">
<title>Subgrid align-items/justify-items center</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .container {
    display: grid;
    grid-template-columns: 40px 40px;
    grid-template-rows: 40px;
    width: max-content;
    box-shadow: 0 0 0 2px #000;
  }
  .subgrid {
    grid-column: 1 / 3;
    grid-row: 1;
    display: grid;
    grid-template-columns: subgrid;
    grid-template-rows: subgrid;
    align-items: center;
    justify-items: center;
  }
  .a {
    width: 10px;
    height: 10px;
    background: #ef4444;
  }
  .b {
    width: 10px;
    height: 10px;
    background: #22c55e;
  }
</style>
<div class="container"><div class="subgrid"><div class="a"></div><div class="b"></div></div></div>
