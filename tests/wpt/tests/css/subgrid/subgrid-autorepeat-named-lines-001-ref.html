<!doctype html>
<meta charset="utf-8">
<title>subgrid auto-repeat named lines reference</title>
<style>
.container {
  display: grid;
  width: 80px;
  height: 20px;
  grid-template-columns: 20px 20px 20px 20px;
  grid-template-rows: 20px;
  background: #f1f5f9;
}
.subgrid {
  grid-column: 1 / 4;
  grid-row: 1 / 2;
  display: grid;
  grid-template-columns: 20px 20px 20px;
  grid-template-rows: 20px;
}
.a { grid-column: 2 / 3; background: #60a5fa; }
.b { grid-column: 3 / 4; background: #22c55e; }
.box { width: 100%; height: 20px; }
</style>
<div class="container">
  <div class="subgrid">
    <div class="box a"></div>
    <div class="box b"></div>
  </div>
</div>
