<!doctype html>
<meta charset="utf-8">
<title>Subgrid contents contribute to parent auto track sizing reference</title>
<style>
  body {
    margin: 0;
    background: #fff;
  }
  .container {
    display: grid;
    grid-template-columns: 80px 20px;
    grid-template-rows: 20px;
    width: max-content;
    box-shadow: 0 0 0 2px #000;
  }
  .subgrid {
    grid-column: 1 / 3;
    grid-row: 1;
    display: grid;
    grid-template-columns: 80px 20px;
    grid-template-rows: 20px;
  }
  .a {
    width: 80px;
    height: 20px;
    background: #ef4444;
  }
  .b {
    width: 20px;
    height: 20px;
    background: #22c55e;
  }
</style>
<div class="container"><div class="subgrid"><div class="a"></div><div class="b"></div></div></div>
