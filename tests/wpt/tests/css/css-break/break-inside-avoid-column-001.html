<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>css-break: break-inside: avoid keeps a block together across columns</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: white;
      }

      #columns {
        width: 100px;
        height: 50px;
        column-count: 2;
        column-gap: 0;
      }

      #pre {
        height: 20px;
        background: rgb(255, 0, 0);
      }

      #avoid {
        break-inside: avoid;
      }

      #avoid > div {
        height: 20px;
      }

      .blue {
        background: rgb(0, 0, 255);
      }

      .green {
        background: rgb(0, 255, 0);
      }
    </style>
  </head>
  <body>
    <div id="columns">
      <div id="pre"></div>
      <div id="avoid">
        <div class="blue"></div>
        <div class="green"></div>
      </div>
    </div>
  </body>
</html>
