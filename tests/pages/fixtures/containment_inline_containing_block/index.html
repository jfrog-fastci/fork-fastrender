<!doctype html>
<meta charset="utf-8">
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
  }

  .header {
    height: 26px;
    background: #222;
  }

  .offset {
    margin: 40px;
    padding: 18px;
    background: #f0f0f0;
    border: 3px solid #888;
    /* Avoid whitespace text nodes affecting layout/line metrics. */
    font-size: 0;
    line-height: 0;
  }

  /* This must stay `display:inline` (not inline-block) to exercise InlineFormattingContext. */
  .inline-cb {
    contain: paint;
    padding: 14px;
    border: 4px solid #0055aa;
    background: #cfe8ff;
    vertical-align: top;
  }

  .abs {
    position: absolute;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    background: #ff0000;
  }

  .fixed {
    position: fixed;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    background: #00cc00;
    /* Offset the fixed square so the absolute + fixed cases are both visible. */
    transform: translateX(24px);
  }
</style>

<div class="header"></div>
<div class="offset">
  <span class="inline-cb"><span class="abs"></span><span class="fixed"></span></span>
</div>
