<!DOCTYPE html>
<meta charset="utf-8" />
<title>overflow_axis_interaction</title>
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
  }

  .case {
    position: absolute;
    width: 480px;
    height: 190px;
    border: 1px solid #d6d9df;
    box-sizing: border-box;
    background: #ffffff;
  }

  .demo {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 180px;
    height: 120px;
    background: rgb(235, 240, 252);
    border: 2px solid rgb(92, 138, 240);
    box-sizing: content-box;
  }

  .demo-inner {
    position: relative;
    width: 180px;
    height: 120px;
  }

  .demo-inner .x {
    position: absolute;
    left: 10px;
    top: 10px;
    width: 260px;
    height: 18px;
    background: rgb(239, 68, 68);
  }

  .demo-inner .y {
    position: absolute;
    left: 10px;
    top: 34px;
    width: 18px;
    height: 210px;
    background: rgb(34, 197, 94);
  }

  .demo-inner .both {
    position: absolute;
    left: 74px;
    top: 58px;
    width: 200px;
    height: 140px;
    background: rgb(59, 130, 246);
  }

  .c0 {
    left: 20px;
  }
  .c1 {
    left: 540px;
  }
  .r0 {
    top: 20px;
  }
  .r1 {
    top: 230px;
  }
  .r2 {
    top: 440px;
  }
  .r3 {
    top: 650px;
  }

  /* Overflow combinations under test */
  .ov-visible {
    overflow: visible;
  }
  .ov-hidden {
    overflow: hidden;
  }
  .ox-visible-oy-hidden {
    overflow-x: visible;
    overflow-y: hidden;
  }
  .ox-visible-oy-scroll {
    overflow-x: visible;
    overflow-y: scroll;
  }
  .ox-visible-oy-auto {
    overflow-x: visible;
    overflow-y: auto;
  }
  .ox-visible-oy-clip {
    overflow-x: visible;
    overflow-y: clip;
  }
  .ox-clip-oy-visible {
    overflow-x: clip;
    overflow-y: visible;
  }
  .ox-hidden-oy-visible {
    overflow-x: hidden;
    overflow-y: visible;
  }
</style>

<div class="case c0 r0" data-case="overflow: visible (control)">
  <div class="demo ov-visible">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c1 r0" data-case="overflow: hidden (control)">
  <div class="demo ov-hidden">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c0 r1" data-case="overflow-x: visible; overflow-y: hidden">
  <div class="demo ox-visible-oy-hidden">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c1 r1" data-case="overflow-x: visible; overflow-y: scroll">
  <div class="demo ox-visible-oy-scroll">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c0 r2" data-case="overflow-x: visible; overflow-y: auto">
  <div class="demo ox-visible-oy-auto">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c1 r2" data-case="overflow-x: visible; overflow-y: clip">
  <div class="demo ox-visible-oy-clip">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c0 r3" data-case="overflow-x: clip; overflow-y: visible">
  <div class="demo ox-clip-oy-visible">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>

<div class="case c1 r3" data-case="overflow-x: hidden; overflow-y: visible">
  <div class="demo ox-hidden-oy-visible">
    <div class="demo-inner">
      <div class="x"></div>
      <div class="y"></div>
      <div class="both"></div>
    </div>
  </div>
</div>
