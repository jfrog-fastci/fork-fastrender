<!doctype html>
<meta charset="utf-8" />
<title>filter_affine_clip_invert</title>
<style>
  html,
  body {
    margin: 0;
    padding: 0;
  }
  #bg {
    position: absolute;
    inset: 0;
    background: rgb(255 0 0);
  }
  #overlay {
    position: absolute;
    left: 20px;
    top: 20px;
    width: 40px;
    height: 40px;
    border-radius: 14px;
    filter: invert(1);
    transform: rotate(45deg);
  }
  #fill {
    position: absolute;
    inset: 0;
    background: rgb(0 0 0);
  }
</style>
<div id="bg"></div>
<div id="overlay"><div id="fill"></div></div>
