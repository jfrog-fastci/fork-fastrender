<!doctype html>
<meta charset="utf-8" />
<title>visibility_hidden_override</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  /* A baseline rectangle to ensure the hidden subtree isn't being skipped by accident. */
  #underlay {
    position: absolute;
    left: 80px;
    top: 40px;
    width: 120px;
    height: 80px;
    background: rgb(255, 230, 0);
  }

  /* Hidden ancestor that still applies effects to visible descendants. */
  #hidden-parent {
    position: absolute;
    left: 60px;
    top: 40px;
    width: 120px;
    height: 80px;

    visibility: hidden;
    opacity: 0.5;
    transform: translate(20px, 0);

    overflow: hidden;
    border-radius: 16px;

    /* Should not paint (visibility:hidden). */
    background: rgb(255, 0, 0);
  }

  /* Explicitly re-enable painting for the descendant. */
  #visible-child {
    visibility: visible;
    width: 160px;
    height: 120px;
    margin: -20px 0 0 -20px;
    background: rgb(0, 120, 255);
  }

  /* Sibling outside the hidden subtree (ordering sanity). */
  #sibling {
    position: absolute;
    left: 20px;
    top: 40px;
    width: 40px;
    height: 40px;
    background: rgb(0, 0, 0);
  }
</style>

<div id="underlay"></div>
<div id="hidden-parent"><div id="visible-child"></div></div>
<div id="sibling"></div>
