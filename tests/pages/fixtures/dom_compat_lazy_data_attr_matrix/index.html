<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: rgb(0, 255, 0);
      }

      body {
        display: flex;
        flex-direction: column;
      }

      img {
        display: block;
        width: 64px;
        height: 32px;
      }
    </style>
  </head>
  <body>
    <!--
      Use a transparent 1x1 GIF placeholder so a static/no-JS render only shows the green
      background unless dom compatibility mode lifts `data-*` attributes into `src`.
    -->
    <img
      id="default-src"
      width="64"
      height="32"
      src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
      data-default-src="red.svg"
      alt=""
    />

    <!-- `data-src` should remain higher priority than `data-default-src`. -->
    <img
      id="data-src-priority"
      width="64"
      height="32"
      src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
      data-src="blue.svg"
      data-default-src="red.svg"
      alt=""
    />

    <!-- A non-placeholder authored `src` must not be overwritten. -->
    <img
      id="authored-src"
      width="64"
      height="32"
      src="blue.svg"
      data-default-src="red.svg"
      alt=""
    />
  </body>
</html>
