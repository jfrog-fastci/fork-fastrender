<!doctype html>
<!--
  layout_float_stress

  Purpose:
    Exercise float placement + line layout float avoidance hotspots (notably float context scanning in
    `FloatContext::compute_float_position` / `available_width_in_range`) by creating many overlapping
    floats of mixed sides + varying heights, followed by inline content that forces repeated range
    queries.

  Offline invariants:
    - Inline CSS only (no external stylesheets, images, or network requests).
    - No script execution required.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Layout float stress</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      /* Small deterministic probe used by tests to ensure float avoidance is working. */
      #probe {
        width: 100px;
        overflow: hidden; /* establish BFC so floats don't affect the main stress area */
      }
      #probe .float {
        float: left;
        width: 60px;
        height: 20px;
      }
      #probe .para {
        font-size: 0;
        line-height: 10px;
      }
      #probe .piece {
        display: inline-block;
        width: 30px;
        height: 10px;
        vertical-align: top;
      }

      /* Stress area */
      #stress {
        width: 320px;
        padding: 4px;
      }

      #floats .f {
        /* Baseline size; overridden by nth-child rules below. */
        width: 140px;
        height: 30px;
      }
      #floats .f:nth-child(odd) {
        float: left;
      }
      #floats .f:nth-child(even) {
        float: right;
      }

      /* Wide floats that often require multiple scan steps to place. */
      #floats .f:nth-child(10n) {
        width: 220px;
      }

      /* Height variation creates many overlapping vertical spans/boundaries. */
      #floats .f:nth-child(7n) {
        height: 90px;
      }
      #floats .f:nth-child(11n) {
        height: 60px;
      }
      #floats .f:nth-child(13n) {
        height: 120px;
      }

      #stress .para {
        font-size: 0;
        line-height: 10px;
      }
      #stress .piece {
        display: inline-block;
        width: 30px;
        height: 10px;
        vertical-align: top;
      }
    </style>
  </head>

      <div class="para"

      ></div>
