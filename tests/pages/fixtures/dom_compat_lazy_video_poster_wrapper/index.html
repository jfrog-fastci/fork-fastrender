<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: rgb(0, 255, 0);
      }

      video {
        display: block;
        width: 64px;
        height: 32px;
      }
    </style>
  </head>
  <body>
    <!--
      Some sites (e.g. Webflow background videos) store the real poster on an ancestor element and
      rely on JS to copy it into the descendant <video poster>. Dom compatibility mode mimics that
      bootstrap step.
    -->
    <div data-video-urls="movie.webm, movie.mp4" data-poster-url="red.svg">
      <video id="video"></video>
    </div>
  </body>
</html>
