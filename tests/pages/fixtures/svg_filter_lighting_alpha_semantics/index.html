<!doctype html>
<style>
  body {
    margin: 0;
    background: #404040;
    font: 12px/1 system-ui, sans-serif;
  }

  .box {
    position: absolute;
    width: 48px;
    height: 48px;
    background: #000;
  }

  /* Fully transparent source pixels (alpha=0 everywhere). */
  .transparent {
    background: rgba(0, 0, 0, 0);
  }

  .box.row1 {
    top: 12px;
  }

  .box.row2 {
    top: 72px;
  }

  .box.col2 {
    left: 72px;
  }

  .box.col1 {
    left: 12px;
  }

  svg {
    position: absolute;
    width: 0;
    height: 0;
  }
</style>

<svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="diffuse" color-interpolation-filters="sRGB">
      <feDiffuseLighting
        in="SourceAlpha"
        surfaceScale="0"
        diffuseConstant="0.5"
        lighting-color="white"
      >
        <feDistantLight azimuth="0" elevation="90" />
      </feDiffuseLighting>
    </filter>

    <filter id="specular" color-interpolation-filters="sRGB">
      <feSpecularLighting
        in="SourceAlpha"
        surfaceScale="0"
        specularConstant="0.5"
        specularExponent="1"
        lighting-color="white"
      >
        <feDistantLight azimuth="0" elevation="90" />
      </feSpecularLighting>
    </filter>
  </defs>
</svg>

<div class="box row1 col1" style="filter: url(#diffuse)"></div>
<div class="box row1 col2 transparent" style="filter: url(#diffuse)"></div>
<div class="box row2 col1" style="filter: url(#specular)"></div>
<div class="box row2 col2 transparent" style="filter: url(#specular)"></div>
