<!doctype html>
<meta charset="utf-8" />
<title>animation_time_settled_forwards</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  #box {
    position: absolute;
    left: 60px;
    top: 60px;
    width: 80px;
    height: 80px;
    background: rgb(200, 0, 0);

    /* Underlying style: invisible unless a final/filled animation is applied. */
    opacity: 0;

    /* Use the full shorthand expansion to avoid ambiguity in minimal parsers. */
    animation: fade 1000ms linear 0ms 1 normal forwards;
  }

  @keyframes fade {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
</style>

<div id="box"></div>
