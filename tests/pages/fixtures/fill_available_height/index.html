<!doctype html>
<meta charset="utf-8" />
<style>
  body {
    margin: 0;
    background: #ffffff;
  }

  .container {
    position: relative;
    margin: 40px;
    width: 240px;
    border: 4px solid #000;
  }

  .container::before {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: -webkit-fill-available;
    background: rgb(0, 128, 255);
  }

  .inner {
    height: 160px;
    background: #fff;
  }
</style>

<div class="container">
  <div class="inner"></div>
</div>
