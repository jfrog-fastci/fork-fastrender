<!doctype html>
<meta charset="utf-8">
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
  }

  .container {
    content-visibility: auto;
    margin: 80px 0 0 80px;
    width: 120px;
    height: 120px;
    background: #e6e6e6;
  }

  .abs {
    position: absolute;
    top: 0;
    left: 0;
    width: 40px;
    height: 40px;
    background: #ff0000;
  }

  .fixed {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    background: #00cc00;
  }
</style>

<div class="container">
  <div class="abs"></div>
  <div class="fixed"></div>
</div>
