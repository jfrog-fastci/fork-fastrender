<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form controls placeholder</title>
    <link rel="stylesheet" href="../assets/styles/base.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card placeholder-grid">
      <h1>Placeholder pseudo-elements</h1>
      <p class="muted">Validate ::placeholder and common vendor spellings.</p>

      <label for="a">Standard ::placeholder</label>
      <input id="a" class="a" placeholder="Standard placeholder" />

      <label for="b">::-webkit-input-placeholder</label>
      <input id="b" class="b" placeholder="WebKit placeholder" />

      <label for="c">::-moz-placeholder</label>
      <input id="c" class="c" placeholder="Mozilla placeholder" />

      <label for="d">::-ms-input-placeholder</label>
      <textarea id="d" class="d" placeholder="MS placeholder"></textarea>
    </div>
  </body>
</html>
