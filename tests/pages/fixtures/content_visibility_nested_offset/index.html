<!doctype html>
<meta charset="utf-8">
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
  }

  .header {
    height: 24px;
    background: #222;
  }

  /* Wrapper is pushed below the viewport, so descendants are offscreen in global coordinates. */
  .outer {
    margin-top: 300px;
  }

  /* content-visibility:auto should skip descendants when the border box is offscreen globally. */
  #auto-box {
    content-visibility: auto;
    height: 80px;
    box-shadow: 0 -300px 0 0 rgba(0, 0, 0, 0);
  }
  #auto-box .inner {
    height: 60px;
    background: #ff0000;
    position: relative;
    top: -280px;
    z-index: 0;
  }
</style>

<div class="header"></div>
<div class="outer">
  <div id="auto-box"><div class="inner"></div></div>
</div>
