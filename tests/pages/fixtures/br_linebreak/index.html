<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>&lt;br&gt; line break</title>
    <link rel="stylesheet" href="../assets/styles/base.css" />
    <style>
      body {
        padding: 0;
        background: #ffffff;
      }

      .case {
        width: 420px;
        margin: 24px;
        padding: 16px;
        border: 4px solid #0f172a;
        background: #f3f4f6;
        font-size: 26px;
        line-height: 1.2;
      }

      .label {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #334155;
      }

      .line-a {
        background: rgba(37, 99, 235, 0.12);
      }

      .line-b {
        background: rgba(217, 70, 239, 0.12);
      }

      .nowrap {
        white-space: nowrap;
      }

      .nowrap .label {
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div class="case">
      <div class="label">default whitespace</div>
      <span class="line-a">hello</span><br />
      <span class="line-b">world</span><br />
      <br />
      <span class="line-a">after blank</span><br />
      <span class="line-b">end</span>
    </div>

    <div class="case nowrap">
      <div class="label">white-space: nowrap (should still break)</div>
      <span class="line-a">nowrap hello</span><br />
      <span class="line-b">nowrap world</span>
    </div>
  </body>
</html>
