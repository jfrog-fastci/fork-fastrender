<!doctype html>
<meta charset="utf-8">
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: system-ui, sans-serif;
  }

  .section {
    margin: 16px;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  .box {
    width: 160px;
    height: 80px;
    border: 4px solid #000;
    box-sizing: border-box;
  }

  .box.visible {
    background: #00cc66;
  }

  .box.hidden {
    background: #ff3333;
  }

  .after-subtree {
    height: 24px;
    background: #222;
  }

  table {
    border-collapse: collapse;
    margin-top: 16px;
    width: 360px;
    font-size: 18px;
  }

  td {
    border: 2px solid #000;
    padding: 6px 8px;
  }

  tr.good td {
    background: #e7e7e7;
  }

  tr.bad td {
    background: #ff00ff;
  }

  ul {
    margin-top: 16px;
    font-size: 18px;
  }

  li.good {
    background: #d5f0ff;
  }

  li.bad {
    background: #ffb347;
  }
</style>

<!-- Hidden siblings should not take up space. -->
<div class="section">
  <div class="row">
    <div class="box hidden" hidden></div>
    <div class="box visible"></div>
  </div>
</div>

<!-- Hidden ancestors should suppress their entire subtree. -->
<div class="section">
  <div hidden>
    <div class="box hidden"></div>
    <div class="after-subtree"></div>
  </div>
  <div class="after-subtree"></div>
</div>

<!-- The `hidden` attribute should apply broadly (table rows, list items, etc). -->
<div class="section">
  <table>
    <tr class="good">
      <td>row 1</td>
      <td>visible</td>
    </tr>
    <tr class="bad" hidden>
      <td>row 2</td>
      <td>hidden</td>
    </tr>
    <tr class="good">
      <td>row 3</td>
      <td>visible</td>
    </tr>
  </table>

  <ul>
    <li class="good">item 1 (visible)</li>
    <li class="bad" hidden>item 2 (hidden)</li>
    <li class="good">item 3 (visible)</li>
  </ul>
</div>
