# Expectations for the curated test262 *semantic* suite.
#
# This manifest is how FastRender tracks known JavaScript conformance gaps without hiding
# regressions. Keep entries as narrow as possible (prefer exact `id` matches, then `glob`, then
# `regex`).
#
# Example:
#
# [[expectations]]
# id = "language/expressions/addition/S11.6.1_A2.1_T1.js"
# status = "xfail"
# reason = "known VM bug"
# tracking_issue = "https://github.com/…"

# Until `vm-js` grows broader ECMAScript coverage, most of the curated test262 suite is expected to
# fail. Mark the whole curated expression subset as `xfail` so `xtask js test262 --fail-on new`
# stays usable as a wiring + regression check.
#
# We then explicitly list the tests that currently pass so regressions in those tests are still
# treated as unexpected failures.

[[expectations]]
glob = "language/expressions/**"
status = "xfail"
reason = "vm-js: ECMAScript semantics are still incomplete; tracked via curated test262 progress."

