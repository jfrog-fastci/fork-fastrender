# Expectations manifest for the test262 *parser* harness.
#
# This file is consumed by `bash scripts/cargo_agent.sh xtask js test262-parser` (a wrapper over the
# ecma-rs `test262` parser runner).
#
# Format (TOML):
#
# [[expectations]]
# id = "pass/some_case.js"
# status = "xfail" # pass | skip | xfail | flaky
# reason = "known parse recovery gap"
# tracking_issue = "https://github.com/…"
#
# Matchers:
# - `id` (exact), `glob`, or `regex` (exact > glob > regex; first match wins).

[[expectations]]
glob = "early/**"
status = "xfail"
reason = "parse-js (Dialect::Ecma) does not yet implement all test262 early error validations."

[[expectations]]
id = "fail/98204d734f8c72b3.js"
status = "xfail"
reason = "Corpus is pinned before class fields; modern ECMAScript allows `class { a }`."

[[expectations]]
id = "fail/ef81b93cf9bdb4ec.js"
status = "xfail"
reason = "Corpus is pinned before class fields; modern ECMAScript allows `class { a = 0 }`."
