# Curated suite: core statement semantics (control flow + declarations).
#
# Intent:
# - Expand coverage beyond expression operators while staying deterministic/CI-friendly.
# - Focus on "script" semantics. Modules are supported by vm-js, but excluded from this suite to
#   keep it focused and CI-friendly. Use `xtask js test262 --suite modules_smoke` to run module
#   tests.
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  # Blocks / basic control flow
  "language/statements/block/**/*.js",
  "language/statements/break/**/*.js",
  "language/statements/continue/**/*.js",
  "language/statements/debugger/**/*.js",
  "language/statements/do-while/**/*.js",
  "language/statements/empty/**/*.js",
  "language/statements/expression/**/*.js",
  "language/statements/for/**/*.js",
  "language/statements/for-in/**/*.js",
  # Keep `for-of` limited for now; the full directory is large and tends to pull in many
  # iteration/destructuring edge cases.
  "language/statements/for-of/*.js",
  # Targeted `for await...of` coverage (async iterator protocol). The full directory is large.
  "language/statements/for-await-of/async-from-sync-iterator-continuation-abrupt-completion-get-constructor.js",
  "language/statements/for-await-of/async-func-dstr-const-ary-init-iter-close.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-is-null.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-non-callable.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-abrupt.js",
  "language/statements/for-await-of/iterator-close-throw-get-method-non-callable.js",
  "language/statements/for-await-of/iterator-close-throw-get-method-abrupt.js",
  "language/statements/if/**/*.js",
  "language/statements/labeled/**/*.js",
  "language/statements/return/**/*.js",
  "language/statements/switch/**/*.js",
  "language/statements/throw/**/*.js",
  "language/statements/try/**/*.js",
  "language/statements/while/**/*.js",
  "language/statements/with/**/*.js",
  # Declarations / bindings
  "language/statements/const/**/*.js",
  "language/statements/let/**/*.js",
  "language/statements/variable/**/*.js",
]

exclude = [
  # Modules are supported by vm-js, but this suite intentionally excludes module tests to keep it
  # focused on script semantics. Use `xtask js test262 --suite modules_smoke` to run module tests.
  "language/import/**",
  "language/export/**",
  "language/module-code/**",

  # Some statement tests are explicitly module-only (flagged `module` in frontmatter) even though
  # they live under `language/statements/**`. Keep them excluded here; run the module suite
  # instead.
  "language/statements/labeled/value-await-module*.js",
  "language/statements/for-of/head-await-using-bound-names-in-stmt.js",
  "language/statements/for-of/head-await-using-fresh-binding-per-iteration.js",
]
