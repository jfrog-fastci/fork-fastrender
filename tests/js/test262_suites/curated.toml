  "language/statements/async-function/**/*.js",
  "language/statements/async-generator/**/*.js",
  "language/statements/class/definition/**/*.js",
  "language/statements/class/method/**/*.js",
  "language/statements/class/method-static/**/*.js",
  "language/statements/class/subclass/**/*.js",
  "language/statements/class/super/**/*.js",
  "language/statements/class/syntax/**/*.js",
  "language/statements/class/strict-mode/**/*.js",
  "language/statements/class/name-binding/**/*.js",
  "language/statements/class/arguments/**/*.js",
  "language/statements/class/accessor-name-inst/**/*.js",
  "language/statements/class/accessor-name-static/**/*.js",

  # --- Language: scope/directive prologue ---
  "language/block-scope/**/*.js",
  "language/function-code/**/*.js",
  "language/directive-prologue/**/*.js",

  # --- Built-ins ---
  "built-ins/Object/assign/**/*.js",
  "built-ins/Object/is/**/*.js",
