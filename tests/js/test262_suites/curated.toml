# Default curated suite used by `bash scripts/cargo_agent.sh xtask js test262`.
#
# This is intentionally *not* the full tc39/test262 corpus. The goal is a deterministic,
# CI-friendly subset that still provides meaningful language semantics coverage.
#
# This suite is the union of the thematic suites in this directory:
# - `language_statements.toml`
# - `language_functions.toml`
# - `language_classes.toml`
# - `builtins_core.toml`
# - `builtins_json_math.toml`
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "language/expressions/addition/**/*.js",
  "language/expressions/array/**/*.js",
  "language/expressions/bitwise-and/**/*.js",
  "language/expressions/bitwise-not/**/*.js",
  "language/expressions/bitwise-or/**/*.js",
  "language/expressions/bitwise-xor/**/*.js",
  "language/expressions/comma/**/*.js",
  "language/expressions/concatenation/**/*.js",
  "language/expressions/division/**/*.js",
  "language/expressions/does-not-equals/**/*.js",
  "language/expressions/equals/**/*.js",
  "language/expressions/greater-than/**/*.js",
  "language/expressions/greater-than-or-equal/**/*.js",
  "language/expressions/grouping/**/*.js",
  "language/expressions/instanceof/**/*.js",
  "language/expressions/left-shift/**/*.js",
  "language/expressions/less-than/**/*.js",
  "language/expressions/less-than-or-equal/**/*.js",
  "language/expressions/logical-and/**/*.js",
  "language/expressions/logical-not/**/*.js",
  "language/expressions/logical-or/**/*.js",
  "language/expressions/member-expression/**/*.js",
  "language/expressions/modulus/**/*.js",
  "language/expressions/multiplication/**/*.js",
  "language/expressions/new/**/*.js",
  "language/expressions/relational/**/*.js",
  "language/expressions/right-shift/**/*.js",
  "language/expressions/strict-does-not-equals/**/*.js",
  "language/expressions/strict-equals/**/*.js",
  "language/expressions/subtraction/**/*.js",
  "language/expressions/super/**/*.js",
  "language/expressions/tagged-template/**/*.js",
  "language/expressions/typeof/**/*.js",
  "language/expressions/unary-minus/**/*.js",
  "language/expressions/unary-plus/**/*.js",
  "language/expressions/unsigned-right-shift/**/*.js",
  "language/expressions/void/**/*.js",

  # --- Language: statements, functions, classes ---
  "language/statements/block/**/*.js",
  "language/statements/break/**/*.js",
  "language/statements/continue/**/*.js",
  "language/statements/debugger/**/*.js",
  "language/statements/do-while/**/*.js",
  "language/statements/empty/**/*.js",
  "language/statements/expression/**/*.js",
  "language/statements/for/**/*.js",
  "language/statements/for-in/**/*.js",
  "language/statements/for-of/*.js",
  "language/statements/if/**/*.js",
  "language/statements/labeled/**/*.js",
  "language/statements/return/**/*.js",
  "language/statements/switch/**/*.js",
  "language/statements/throw/**/*.js",
  "language/statements/try/**/*.js",
  "language/statements/while/**/*.js",
  "language/statements/with/**/*.js",
  "language/statements/const/**/*.js",
  "language/statements/let/**/*.js",
  "language/statements/variable/**/*.js",
  "language/statements/function/**/*.js",
  "language/statements/generators/**/*.js",
  "language/statements/async-function/**/*.js",
  "language/statements/async-generator/**/*.js",
  "language/statements/class/definition/**/*.js",
  "language/statements/class/method/**/*.js",
  "language/statements/class/method-static/**/*.js",
  "language/statements/class/subclass/**/*.js",
  "language/statements/class/super/**/*.js",
  "language/statements/class/syntax/**/*.js",
  "language/statements/class/strict-mode/**/*.js",
  "language/statements/class/name-binding/**/*.js",
  "language/statements/class/arguments/**/*.js",
  "language/statements/class/accessor-name-inst/**/*.js",
  "language/statements/class/accessor-name-static/**/*.js",

  # --- Built-ins ---
  "built-ins/Object/assign/**/*.js",
  "built-ins/Object/is/**/*.js",
  "built-ins/Object/keys/**/*.js",
  "built-ins/Object/values/**/*.js",
  "built-ins/Object/entries/**/*.js",
  "built-ins/Object/fromEntries/**/*.js",
  "built-ins/Object/getPrototypeOf/**/*.js",
  "built-ins/Object/setPrototypeOf/**/*.js",
  "built-ins/Object/hasOwn/**/*.js",
  "built-ins/Object/prototype/toString/**/*.js",
  "built-ins/Object/prototype/valueOf/**/*.js",
  "built-ins/Object/prototype/hasOwnProperty/**/*.js",
  "built-ins/Object/prototype/isPrototypeOf/**/*.js",
  "built-ins/Object/prototype/propertyIsEnumerable/**/*.js",
  "built-ins/Array/from/**/*.js",
  "built-ins/Array/of/**/*.js",
  "built-ins/Array/isArray/**/*.js",
  "built-ins/Array/length/**/*.js",
  "built-ins/Array/prototype/push/**/*.js",
  "built-ins/Array/prototype/pop/**/*.js",
  "built-ins/Array/prototype/slice/**/*.js",
  "built-ins/Array/prototype/concat/**/*.js",
  "built-ins/Array/prototype/join/**/*.js",
  "built-ins/Array/prototype/indexOf/**/*.js",
  "built-ins/Array/prototype/includes/**/*.js",
  "built-ins/String/fromCharCode/**/*.js",
  "built-ins/String/fromCodePoint/**/*.js",
  "built-ins/String/raw/**/*.js",
  "built-ins/String/prototype/charAt/**/*.js",
  "built-ins/String/prototype/charCodeAt/**/*.js",
  "built-ins/String/prototype/concat/**/*.js",
  "built-ins/String/prototype/includes/**/*.js",
  "built-ins/String/prototype/indexOf/**/*.js",
  "built-ins/String/prototype/slice/**/*.js",
  "built-ins/String/prototype/substring/**/*.js",
  "built-ins/Number/isFinite/**/*.js",
  "built-ins/Number/isInteger/**/*.js",
  "built-ins/Number/isNaN/**/*.js",
  "built-ins/Number/isSafeInteger/**/*.js",
  "built-ins/Number/parseFloat/**/*.js",
  "built-ins/Number/parseInt/**/*.js",
  "built-ins/Number/prototype/toString/**/*.js",
  "built-ins/Number/prototype/valueOf/**/*.js",
  "built-ins/Number/MAX_VALUE/**/*.js",
  "built-ins/Number/MIN_VALUE/**/*.js",
  "built-ins/Number/POSITIVE_INFINITY/**/*.js",
  "built-ins/Number/NEGATIVE_INFINITY/**/*.js",
  "built-ins/Boolean/**/*.js",
  "built-ins/Symbol/**/*.js",
  "built-ins/JSON/**/*.js",
  "built-ins/Math/**/*.js",
]

exclude = [
  # No module support yet.
  "language/import/**",
  "language/export/**",
  "language/module-code/**",
]
