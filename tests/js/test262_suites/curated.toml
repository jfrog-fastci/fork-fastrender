  # Promise.* (targeted iterator-close / [[Done]] semantics)
  #
  # These cover spec-sensitive iterator consumption behaviors that test262 checks heavily:
  # - IteratorStep/IteratorValue failures must set `iteratorRecord.[[Done]] = true` so callers do
  #   *not* attempt IteratorClose.
  # - IteratorClose must suppress JS-visible errors when the incoming completion is a throw.
  #
  # Promise.all
  "built-ins/Promise/all/iter-step-err-no-close.js",
  "built-ins/Promise/all/iter-next-val-err-no-close.js",
  "built-ins/Promise/all/invoke-resolve-error-close.js",
  "built-ins/Promise/all/invoke-then-get-error-close.js",
  "built-ins/Promise/all/invoke-then-error-close.js",
  "built-ins/Promise/all/capability-resolve-throws-no-close.js",
  "built-ins/Promise/all/resolve-throws-iterator-return-null-or-undefined.js",
  "built-ins/Promise/all/resolve-throws-iterator-return-is-not-callable.js",
  # Promise.race
  "built-ins/Promise/race/iter-step-err-no-close.js",
  "built-ins/Promise/race/iter-next-val-err-no-close.js",
  "built-ins/Promise/race/invoke-resolve-error-close.js",
  "built-ins/Promise/race/invoke-then-get-error-close.js",
  "built-ins/Promise/race/invoke-then-error-close.js",
  "built-ins/Promise/race/resolve-throws-iterator-return-null-or-undefined.js",
  "built-ins/Promise/race/resolve-throws-iterator-return-is-not-callable.js",
  # Promise.allSettled
