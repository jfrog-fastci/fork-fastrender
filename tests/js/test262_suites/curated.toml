# Default curated suite used by `bash scripts/cargo_agent.sh xtask js test262`.
#
# This is intentionally *not* the full tc39/test262 corpus. The goal is a deterministic,
# CI-friendly subset that still provides meaningful language semantics coverage.
#
# This suite is the union of the thematic suites in this directory:
# - `language_statements.toml`
# - `language_functions.toml`
# - `language_classes.toml`
# - `language_scopes.toml`
# - `builtins_core.toml`
# - `builtins_json_math.toml`
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
