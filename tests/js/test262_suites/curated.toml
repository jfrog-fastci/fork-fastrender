# Default curated suite used by `bash scripts/cargo_agent.sh xtask js test262`.
#
# This is intentionally *not* the full tc39/test262 corpus. The goal is a deterministic,
# CI-friendly subset that still provides meaningful language semantics coverage.
#
# This suite is the union of the thematic suites in this directory:
# - `language_statements.toml`
# - `language_functions.toml`
# - `language_classes.toml`
# - `language_scopes.toml`
# - `builtins_core.toml`
# - `builtins_json_math.toml`
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "language/expressions/addition/**/*.js",
  "language/expressions/array/**/*.js",
  "language/expressions/bitwise-and/**/*.js",
  "language/expressions/bitwise-not/**/*.js",
  "language/expressions/bitwise-or/**/*.js",
  "language/expressions/bitwise-xor/**/*.js",
  "language/expressions/comma/**/*.js",
  "language/expressions/concatenation/**/*.js",
  "language/expressions/division/**/*.js",
  "language/expressions/does-not-equals/**/*.js",
  "language/expressions/equals/**/*.js",
  "language/expressions/greater-than/**/*.js",
  "language/expressions/greater-than-or-equal/**/*.js",
  "language/expressions/grouping/**/*.js",
  "language/expressions/instanceof/**/*.js",
  "language/expressions/left-shift/**/*.js",
  "language/expressions/less-than/**/*.js",
  "language/expressions/less-than-or-equal/**/*.js",
  "language/expressions/logical-and/**/*.js",
  "language/expressions/logical-not/**/*.js",
  "language/expressions/logical-or/**/*.js",
  "language/expressions/member-expression/**/*.js",
