  "language/expressions/multiplication/**/*.js",
  "language/expressions/new/**/*.js",
  "language/expressions/relational/**/*.js",
  "language/expressions/right-shift/**/*.js",
  "language/expressions/strict-does-not-equals/**/*.js",
  "language/expressions/strict-equals/**/*.js",
  "language/expressions/subtraction/**/*.js",
  "language/expressions/super/**/*.js",
  "language/expressions/tagged-template/**/*.js",
  "language/expressions/typeof/**/*.js",
  "language/expressions/unary-minus/**/*.js",
  "language/expressions/unary-plus/**/*.js",
  "language/expressions/unsigned-right-shift/**/*.js",
  "language/expressions/void/**/*.js",

  # --- Language: statements, functions, classes ---
  "language/statements/block/**/*.js",
  "language/statements/break/**/*.js",
  "language/statements/continue/**/*.js",
  "language/statements/debugger/**/*.js",
  "language/statements/do-while/**/*.js",
  "language/statements/empty/**/*.js",
  "language/statements/expression/**/*.js",
  "language/statements/for/**/*.js",
  "language/statements/for-in/**/*.js",
  "language/statements/for-of/*.js",
  # Targeted `for await...of` coverage (async iterator protocol). The full directory is large.
  "language/statements/for-await-of/async-from-sync-iterator-continuation-abrupt-completion-get-constructor.js",
  "language/statements/for-await-of/async-func-dstr-const-ary-init-iter-close.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-is-null.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-non-callable.js",
  "language/statements/for-await-of/iterator-close-non-throw-get-method-abrupt.js",
  "language/statements/for-await-of/iterator-close-throw-get-method-non-callable.js",
  "language/statements/for-await-of/iterator-close-throw-get-method-abrupt.js",
  "language/statements/if/**/*.js",
  "language/statements/labeled/**/*.js",
  "language/statements/return/**/*.js",
  "language/statements/switch/**/*.js",
  "language/statements/throw/**/*.js",
