# Curated suite: JSON + Math built-ins.
#
# These are deterministic, core built-ins and are useful for tracking baseline host-independent
# progress.
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "built-ins/JSON/**/*.js",
  "built-ins/Math/**/*.js",
]

exclude = [
  # Modules are supported by vm-js, but this suite intentionally excludes module tests for
  # consistency with other curated suites. Use `xtask js test262 --suite modules_smoke` to run
  # module tests.
  "language/import/**",
  "language/export/**",
  "language/module-code/**",
]
