# RegExp-focused test262 semantic suite.
#
# This suite is intentionally narrower than the default curated suite so RegExp engine progress is
# measurable without being drowned out by unrelated language gaps.
#
# Run it with the upstream-style harness:
#
# ```bash
# # from repo root
# timeout -k 10 600 bash scripts/cargo_agent.sh run -p test262-semantic --release -- \
#   --harness test262 \
#   --suite-path ../../tests/js/test262_suites/regexp.toml \
#   --manifest ../../tests/js/test262_manifest.toml \
#   --timeout-secs 10 \
#   --jobs 4 \
#   --report-path ../../target/js/test262_regexp.json \
#   --fail-on new
# ```
#
# NOTE: `scripts/cargo_agent.sh` runs the vendored `test262-semantic` workspace from
# `vendor/ecma-rs/`, so the `../../...` paths above are relative to that directory.
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  # --- Core RegExp surface ---
  "built-ins/RegExp/prototype/test/**/*.js",
  "built-ins/RegExp/prototype/exec/**/*.js",
  "built-ins/RegExp/prototype/source/**/*.js",
  "built-ins/RegExp/unicode_restricted_octal_escape.js",

  # --- Named capture groups (`(?<name>...)`, match result `.groups`) ---
  "built-ins/RegExp/named-groups/**/*.js",

  # --- Lookbehind assertions (`(?<=...)`, `(?<!...)`) ---
  "built-ins/RegExp/lookBehind/**/*.js",

  # --- Match indices (`/d` flag, match result `.indices`) ---
  "built-ins/RegExp/match-indices/**/*.js",

  # --- Unicode property escapes (`\\p{…}`) ---
  "built-ins/RegExp/property-escapes/**/*.js",
  # --- Character class escapes (`\\s`, `\\S`, etc) ---
  #
  # The generated negative corpus is extremely large and slow; keep only the positive coverage
  # here, and rely on vm-js unit tests for additional guardrails.
  "built-ins/RegExp/CharacterClassEscapes/character-class-whitespace-class-escape-positive-cases.js",

  # --- UnicodeMode (`/u`) disallow-extended-pattern restrictions (Annex B disabled) ---
  "built-ins/RegExp/unicode_restricted_*.js",
  "staging/sm/RegExp/unicode-disallow-extended.js",

  # --- String methods that exercise RegExp integration ---
  "built-ins/String/prototype/match/**/*.js",
  "built-ins/String/prototype/matchAll/**/*.js",

  # --- Annex B: Legacy octal escapes ---
  "annexB/language/literals/regexp/legacy-octal-escape.js",

  # --- Parse-time early errors for RegExp literals in UnicodeMode ---
  "language/literals/regexp/u-invalid-legacy-octal-escape.js",
]

exclude = [
  # `v` flag (Unicode sets) is extremely large and slow in test262 (generated corpus). Keep it in a
  # separate suite (`regexp_unicode_sets.toml`) until the engine is ready.
  "built-ins/RegExp/unicodeSets/**/*.js",

  # Generated Unicode property escape tests are large; keep the initial suite runtime manageable.
  # (See `regexp_property_escapes_generated.toml` for the full generated corpus.)
  "built-ins/RegExp/property-escapes/generated/**/*.js",
]
