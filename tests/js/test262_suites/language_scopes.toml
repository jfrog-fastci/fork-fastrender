# Curated suite: lexical scope + directive prologue semantics.
#
# Intent:
# - Cover core binding/execution semantics that live outside `language/statements/**`:
#   - `let`/`const`/TDZ behavior (`language/block-scope`)
#   - strict mode / directive prologue parsing (`language/directive-prologue`)
#   - function body parsing/execution edge cases (`language/function-code`)
# - Modules are supported by vm-js, but excluded from this suite to keep it focused on script
#   semantics. Use `xtask js test262 --suite modules_smoke` to run module tests.
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "language/block-scope/**/*.js",
  "language/function-code/**/*.js",
  "language/directive-prologue/**/*.js",
]

exclude = [
  # Modules are supported by vm-js, but excluded from this suite for consistency with other
  # curated suites. Use `xtask js test262 --suite modules_smoke` to run module tests.
  "language/import/**",
  "language/export/**",
  "language/module-code/**",
]
