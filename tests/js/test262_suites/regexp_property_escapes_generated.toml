# RegExp Unicode property escape (generated) focused test262 semantic suite.
#
# The generated property escape corpus is large; keep it isolated so the main RegExp suite
# (`regexp.toml`) stays fast while still allowing targeted progress tracking when working on
# `regexp-unicode-property-escapes`.
#
# Run it with the upstream-style harness:
#
# ```bash
# # from repo root
# timeout -k 10 600 bash scripts/cargo_agent.sh run -p test262-semantic --release -- \
#   --harness test262 \
#   --suite-path ../../tests/js/test262_suites/regexp_property_escapes_generated.toml \
#   --manifest ../../tests/js/test262_manifest.toml \
#   --timeout-secs 10 \
#   --jobs 4 \
#   --report-path ../../target/js/test262_regexp_property_escapes_generated.json \
#   --fail-on new
# ```
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
include = [
  "built-ins/RegExp/property-escapes/generated/**/*.js",
]

exclude = [
  # These generated tests currently time out under the default 10s per-test budget (and are not
  # useful signal until the underlying engine implementation is much faster). Keep them excluded so
  # the suite can complete deterministically; re-enable incrementally as performance improves.
  "built-ins/RegExp/property-escapes/generated/Alphabetic.js",
  "built-ins/RegExp/property-escapes/generated/Any.js",
  "built-ins/RegExp/property-escapes/generated/Assigned.js",
  "built-ins/RegExp/property-escapes/generated/General_Category_-_Letter.js",
  "built-ins/RegExp/property-escapes/generated/General_Category_-_Other.js",
  "built-ins/RegExp/property-escapes/generated/General_Category_-_Other_Letter.js",
  "built-ins/RegExp/property-escapes/generated/General_Category_-_Private_Use.js",
  "built-ins/RegExp/property-escapes/generated/General_Category_-_Unassigned.js",
  "built-ins/RegExp/property-escapes/generated/Grapheme_Base.js",
  "built-ins/RegExp/property-escapes/generated/ID_Continue.js",
  "built-ins/RegExp/property-escapes/generated/ID_Start.js",
  "built-ins/RegExp/property-escapes/generated/Ideographic.js",
  "built-ins/RegExp/property-escapes/generated/Script_-_Han.js",
  "built-ins/RegExp/property-escapes/generated/Script_-_Hangul.js",
  "built-ins/RegExp/property-escapes/generated/Script_-_Unknown.js",
  "built-ins/RegExp/property-escapes/generated/Script_Extensions_-_Han.js",
  "built-ins/RegExp/property-escapes/generated/Script_Extensions_-_Hangul.js",
  "built-ins/RegExp/property-escapes/generated/Script_Extensions_-_Tangut.js",
  "built-ins/RegExp/property-escapes/generated/Script_Extensions_-_Unknown.js",
  "built-ins/RegExp/property-escapes/generated/Unified_Ideograph.js",
  "built-ins/RegExp/property-escapes/generated/XID_Continue.js",
  "built-ins/RegExp/property-escapes/generated/XID_Start.js",
]
