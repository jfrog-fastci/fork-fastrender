# Curated suite: class semantics (basic declarations + inheritance).
#
# The full `language/statements/class` directory is very large and includes many advanced
# features (private fields/methods, decorators, etc). Start with the fundamentals, then expand
# once budgets and engine support are proven.
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
#
# This suite intentionally avoids globbing `language/statements/class/elements/**` (huge), but we
# do include a small hand-picked set of class-fields/private-names tests to prevent regressions.
tests = [
  # --- Public fields (instance + static) ---
  "language/statements/class/elements/field-declaration.js",
  "language/statements/class/elements/static-field-declaration.js",
  # Computed names + evaluation ordering across static/instance field lists.
  "language/statements/class/elements/intercalated-static-non-static-computed-fields.js",

  # --- Private names ---
  # Brand checks (accessing with the wrong receiver throws).
  "language/statements/class/elements/privatefieldget-typeerror-4.js",
  # Private method access + call (`this.#m()`).
  "language/statements/class/elements/private-methods/prod-private-method.js",
  # Private methods are added before field initializers run (fields can reference later private methods).
  "language/statements/class/elements/private-methods/prod-private-method-initialize-order.js",

  # --- `#x in obj` private-brand-check operator ---
  "language/expressions/in/private-field-presence-field.js",
  "language/expressions/in/private-field-presence-method.js",
  "language/expressions/in/private-field-presence-accessor.js",
  "language/expressions/in/private-field-rhs-non-object.js",

  # --- `static {}` blocks (ordering vs static fields) ---
  "language/statements/class/static-init-sequence.js",
]
include = [
  "language/statements/class/definition/**/*.js",
  "language/statements/class/method/**/*.js",
  "language/statements/class/method-static/**/*.js",
  "language/statements/class/subclass/**/*.js",
  "language/statements/class/super/**/*.js",
  "language/statements/class/syntax/**/*.js",
  "language/statements/class/strict-mode/**/*.js",
  "language/statements/class/name-binding/**/*.js",
  "language/statements/class/arguments/**/*.js",
  "language/statements/class/accessor-name-inst/**/*.js",
  "language/statements/class/accessor-name-static/**/*.js",
]

exclude = [
  # Modules are supported by vm-js, but this suite intentionally excludes module tests to keep it
  # focused on script semantics. Use `xtask js test262 --suite modules_smoke` to run module tests.
  "language/import/**",
  "language/export/**",
  "language/module-code/**",
]
