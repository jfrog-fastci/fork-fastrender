# Curated module-only suite intended for quick local checks.
#
# This suite intentionally stays small/fast while still exercising real module semantics:
# - static import/export
# - `import.meta`
# - top-level await
# - dynamic `import()`
# - JSON modules via import attributes
#
# Test IDs are paths relative to `test/` in the tc39/test262 checkout.
#
# Keep this suite small and deterministic (explicit list; no broad globs) so it remains
# CI-friendly and always exercises `Variant::Module` on vm-js.
tests = [
  # --- language/import ---
  "language/import/dup-bound-names.js",
  "language/import/escaped-as-import-specifier.js",
  "language/import/escaped-as-namespace-import.js",
  "language/import/escaped-from.js",
  # JSON modules via import attributes.
  "language/import/import-attributes/json-value-string.js",

  # --- language/export ---
  "language/export/escaped-as-export-specifier.js",
  "language/export/escaped-default.js",
  "language/export/escaped-from.js",

  # --- language/module-code ---
  "language/module-code/eval-this.js",
  "language/module-code/eval-export-fun-semi.js",
  "language/module-code/eval-export-cls-semi.js",
  "language/module-code/eval-export-gen-semi.js",
  "language/module-code/eval-gtbndng-local-bndng-var.js",
  "language/module-code/eval-gtbndng-local-bndng-let.js",
  "language/module-code/eval-gtbndng-local-bndng-const.js",
  "language/module-code/early-strict-mode.js",
  "language/module-code/early-export-unresolvable.js",

  # --- top-level await / dynamic import ---
  "language/module-code/top-level-await/await-expr-resolution.js",
  "language/module-code/top-level-await/dynamic-import-resolution.js",

  # --- import.meta ---
  "language/expressions/import.meta/same-object-returned.js",
]
