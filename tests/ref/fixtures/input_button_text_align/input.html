<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        margin: 0;
        background: white;
        padding: 16px;
        font-family: Arial, sans-serif;
      }

      .btn {
        appearance: none;
        width: 140px;
        height: 36px;
        padding: 0 12px;
        border: 1px solid #333;
        background: #e9e9e9;
        font-size: 16px;
      }

      .btn + .btn {
        margin-left: 16px;
      }

      .left {
        text-align: left;
      }

      .right {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <input class="btn left" type="button" value="Align">
    <input class="btn right" type="button" value="Align">
  </body>
</html>
