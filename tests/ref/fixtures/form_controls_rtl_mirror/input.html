<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .col {
      border: 1px solid #d0d0d0;
      padding: 16px;
      background: #fafafa;
    }

    .heading {
      font-weight: 700;
      margin-bottom: 14px;
      color: #333;
    }

    .control {
      display: block;
      width: 260px;
      height: 30px;
      margin: 0 auto 12px auto;
    }

    input[type="range"].control {
      margin-top: 6px;
    }

    select.listbox.control {
      height: 96px;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="col" dir="ltr">
      <div class="heading">LTR</div>
      <select class="control">
        <option selected>Dropdown</option>
        <option>Second</option>
      </select>
      <select class="control listbox" size="5">
        <optgroup label="Group">
          <option>Alpha</option>
          <option>Beta</option>
          <option>Gamma</option>
          <option>Delta</option>
          <option>Epsilon</option>
          <option>Zeta</option>
        </optgroup>
        <option selected>Standalone</option>
        <option>More</option>
        <option>Last</option>
      </select>
      <input class="control" type="number" value="12">
      <input class="control" type="date" value="2026-01-09">
      <input class="control" type="range" min="0" max="100" value="75">
      <input class="control" type="file">
    </div>

    <div class="col" dir="rtl">
      <div class="heading" dir="ltr">RTL</div>
      <select class="control">
        <option selected>Dropdown</option>
        <option>Second</option>
      </select>
      <select class="control listbox" size="5">
        <optgroup label="Group">
          <option>Alpha</option>
          <option>Beta</option>
          <option>Gamma</option>
          <option>Delta</option>
          <option>Epsilon</option>
          <option>Zeta</option>
        </optgroup>
        <option selected>Standalone</option>
        <option>More</option>
        <option>Last</option>
      </select>
      <input class="control" type="number" value="12">
      <input class="control" type="date" value="2026-01-09">
      <input class="control" type="range" min="0" max="100" value="75">
      <input class="control" type="file">
    </div>
  </div>
</body>
</html>
