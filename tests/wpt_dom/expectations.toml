# Expectations for the offline WPT DOM corpus under `tests/wpt_dom/tests`.
#
# This file uses the ecma-rs `conformance-harness` expectations format:
# - Each `[[expectations]]` entry matches `id` (exact), `glob`, or `regex`.
# - `status` can be: "pass" | "skip" | "xfail" | "flaky".
# - `reason` is recommended for anything other than `pass`.
# - `backend` (optional) limits an entry to a specific JS backend: "vmjs" | "quickjs".
#
# If this file is empty, all tests are treated as expected `pass`.

[[expectations]]
id = "smoke/sync-fail.html"
status = "xfail"
reason = "Intentional failing smoke test used to validate xfail/failure plumbing in the future runner."

[[expectations]]
id = "smoke/assert_fail.window.js"
status = "xfail"
reason = "Intentional failing .window.js smoke test used to validate WPT report payload plumbing."

[[expectations]]
id = "smoke/assert_throws_js.window.js"
status = "xfail"
reason = "Intentional failing smoke test (mismatched constructor) used to validate exception assertion reporting."

[[expectations]]
id = "smoke/assert_throws_dom.window.js"
status = "xfail"
reason = "Intentional failing smoke test (mismatched DOMException name) used to validate exception assertion reporting."

[[expectations]]
id = "smoke/uncaught-exception.html"
status = "xfail"
reason = "Intentional harness-level error used to validate uncaught exception classification."

[[expectations]]
id = "smoke/infinite_loop_timeout.window.js"
status = "xfail"
reason = "Intentional infinite loop; runner should terminate it deterministically as a timeout."

[[expectations]]
