[[expectations]]
id = "dom/queryselector_invalid_selector_domexception.window.js"
status = "xfail"
reason = "querySelector currently throws a non-DOMException error; should be a DOMException SyntaxError once DOMException is implemented."

[[expectations]]
id = "domparsing/innerhtml-comments.window.js"
