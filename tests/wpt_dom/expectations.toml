# Expectations for the offline WPT DOM corpus under `tests/wpt_dom/tests`.
#
# This file uses the ecma-rs `conformance-harness` expectations format:
# - Each `[[expectations]]` entry matches `id` (exact), `glob`, or `regex`.
# - `status` can be: "pass" | "skip" | "xfail" | "flaky".
# - `reason` is recommended for anything other than `pass`.
# - `backend` (optional) limits an entry to a specific JS backend: "vmjs" | "quickjs".
#
# If this file is empty, all tests are treated as expected `pass`.

[[expectations]]
id = "smoke/sync-fail.html"
status = "xfail"
reason = "Intentional failing smoke test used to validate xfail/failure plumbing in the future runner."

[[expectations]]
id = "smoke/assert_fail.window.js"
status = "xfail"
reason = "Intentional failing .window.js smoke test used to validate WPT report payload plumbing."

[[expectations]]
id = "smoke/assert_throws_js.window.js"
status = "xfail"
reason = "Intentional failing smoke test (mismatched constructor) used to validate exception assertion reporting."

[[expectations]]
id = "smoke/assert_throws_dom.window.js"
status = "xfail"
reason = "Intentional failing smoke test (mismatched DOMException name) used to validate exception assertion reporting."

[[expectations]]
id = "smoke/uncaught-exception.html"
status = "xfail"
reason = "Intentional harness-level error used to validate uncaught exception classification."

[[expectations]]
id = "smoke/infinite_loop_timeout.window.js"
status = "xfail"
reason = "Intentional infinite loop; runner should terminate it deterministically as a timeout."

[[expectations]]
id = "vmjs/time_determinism.window.js"
backend = "quickjs"
status = "skip"
reason = "Deterministic virtual time (Date.now/performance.now + idle_wait fast-forward) is vm-js-only; QuickJS timers are wall-clock based."

[[expectations]]
id = "vmjs/time_determinism_baseline.window.js"
backend = "quickjs"
status = "skip"
reason = "Deterministic virtual time (Date.now/performance.now) is vm-js-only; QuickJS timers are wall-clock based."

[[expectations]]
id = "dom/document_createElement_invalid_qualified_name.window.js"
status = "xfail"
reason = "Document.createElement currently does not validate qualified names / throw DOMException InvalidCharacterError."

[[expectations]]
id = "dom/document_createElementNS_namespace_constraints.window.js"
status = "xfail"
reason = "Document.createElementNS namespace/prefix validation (and DOMException types) not implemented yet."

[[expectations]]
id = "dom/element_setAttribute_invalid_qualified_name.window.js"
status = "xfail"
reason = "Element.setAttribute currently does not validate qualified names / throw DOMException InvalidCharacterError."

[[expectations]]
id = "dom/queryselector_invalid_selector_domexception.window.js"
status = "xfail"
reason = "querySelector currently throws a non-DOMException error; should be a DOMException SyntaxError once DOMException is implemented."

[[expectations]]
id = "domparsing/innerhtml-comments.window.js"
status = "xfail"
reason = "Comment node parsing/serialization is not implemented until dom2 materializes Comment nodes."

[[expectations]]
id = "dom/document_doctype.window.js"
status = "xfail"
reason = "DocumentType node + document.doctype binding is not implemented until dom2 materializes the document doctype."

[[expectations]]
id = "html/htmlelement_reflection.window.js"
backend = "quickjs"
status = "skip"
reason = "QuickJS backend uses a minimal DOM shim and does not yet implement HTMLElement reflected attributes or CSSStyleDeclaration."

[[expectations]]
id = "html/form_controls.window.js"
backend = "quickjs"
status = "skip"
reason = "QuickJS backend uses a minimal DOM shim and does not yet implement HTML form control element interfaces/properties (input/textarea/select/form)."
