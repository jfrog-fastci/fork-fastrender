# Expectations for the offline WPT DOM corpus under `tests/wpt_dom/tests`.
#
# This file uses the ecma-rs `conformance-harness` expectations format:
# - Each `[[expectations]]` entry matches `id` (exact), `glob`, or `regex`.
# - `status` can be: "pass" | "skip" | "xfail" | "flaky".
# - `reason` is recommended for anything other than `pass`.
# - `backend` (optional) limits an entry to a specific JS backend: "vmjs" | "vmjs-rendered" | "quickjs".
#
# If this file is empty, all tests are treated as expected `pass`.

