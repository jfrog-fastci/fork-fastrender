<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 22px;
    font-family: "DejaVu Serif", serif;
    color: rgb(20, 20, 20);
    line-height: 1.3;
  }
  .label {
    margin: 10px 10px 0;
  }
  math {
    display: block;
    margin: 2px 10px 14px;
  }
</style>
<body>
  <div class="label">default separators</div>
  <math display="block">
    <mfenced>
      <mi>a</mi>
      <mi>b</mi>
      <mi>c</mi>
    </mfenced>
  </math>

  <div class="label">separators=""</div>
  <math display="block">
    <mfenced separators="">
      <mi>a</mi>
      <mi>b</mi>
      <mi>c</mi>
    </mfenced>
  </math>
</body>
</html>
