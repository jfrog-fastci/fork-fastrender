<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
      }

      /* SVG without width/height: background-size:auto should not fall back to 300x150. */
      #box {
        width: 140px;
        height: 60px;
        background-color: black;
        background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20257.75%2047.63'%3E%3Crect%20width='257.75'%20height='47.63'%20fill='white'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: center;
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
  </body>
</html>
