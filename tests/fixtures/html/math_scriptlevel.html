<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 22px;
    font-family: "DejaVu Serif", serif;
    color: rgb(20, 20, 20);
  }
  math {
    display: block;
    margin: 8px;
  }
</style>
<body>
  <math display="block">
    <mrow>
      <msup><mi>x</mi><mi>i</mi></msup>
      <mspace width="1em" />
      <mstyle scriptlevel="+1">
        <msup><mi>x</mi><mi>i</mi></msup>
      </mstyle>
      <mspace width="1em" />
      <mstyle scriptlevel="2">
        <msup><mi>x</mi><mi>i</mi></msup>
      </mstyle>
    </mrow>
  </math>

  <math display="block">
    <mrow>
      <msup>
        <mi>x</mi>
        <mstyle scriptlevel="-1"><mi>i</mi></mstyle>
      </msup>
      <mspace width="1em" />
      <msup>
        <mi>x</mi>
        <mstyle scriptlevel="+1"><mi>i</mi></mstyle>
      </msup>
    </mrow>
  </math>
</body>
</html>
