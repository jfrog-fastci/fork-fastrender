<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 22px;
    font-family: "DejaVu Serif", serif;
    color: rgb(20, 20, 20);
  }
  math {
    display: block;
    margin: 8px;
  }
</style>
<body>
  <math display="block">
    <mrow>
      <mo stretchy="true">(</mo>
      <mi>x</mi><mo>+</mo><mi>y</mi>
      <mo stretchy="true">)</mo>
      <mo>=</mo>
      <mi>z</mi>
    </mrow>
  </math>

  <math display="block">
    <mrow>
      <mi>x</mi><mo>-</mo><mi>y</mi>
      <mo>,</mo>
      <mo>-</mo><mi>z</mi>
    </mrow>
  </math>

  <math display="block">
    <mfenced open="(" close=")" separators=",">
      <mi>a</mi>
      <mi>b</mi>
      <mi>c</mi>
    </mfenced>
  </math>

  <math display="block">
    <mrow>
      <mo stretchy="true">[</mo>
      <mi>a</mi><mo>=</mo><mi>b</mi>
      <mo stretchy="true">]</mo>
    </mrow>
  </math>
</body>
</html>
