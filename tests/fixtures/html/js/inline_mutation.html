<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; }
      #box { width: 64px; height: 64px; }
      .off { background: rgb(255, 0, 0); }
      .on { background: rgb(0, 0, 255); }
    </style>
  </head>
  <body>
    <div id="box" class="off"></div>
    <script>
      // The integration test harness provides a minimal JS binding: `setClass(id, className)`.
      // This script must run and mutate the DOM before the final frame is rendered.
      setClass("box", "on");
    </script>
  </body>
</html>
