<!doctype html>
<style>
  body {
    margin: 0;
  }
</style>
<div id="host">
  <template shadowroot="open">
    <style>
      slot {
        display: block;
      }

      #fallback {
        display: block;
        width: 40px;
        height: 40px;
        background: rgb(0, 0, 220);
      }

      ::slotted(*) {
        display: block;
        width: 40px;
        height: 40px;
        background: rgb(220, 0, 0);
      }
    </style>
    <slot name="a"><div id="fallback"></div></slot>
  </template>
  <span id="light" slot="a">Light</span>
</div>
