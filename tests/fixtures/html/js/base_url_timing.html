<!doctype html>
<html id="root" class="off">
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; }
      #box { width: 64px; height: 64px; }
      html.off #box { background: rgb(255, 0, 0); }
      html.before #box { background: rgb(0, 0, 255); }
      html.after #box { background: rgb(0, 255, 0); }
    </style>
    <!-- The first script appears before the <base> element. Its `src` must resolve against the
         document URL (not the later base href), otherwise it won't run. -->
    <script src="assets/before_base.js"></script>
    <base href="assets/">
    <!-- This script appears after <base>; its relative src should resolve against the base href. -->
    <script src="after_base.js"></script>
  </head>
  <body>
    <div id="box"></div>
  </body>
</html>
