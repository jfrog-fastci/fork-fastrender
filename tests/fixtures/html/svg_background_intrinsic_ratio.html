<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
      }

      /* SVG without width/height relies on viewBox for intrinsic ratio. */
      #box {
        width: 100px;
        height: 10px;
        background-color: white;
        background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2010'%3E%3Crect%20width='100'%20height='10'%20fill='black'/%3E%3C/svg%3E");
        background-size: 100px;
        background-repeat: no-repeat;
        background-position: left top;
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
  </body>
</html>
