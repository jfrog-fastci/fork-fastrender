<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 28px;
    font-family: "DejaVu Serif", serif;
    color: rgb(20, 20, 20);
  }
  math {
    display: block;
    margin: 8px;
  }
</style>
<body>
  <math display="block">
    <menclose notation="circle">
      <mtable>
        <mtr><mtd><mi>a</mi></mtd><mtd><mi>b</mi></mtd></mtr>
        <mtr><mtd><mi>c</mi></mtd><mtd><mi>d</mi></mtd></mtr>
      </mtable>
    </menclose>
  </math>
  <math display="block">
    <menclose notation="circle">
      <mrow>
        <mi>a</mi><mo>+</mo><mi>b</mi><mo>+</mo><mi>c</mi><mo>+</mo><mi>d</mi><mo>+</mo><mi>e</mi>
      </mrow>
    </menclose>
  </math>
</body>
</html>
