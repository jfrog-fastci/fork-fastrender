<!doctype html>
<html>
<style>
  @font-face {
    font-family: "STIX Two Math";
    src: url("../fonts/STIXTwoMath-Regular.otf") format("opentype");
  }
  body {
    margin: 0;
    font-size: 22px;
    color: rgb(18, 18, 18);
  }
  math {
    display: block;
    margin: 12px;
    font-family: "STIX Two Math", "STIXTwoMath", "DejaVu Serif", serif;
  }
</style>
<body>
  <math display="block">
    <mrow>
      <mi mathcolor="rgb(255,0,0)">x</mi>
      <mo>+</mo>
      <mi>y</mi>
      <mspace width="1em" />
      <mrow mathcolor="rgb(0,0,255)">
        <mi>a</mi>
        <mo>+</mo>
        <mi mathcolor="rgb(255,0,0)">b</mi>
      </mrow>
    </mrow>
  </math>
  <math display="block">
    <mrow>
      <mi mathbackground="rgb(0,255,0)">x</mi>
      <mo>+</mo>
      <mrow mathbackground="rgb(255,240,200)">
        <mi>y</mi>
        <mo>+</mo>
        <mi mathbackground="rgb(0,255,0)">z</mi>
      </mrow>
    </mrow>
  </math>
</body>
</html>
