<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: white;
        font-family: sans-serif;
        font-size: 28px;
        line-height: 44px;
        color: #111;
      }

      .wrap {
        display: flex;
        gap: 24px;
        padding: 20px;
      }

      .col {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .label {
        font-size: 14px;
        line-height: 18px;
        color: #555;
      }

      .sample {
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
        white-space: nowrap;
      }

      .spelling {
        text-decoration-line: spelling-error;
      }

      .grammar {
        text-decoration-line: grammar-error;
      }

      .combo {
        text-decoration-line: underline spelling-error;
      }

      .vertical-box {
        width: 130px;
        height: 250px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
        writing-mode: vertical-rl;
      }

      .vertical-box .vertical {
        text-decoration-line: spelling-error;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="col">
        <div class="label">spelling-error</div>
        <div class="sample spelling">FastRender spelling</div>

        <div class="label">grammar-error</div>
        <div class="sample grammar">FastRender grammar</div>

        <div class="label">underline + spelling-error</div>
        <div class="sample combo">FastRender combo</div>
      </div>

      <div class="col">
        <div class="label">vertical-rl spelling-error</div>
        <div class="vertical-box">
          <div class="vertical">VERTICAL</div>
        </div>
      </div>
    </div>
  </body>
</html>
