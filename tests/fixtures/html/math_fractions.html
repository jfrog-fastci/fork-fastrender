<!doctype html>
<html>
<style>
  @font-face {
    font-family: "STIX Two Math";
    src: url("../fonts/STIXTwoMath-Regular.otf") format("opentype");
  }
  body {
    margin: 0;
    font-size: 22px;
    color: rgb(18, 18, 18);
  }
  math {
    display: block;
    margin: 12px;
    font-family: "STIX Two Math", "STIXTwoMath", "DejaVu Serif", serif;
  }
</style>
<body>
  <math display="block">
    <mtable>
      <mtr>
        <mtd><mtext>linethickness=0</mtext></mtd>
        <mtd><mfrac linethickness="0"><mi>a</mi><mi>b</mi></mfrac></mtd>
      </mtr>
      <mtr>
        <mtd><mtext>thin</mtext></mtd>
        <mtd>
          <mfrac linethickness="thin">
            <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
            <mrow><mi>c</mi><mo>+</mo><mi>d</mi></mrow>
          </mfrac>
        </mtd>
      </mtr>
      <mtr>
        <mtd><mtext>thick</mtext></mtd>
        <mtd>
          <mfrac linethickness="thick">
            <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
            <mrow><mi>c</mi><mo>+</mo><mi>d</mi></mrow>
          </mfrac>
        </mtd>
      </mtr>
      <mtr>
        <mtd><mtext>3px</mtext></mtd>
        <mtd><mfrac linethickness="3px"><mi>x</mi><mi>y</mi></mfrac></mtd>
      </mtr>
      <mtr>
        <mtd><mtext>0.15em</mtext></mtd>
        <mtd><mfrac linethickness="0.15em"><mi>x</mi><mi>y</mi></mfrac></mtd>
      </mtr>
      <mtr>
        <mtd><mtext>numalign=left</mtext></mtd>
        <mtd><mfrac numalign="left"><mi>x</mi><mrow><mi>abcdefgh</mi></mrow></mfrac></mtd>
      </mtr>
      <mtr>
        <mtd><mtext>denomalign=right</mtext></mtd>
        <mtd><mfrac denomalign="right"><mrow><mi>abcdefgh</mi></mrow><mi>x</mi></mfrac></mtd>
      </mtr>
      <mtr>
        <mtd><mtext>bevelled=true</mtext></mtd>
        <mtd>
          <mfrac bevelled="true">
            <mrow><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><mi>b</mi></mrow>
            <mrow><msqrt><mrow><mi>c</mi><mo>+</mo><mn>1</mn></mrow></msqrt></mrow>
          </mfrac>
        </mtd>
      </mtr>
    </mtable>
  </math>
</body>
</html>
