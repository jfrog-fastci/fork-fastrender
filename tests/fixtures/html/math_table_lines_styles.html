<!doctype html>
<html>
  <style>
    body {
      margin: 0;
      font-size: 18px;
      font-family: "DejaVu Sans", sans-serif;
      color: rgb(10, 10, 10);
    }
    .case {
      margin: 12px;
    }
    .label {
      font-size: 14px;
      margin-bottom: 6px;
    }
    math {
      display: block;
    }
  </style>
  <body>
    <div class="case">
      <div class="label">solid</div>
      <math display="block">
        <mtable columnlines="solid" rowlines="solid" frame="solid" framespacing="0 0">
          <mtr>
            <mtd><mi>a</mi></mtd>
            <mtd><mi>b</mi></mtd>
            <mtd><mi>c</mi></mtd>
          </mtr>
          <mtr>
            <mtd><mi>d</mi></mtd>
            <mtd><mi>e</mi></mtd>
            <mtd><mi>f</mi></mtd>
          </mtr>
          <mtr>
            <mtd><mi>g</mi></mtd>
            <mtd><mi>h</mi></mtd>
            <mtd><mi>i</mi></mtd>
          </mtr>
        </mtable>
      </math>
    </div>
    <div class="case">
      <div class="label">dashed / dotted</div>
      <math display="block">
        <mtable columnlines="dashed" rowlines="dotted" frame="dashed" framespacing="0 0">
          <mtr>
            <mtd><mi>a</mi></mtd>
            <mtd><mi>b</mi></mtd>
            <mtd><mi>c</mi></mtd>
          </mtr>
          <mtr>
            <mtd><mi>d</mi></mtd>
            <mtd><mi>e</mi></mtd>
            <mtd><mi>f</mi></mtd>
          </mtr>
          <mtr>
            <mtd><mi>g</mi></mtd>
            <mtd><mi>h</mi></mtd>
            <mtd><mi>i</mi></mtd>
          </mtr>
        </mtable>
      </math>
    </div>
  </body>
</html>
