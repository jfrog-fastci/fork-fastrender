<!doctype html>
<style>
  body {
    margin: 0;
    background: #ffffff;
    font: 12px/1 system-ui, sans-serif;
  }

  .box {
    position: absolute;
    top: 12px;
    width: 48px;
    height: 48px;
    background: #000;
  }

  /* Fully transparent source pixels (alpha=0 everywhere) */
  .transparent {
    background: rgba(0, 0, 0, 0);
  }

  .box.second {
    left: 72px;
  }

  .box.first {
    left: 12px;
  }

  /* SVG filter definitions; hide the defs SVG itself. */
  svg {
    position: absolute;
    width: 0;
    height: 0;
  }
</style>

<svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <!--
      Minimal lighting fixture for alpha/masking semantics:
        - surfaceScale=0 => flat surface (normal math eliminated)
        - diffuseConstant=0.5 + elevation=90 => intensity is exactly 0.5
        - No feComposite/feMerge: we render ONLY the lighting output
    -->
    <filter id="lighting" color-interpolation-filters="sRGB">
      <feDiffuseLighting
        in="SourceAlpha"
        surfaceScale="0"
        diffuseConstant="0.5"
        lighting-color="white"
      >
        <feDistantLight azimuth="0" elevation="90" />
      </feDiffuseLighting>
    </filter>
  </defs>
</svg>

<div class="box first" style="filter: url(#lighting)"></div>
<div class="box second transparent" style="filter: url(#lighting)"></div>
