<!doctype html>
<html>
<style>
  @font-face {
    font-family: "STIX Two Math";
    src: url("tests/fixtures/fonts/STIXTwoMath-Regular.otf") format("opentype");
  }
  body {
    margin: 0;
    font-size: 28px;
    font-family: "STIX Two Math", serif;
    color: rgb(20, 20, 20);
  }
  .row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin: 8px;
  }
  .label {
    width: 160px;
    font-family: sans-serif;
    font-size: 14px;
    color: rgb(40, 40, 40);
  }
  math {
    display: inline-block;
  }
</style>
<body>
  <div class="row">
    <div class="label">normal</div>
    <math><mi>ABab0123</mi></math>
  </div>
  <div class="row">
    <div class="label">double-struck</div>
    <math><mi mathvariant="double-struck">ABab0123</mi></math>
  </div>
  <div class="row">
    <div class="label">script</div>
    <math><mi mathvariant="script">ABab</mi></math>
  </div>
  <div class="row">
    <div class="label">fraktur</div>
    <math><mi mathvariant="fraktur">ABab</mi></math>
  </div>
  <div class="row">
    <div class="label">monospace</div>
    <math><mi mathvariant="monospace">ABab0123</mi></math>
  </div>
</body>
</html>
