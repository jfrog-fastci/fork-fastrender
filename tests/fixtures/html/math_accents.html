<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 34px;
    font-family: "STIX Two Math", serif;
    color: rgb(20, 20, 20);
  }
  math {
    display: block;
    margin: 12px;
  }
</style>
<body>
  <math display="block">
    <mrow>
      <mtext>accent</mtext>
      <mspace width="0.8em" />
      <mover accent="true">
        <mi>x</mi>
        <mo>¯</mo>
      </mover>
      <mspace width="0.8em" />
      <munder accentunder="true">
        <mi>x</mi>
        <mo>_</mo>
      </munder>
    </mrow>
  </math>

  <math display="block">
    <mrow>
      <mtext>non-accent</mtext>
      <mspace width="0.8em" />
      <mover>
        <mi>x</mi>
        <mi>n</mi>
      </mover>
      <mspace width="1em" />
      <munderover>
        <mo>&#8721;</mo>
        <mi>i</mi>
        <mi>n</mi>
      </munderover>
    </mrow>
  </math>
</body>
</html>
