<!doctype html>
<html>
<style>
  body {
    margin: 0;
    font-size: 28px;
    font-family: "DejaVu Serif", serif;
    color: rgb(20, 20, 20);
  }
  math {
    display: block;
    margin: 8px;
  }
</style>
<body>
  <math display="block">
    <mrow>
      <menclose notation="updiagonalstrike">
        <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
      </menclose>
      <mspace width="1em" />
      <menclose notation="downdiagonalstrike">
        <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
      </menclose>
    </mrow>
  </math>
  <math display="block">
    <mrow>
      <menclose notation="roundedbox updiagonalstrike">
        <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
      </menclose>
      <mspace width="1em" />
      <menclose notation="roundedbox downdiagonalstrike">
        <mrow><mi>a</mi><mo>+</mo><mi>b</mi></mrow>
      </menclose>
    </mrow>
  </math>
</body>
</html>
